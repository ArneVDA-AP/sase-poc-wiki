Een kritieke configuratie-eis: NIC-offloading moet **uit** op de monitor-interface. Met offloading aan geeft de kernel Zeek samengestelde super-frames in plaats van echte wire-frames, wat stream-reconstructie verstoort.`},{id:"rita-analyse",boardId:"detection",num:"03 / RITA",title:"RITA scoort beaconing en C2-patronen",desc:"RITA importeert de Zeek-logs in ClickHouse en analyseert elk src→dst-paar op periodiciteit: hoe regelmatig zijn de verbindingen qua interval en payloadgrootte? Een C2-beacon scoort dicht bij 1.0, menselijk browsergedrag scoort laag.",activeNodes:["zeek","rita"],activeEdges:["zeek-rita"],subActive:["beacon","longconn","c2dns"],nodeStates:{rita:"hit"},packet:{path:"zeek-rita",color:"var(--amber)",label:"conn.log / dns.log (hourly)"},meta:[["import","rita import --rolling → ClickHouse (sase_poc)"],["beacon score","0–1. 1.0 = perfect periodiek (C2)"],["validatie","pkgs.netbird.io = 100%. Ubuntu NTP = 99%"],["drempel","score ≥ 0.8 → kandidaat voor blokkering"]],log:[["00:00.10","info","rita: import rolling. 12 dagen. ~7.5 min"],["00:00.11","hit","rita: pkgs.netbird.io score=1.000 (NetBird update check)"],["00:00.11","hit","rita: 185.125.190.56 score=0.990 (Ubuntu NTP)"],["00:00.12","info","rita: grafana.com score=0.998 (beacon test)  ← voorbeeld C2"]],fullText:`**RITA** (Real Intelligence Threat Analytics) leest de Zeek-logs en stelt per \`src→dst(FQDN/SNI)\`-paar de vraag: gedraagt dit zich automatisch of menselijk?

De kern is de **beacon score** van 0 tot 1. RITA kijkt naar de regelmaat van de verbintervallen en de consistentie van de payloadgroottes. Een C2-beacon die elke tien minuten exact twee pakketjes stuurt, scoort dicht bij 1.0. Menselijk browsegedrag is onregelmatig en scoort laag.

De eerste validatierun op de parallelle stack leverde alleen legitieme periodieke services op als topscorers: de NetBird update-check scoort 100% en Ubuntu's NTP-server 99%. Dat is precies het bewijs dat de pipeline werkt: alles dat regelmatig is, verschijnt in de lijst. De analist onderzoekt alles wat hij niet herkent.

Een demonstratietest bevestigde het end-to-end: \`grafana.com\` werd benaderd met een gesimuleerd periodiek script en scoorde **Critical (0.998)**. Dat is het niveau dat in de praktijk een automatische blokkering triggert.

Belangrijke nuance: RITA's eigen severity-label is conservatief. \`httpbin.org\` met 333 verbindingen scoorde slechts 'Medium'. De score zelf is betrouwbaarder dan het label voor automatisering.`},{id:"rpz-integratie",boardId:"detection",num:"04 / RPZ",title:"RITA-output wordt automatisch een DNS-blokkering",desc:"Een cron-script draait elke 15 minuten rita view --beacon, filtert op score ≥ 0.8, verwijdert whitelisted domeinen (NetBird, NTP), en schrijft de overgebleven FQDNs naar een feed file. ioc2rpz leest die file, voegt de domeinen toe aan de RPZ-zone en Unbound antwoordt NXDOMAIN.",activeNodes:["rita","rpzfeed","unbound"],activeEdges:["rita-rpzfeed","rpzfeed-unbound"],subActive:["extract","whitelist"],nodeStates:{rpzfeed:"active",unbound:"hit"},packet:{path:"rpzfeed-unbound",color:"var(--red)",label:"ioc2rpz → BIND AXFR → RPZ"},meta:[["cron","elke 15 min. /opt/scripts/rita_beacon_feed.sh"],["drempel","beacon score ≥ 0.8"],["whitelist","pkgs.netbird.io. 185.125.190.56. 8.8.8.8"],["latentie","SOA refresh 300 s → max ~5 min na extractie"]],log:[["00:00.15","info","rita_beacon_feed.sh: rita view -o → filter score>=0.8"],["00:00.15","info","whitelist: pkgs.netbird.io verwijderd uit feed"],["00:00.16","hit","feed: grafana.com toegevoegd aan rita_beacons.txt"],["00:00.17","block","unbound: grafana.com → NXDOMAIN (RPZ hit. score=0.998)"]],fullText:"De waarde van RITA wordt pas volledig gerealiseerd als een detectie ook een **actie** triggert. Zonder koppeling aan een blokkeer-mechanisme blijft het een dashboard-item dat een analist handmatig moet oppakken.\n\nDe RITA→RPZ-pipeline maakt van elke beacon-detectie automatisch een DNS-blokkering. Het script `rita_beacon_feed.sh` draait elke 15 minuten via cron, haalt de beacon-output op in CSV-formaat, houdt alleen rijen met score ≥ 0.8, en verwijdert bekende goede services via een whitelist. De overgebleven FQDNs schrijft het naar `/opt/ioc2rpz/cfg/rita_beacons.txt`.\n\n**ioc2rpz** leest die file als een derde bronbron naast URLhaus en ThreatFox. Het merget alle drie in de zone `threat-intel.rpz.sase`, verhoogt de zone-serial, en BIND pikt de wijziging op via de SOA-refresh (ingesteld op 300 seconden). Unbound vraagt de zone opnieuw op bij BIND en beantwoordt DNS-queries voor het geblokkeerde domein met **NXDOMAIN**.\n\nDe whitelist is onmisbaar. NetBird's update-check scoort 100% en Ubuntu NTP 99%: zonder whitelist zou de RPZ je eigen infrastructuur blokkeren. De whitelist is het eerste controlepunt voor false positives.\n\nDe end-to-end validatie: `grafana.com` (periodiek script, score 0.998) bereikte binnen minuten de status NXDOMAIN op clients."},{id:"verschil-suricata",boardId:"detection",num:"05 / VERGELIJKING",title:"Signature-based (Suricata) versus behavioral (Zeek/RITA)",desc:"Suricata en Zeek/RITA zijn complementair op dezelfde draad. Suricata matcht regels per pakket op bekende dreigingen en blokkeert inline. Zeek/RITA analyseren flows over tijd op onbekende dreigingen en blokken via DNS. Ze zijn geen vervanging van elkaar.",activeNodes:["tap","zeek","rita","rpzfeed","unbound"],activeEdges:["tap-zeek","zeek-rita","rita-rpzfeed","rpzfeed-unbound"],packet:null,meta:[["suricata","signature. per pakket. 79.620+ regels. inline blokkering"],["zeek/rita","behavioral. over flows. beacon score. DNS-blokkering"],["blinde vlekken","suricata mist zero-day C2. rita mist eenmalige exploits"],["samen","~90% topologie coverage op de parallelle stack"]],log:[["00:00.20","ok","suricata: ET MALWARE known-bad domain → DROP (signature match)"],["00:00.20","hit","rita: onbekend C2-domein. score=0.94 → RPZ NXDOMAIN"],["00:00.21","info","combinatie: signature voor bekende. behavioral voor onbekende dreigingen"]],fullText:`Suricata en Zeek/RITA stellen elk een andere vraag aan hetzelfde netwerkverkeer.

**Suricata** vraagt per pakket: 'matcht dit een bekende aanvalssignatuur?' Het werkt inline en kan verbindingen direct droppen. Met 79.620+ regels (ET Open + Abuse.ch) is het effectief voor bekende malware, exploit-kits en C2-infrastructuur die al in een ruleset staat. Nadeel: een aanvaller die een nieuw domein gebruikt en niet op een lijst staat, wordt nooit gezien.

**Zeek/RITA** vragen over flows: 'gedraagt dit gesprek zich menselijk?' Ze zitten niet inline en kunnen niets droppen. Een detectie leidt via de RPZ-pipeline tot een DNS-blokkering, niet tot een directe TCP-DROP. De blokkering treedt in werking bij de volgende DNS-query voor het domein, niet bij de huidige verbinding. Voordeel: patronen die Suricata nooit ziet, worden hier zichtbaar.

De combinatie dekt beide hoeken: signature-detectie voor snelle, precieze reactie op bekende dreigingen; gedragsanalyse voor langzamere maar diepere detectie van onbekende dreigingen. Beide sensoren zien hetzelfde verkeer op dezelfde tap, maar produceren fundamenteel verschillende inzichten.

Een praktisch verschil voor operationeel gebruik: Suricata-alerts zijn actionable per verbinding; RITA-analyses zijn actionable per domein over een analysevenster. Dat maakt RITA minder geschikt voor realtime respons maar beter voor threat hunting en threat intelligence.`},{id:"recap",boardId:"detection",num:"06 / RECAP",title:"Detectieketen afgerond",desc:"Recap: netwerk-tap → Zeek multi-worker cluster → conn.log / dns.log → RITA ClickHouse-analyse → beacon score ≥ 0.8 → cron extractie → ioc2rpz feed → RPZ → Unbound NXDOMAIN. Gedragsdetectie van onbekende C2-domeinen volledig geautomatiseerd.",activeNodes:["tap","zeek","rita","rpzfeed","unbound"],activeEdges:["tap-zeek","zeek-rita","rita-rpzfeed","rpzfeed-unbound"],packet:null,meta:[["tap","Hub flood (core) + GRE (Site1/DC)"],["zeek","multi-worker cluster. hourly log rotatie"],["rita","rolling import. beacon score 0–1"],["rpz-koppeling","cron 15 min. score≥0.8. whitelist verplicht"]],log:[["00:00.30","ok","detectie: passieve sensor → geen impact op verkeer"],["00:00.30","ok","detectie: onbekende C2-domeinen → DNS NXDOMAIN"],["00:00.30","ok","detectie: bestaande ioc2rpz + BIND + Unbound pipeline hergebruikt"],["00:00.30","info","scope: parallelle stack. sandbox: integratie gepland"]],fullText:`De rode draad: **passief zien, actief blokkeren via DNS**.

Zeek verzamelt geen meningen en blokkeert niets. Het vertaalt raw PCAP in gestructureerde logevents. RITA neemt die events en beantwoordt de vraag die je pas achteraf kunt stellen: 'was dit patroon over de afgelopen uren regelmatig genoeg om automatisch te zijn?' De pipeline van detectie naar blokkering loopt via een feed file en de bestaande ioc2rpz-keten, zodat er geen nieuwe enforcement-laag nodig was.

Dit domein sluit aan op DNS Threat Intelligence (dezelfde ioc2rpz + BIND + Unbound), Monitoring (beide zien overlappend verkeer) en indirect op CASB (RITA-detecties zijn kandidaten voor quarantaine, maar die koppeling is op de parallelle stack nog niet gebouwd).

De validatieresultaten geven vertrouwen in de aanpak: legitieme beacons (NetBird 100%, NTP 99%) kwamen als eerste boven, wat bewijst dat de scoring werkt. \`grafana.com\` bereikte als gesimuleerd C2-domein NXDOMAIN via de complete pipeline. De parallelle stack is PoC-gevalideerd; sandbox-integratie is de volgende stap.`}],zS=[{id:"intro",boardId:"cosmos",num:"01 / INTRO",title:"Twee poorten: netwerk en applicatie",desc:"NetBird laat het apparaat toe op het netwerk. Maar wie op het netwerk zit, kan nog niet automatisch elke applicatie openen. Cosmos voegt een tweede poort toe: per-applicatie login met MFA op gebruikersniveau.",activeNodes:["device","cosmos"],activeEdges:[],packet:null,meta:[["model","two-layer zero trust"],["gate 1","NetBird — netwerk-toegang (apparaat)"],["gate 2","Cosmos — applicatie-toegang (gebruiker + MFA)"],["stack","parallelle stack. dc01 10.0.0.100"]],log:[["00:00.01","info","device: NetBird overlay actief. wt0 up"],["00:00.02","info","device: aanvraag naar kuma.dc.local"],["00:00.03","info","cosmos: geen actieve sessie. login vereist"]],fullText:`In de sandbox werkt **NetBird** als enige poortwachter: een apparaat dat via het WireGuard-overlay binnenkomt, krijgt toegang op basis van ACL's per groep. Dat is netwerk-toegang op apparaat-niveau.

Maar wat als een laptop gedeeld is, of een sessie vergeten is open te laten? NetBird weet wie het apparaat is, niet wie er op dat moment voor het scherm zit. **Cosmos** vult die blinde vlek: het plaatst een login- en MFA-scherm voor elke interne applicatie, zodat de toegang ook op gebruikersniveau bewezen en tijdsgebonden is.

Dit is het **twee-laags model**: Gate 1 (NetBird) beslist of het netwerk bereikbaar is, Gate 2 (Cosmos) beslist of deze gebruiker deze specifieke applicatie mag openen. Beide poorten zijn nodig. Gate 1 zonder Gate 2 laat iedereen op het apparaat overal binnen; Gate 2 zonder Gate 1 zou de applicaties blootstellen aan het bredere netwerk.

Cosmos draait op dc01 (\`10.0.0.100\`) en reverse-proxiet de interne diensten. De backend-poorten van Uptime Kuma en Gitea zijn **niet extern gebonden**: de enige weg naar binnen loopt via Cosmos.`},{id:"auth",boardId:"cosmos",num:"02 / AUTH",title:"Cosmos verifieert via Entra ID",desc:"Zodra een gebruiker een beschermde route opent, stuurt Cosmos een OIDC-authorize-request naar Entra ID. Na het invoeren van credentials en het TOTP-token uit de authenticator-app geeft Entra een token terug. Cosmos opent dan pas de route.",activeNodes:["device","cosmos","entra"],activeEdges:["device-cosmos","cosmos-entra"],subActive:["mfa"],packet:{path:"device-cosmos",color:"var(--cyan)",label:"HTTPS aanvraag"},meta:[["idp","Entra ID (OIDC/OAuth2)"],["factor","wachtwoord + TOTP (Microsoft/Google Authenticator)"],["sessie","48 uur (PoC). productie: 1 uur of minder"],["host","cosmos hostname = 10.0.0.100 (gevolg: zie finding)"]],log:[["00:00.05","info","device: GET https://kuma.dc.local/"],["00:00.06","info","cosmos: geen geldige sessie. redirect naar login"],["00:00.08","info","cosmos: OIDC /authorize -> Entra ID"],["00:00.12","info","entra: credentials + TOTP challenge"],["00:00.18","ok","entra: token uitgegeven. Cosmos-sessie gestart"]],fullText:"De login-flow begint zodra een browser zonder actieve sessie een beschermde route bezoekt. Cosmos toont zijn eigen inlogscherm (niet Kuma, niet Gitea) en stuurt een **OIDC /authorize-request** naar Entra ID.\n\nEntra ID vraagt eerst om het wachtwoord en daarna om een **TOTP-code** uit een authenticator-app zoals Microsoft of Google Authenticator. Pas als beide kloppen, geeft Entra een token terug.\n\nCosmos registreert dat token als een geldige sessie met een vervaltijd. In de PoC is die 48 uur gekozen voor demo-gemak. In productie is een uur of minder realistischer, zodat een vergeten open laptop automatisch uitlogt.\n\nEén technische beperking in de huidige installatie: de **hostname van Cosmos is ingesteld als IP-adres** (`10.0.0.100`). Browsers binden cookies aan een domein, en een IP-adres kan geen parent-domein zijn van `*.dc.local`. Dit betekent dat de `AuthEnabled`-toggle uitgegrafeld is voor bepaalde routes. Het raakt de PoC niet functioneel, maar een toekomstige migratie naar `cosmos.dc.local` als hostname lost het op."},{id:"registration",boardId:"cosmos",num:"03 / OVERLAY",title:"Headscale en Tailscale: het overlay als voorwaarde",desc:"Voordat Cosmos bereikbaar is, moet het apparaat al een overlay-verbinding hebben via Headscale en Tailscale. Het overlay is Gate 1 (netwerk-niveau): zonder dat bestaat er geen route naar dc01.",activeNodes:["headscale","tailscale"],activeEdges:["headscale-tailscale"],packet:{path:"headscale-tailscale",color:"var(--cyan)",label:"tunnel coördinatie"},meta:[["control plane","Headscale (open-source Tailscale server)"],["client","Tailscale (WireGuard)"],["volgorde","eerst overlay (Gate 1), dan Cosmos (Gate 2)"],["stack","parallelle stack. dc01"]],log:[["00:00.20","info","headscale: peer geregistreerd. overlay-coördinatie actief"],["00:00.21","info","tailscale: WireGuard-tunnel omhoog naar dc01"],["00:00.22","ok","overlay: 10.0.0.0/8 bereikbaar via Tailscale-peer"]],fullText:"Het overlay-netwerk is een **prérequisiet** voor Cosmos, niet het gevolg ervan. **Headscale** is een zelf-gehoste, open-source implementatie van het Tailscale control plane. Het beheert de registratie van peers en coördineert de WireGuard-tunnels, onafhankelijk van Cosmos.\n\nDe **Tailscale-client** op het apparaat bouwt een WireGuard-tunnel op naar het overlay. NetBird adverteert `10.0.0.0/8` aan alle peers, waardoor dc01 routeerbaar wordt. Pas als die route actief is, kan de browser `https://10.0.0.100` (Cosmos) bereiken.\n\nDit is dezelfde aanpak als NetBird in de sandbox, maar met Headscale als control plane in plaats van de NetBird management server. Gate 1 (het overlay) regelt puur het netwerk. Gate 2 (Cosmos) voegt daar applicatie-niveau toegang aan toe. De twee lagen zijn onafhankelijk: het overlay draait ook als Cosmos uit staat."},{id:"tunnel",boardId:"cosmos",num:"04 / GATE 2",title:"Cosmos gatekeept applicatie-toegang",desc:"Het apparaat bereikt Cosmos via het overlay. Cosmos authenticeert de gebruiker via Entra ID (OIDC + TOTP) en bepaalt per applicatie welke bescherming geldt. Dit is Gate 2: applicatie-niveau controle bovenop het netwerk-overlay.",activeNodes:["device","cosmos","entra"],activeEdges:["device-cosmos","cosmos-entra"],packet:{path:"device-cosmos",color:"var(--cyan)",label:"HTTPS. aanvraag"},meta:[["gate","Gate 2 — applicatie-niveau"],["auth","Cosmos + Entra ID (OIDC + TOTP)"],["sessie","48h (PoC). productie: 1h of minder"],["voorwaarde","overlay al actief (Gate 1)"]],log:[["00:00.25","info","device: overlay actief. GET https://10.0.0.100"],["00:00.26","info","cosmos: geen actieve sessie. redirect naar Entra ID"],["00:00.27","ok","entra: MFA + TOTP geslaagd. token terug naar Cosmos"]],fullText:`Nu het overlay actief is, bereikt de browser \`https://10.0.0.100\` (Cosmos op dc01). Cosmos is een **reverse proxy en applicatie-gateway**: het zit tussen het overlay en de backend-containers en controleert elke aanvraag.

Bij een eerste bezoek zonder actieve sessie stuurt Cosmos de browser door naar **Entra ID** voor OIDC-authenticatie. Entra vraagt om wachtwoord en **TOTP** (Microsoft/Google Authenticator). Na succesvolle verificatie keert een token terug naar Cosmos, dat een sessie aanmaakt.

Dit is de **tweede poort** (Gate 2). Gate 1 (het Headscale/Tailscale overlay) controleerde of het apparaat het netwerk mag bereiken. Gate 2 controleert of de gebruiker de applicatie mag openen. Beide lagen zijn onafhankelijk: een overlay-peer zonder geldige Cosmos-sessie ziet alleen de loginpagina, niet de diensten.`},{id:"access",boardId:"cosmos",num:"05 / TOEGANG",title:"Per-peer ACL geeft toegang tot diensten",desc:"Via het overlay-netwerk bereikt het apparaat de DC-diensten op dc01. Cosmos heeft per dienst bepaald welke bescherming van toepassing is: Uptime Kuma met MFA-gate, Gitea bewust zonder (eigen auth). SmartShield beschermt elke route tegen misbruik.",activeNodes:["tailscale","cosmos","services"],activeEdges:["tailscale-services"],subActive:["smartshield"],packet:{path:"tailscale-services",color:"var(--green)",label:"overlay-toegang"},meta:[["uptime kuma","MFA-gate aan. SmartShield. 12.000 req/min"],["gitea","MFA-gate uit (bewust). eigen auth van Gitea"],["backend-poorten","3001 (Kuma) en 3000 (Gitea) niet extern gebonden"],["isolatie","elke dienst in eigen Docker-netwerk"]],log:[["00:00.30","ok","tailscale: verbinding met dc01 overlay-IP"],["00:00.31","info","cosmos: route kuma.dc.local. sessie geldig"],["00:00.32","ok","cosmos: SmartShield actief. door naar Uptime Kuma"],["00:00.33","ok","kuma: dashboard beschikbaar"]],fullText:"Eenmaal door beide poorten bereikt het apparaat de DC-diensten via de overlay. Cosmos staat op de grens tussen het overlay-netwerk en de backend-containers: het ontvangt elk verzoek, controleert de sessie, en stuurt door naar de juiste container.\n\nEen kernbeslissing in de architectuur is de **per-dienst instelling** van de MFA-gate. Uptime Kuma toont operationeel gevoelige informatie over de hele SASE-stack en krijgt de maximale beveiliging: NetBird-overlay, Cosmos MFA én Kuma's eigen login. Gitea heeft rijpe eigen authenticatie (SSH-sleutels, PATs, optionele 2FA) en wordt daarom bewust zonder de Cosmos MFA-gate geconfigureerd. Een tweede MFA-laag bovenop Gitea's eigen auth zou dubbel zijn voor dezelfde identiteit.\n\n**SmartShield** werkt per route en biedt rate-limiting, bot-detectie en IP-gebaseerde throttling. Omdat alle bezoekers eerst door NetBird moeten, ziet SmartShield nooit internetscans; de `12.000 req/min`-drempel voor Kuma is praktisch een bescherming tegen buggy scripts, niet tegen externe aanvallers.\n\nDe backend-poorten zijn **niet extern gebonden**: Kuma's `:3001` en Gitea's `:3000` zijn onzichtbaar buiten de Docker-omgeving. Cosmos is de enige ingang."},{id:"recap",boardId:"cosmos",num:"06 / RECAP",title:"Cosmos vs. NetBird: twee complementaire lagen",desc:"NetBird (sandbox) en Cosmos/Headscale (parallelle stack) lossen hetzelfde probleem op vanuit verschillende richtingen. NetBird richt zich op apparaat-gebaseerde overlay-toegang met groeps-ACL's. Cosmos voegt daar gebruikers-niveau MFA per applicatie aan toe.",activeNodes:["device","cosmos","entra","headscale","tailscale","services"],activeEdges:["device-cosmos","cosmos-entra","cosmos-headscale","headscale-tailscale","tailscale-services"],packet:null,meta:[["netbird (sandbox)","apparaat-niveau. WireGuard. groeps-ACL. open-source"],["cosmos/headscale (parallel)","applicatie-niveau MFA + overlay via Headscale"],["gedeeld","beide: WireGuard-overlay, deny-by-default"],["status","Cosmos: PoC-gevalideerd. sandbox-integratie gepland"]],log:[["00:00.40","ok","cosmos: twee-laags ZTNA afgerond"],["00:00.40","ok","gate 1 (netwerk) + gate 2 (applicatie) actief"],["00:00.40","info","cosmos: PoC-gevalideerd op parallelle stack. sandbox gepland"]],fullText:`De twee aanpakken zijn **complementair, niet concurrerend**. NetBird in de sandbox geeft netwerk-toegang op apparaat-niveau: een apparaat dat geauthenticeerd is bij de NetBird-server krijgt een overlay-IP en kan de diensten bereiken die zijn ACL's toestaan. Cosmos in de parallelle stack voegt daar gebruikersniveau-controle aan toe: ook als het apparaat op het netwerk staat, moet de gebruiker nog zijn identiteit bewijzen voor elke applicatie.

Beide systemen gebruiken WireGuard als tunnelprotocol en hanteren deny-by-default als uitgangspunt. Het verschil zit in de **laag** waarop de beslissing valt: netwerk-laag bij NetBird, applicatie-laag bij Cosmos.

In de PoC zijn de twee omgevingen gescheiden: Cosmos draait op de parallelle stack met Headscale als control plane, NetBird draait in de sandbox. De geplande stap is om Cosmos als **vierde laag** te integreren in de sandbox bovenop de bestaande NetBird-overlay. Zo blijft NetBird Gate 1 (netwerk) en wordt Cosmos Gate 2 (applicatie) in de volledige SASE-stack.`}],xS=[{id:"intro",boardId:"telemetry",num:"01 / INTRO",title:"Observability: zicht over de hele PoC",desc:"Een SASE-stack zonder observability is een blind systeem. De telemetry-laag verzamelt metrics van alle nodes en logs van alle componenten, en brengt ze samen in één Grafana-interface op mgmt01.",activeNodes:["sources","grafana"],activeEdges:[],packet:null,meta:[["host","mgmt01 (192.168.122.20). Docker Compose"],["metrics","Prometheus. pull-based. 7d retentie"],["logs","Loki 3.4.3. 7d retentie. 17 categorieën"],["visualisatie","Grafana 11.6.1. 4 dashboards"]],log:[["00:00.01","info","telemetry: stack online op mgmt01"],["00:00.02","info","prometheus: scrape-intervals actief"],["00:00.03","info","loki: log-forwarders verbonden"],["00:00.04","ok","grafana: dashboards beschikbaar op :3000"]],fullText:`Zonder observability weet je niet wat er in je netwerk gebeurt tot er iets fout gaat. De telemetry-stack beantwoordt vier vragen over de PoC-omgeving: wie heeft toegang (NetBird peer-events), wat doen ze (Zeek conn/dns/http), zijn er bedreigingen gedetecteerd (Wazuh-alerts, Suricata), en is de infrastructuur gezond (GNS3 node-status en host-metrics).

In plaats van per component een losse tool, bundelt de stack alles in **Grafana** als 'single pane of glass'. Grafana visualiseert zowel metrics uit **Prometheus** als logs uit **Loki** in dezelfde interface, zodat een beheerder één plek heeft voor operationeel overzicht.

De stack draait op mgmt01 (\`192.168.122.20\`) via Docker Compose. Dit is de parallelle SASE_POC-omgeving. De sandbox heeft zijn eigen security-observability via Wazuh SIEM, dat is een aparte laag. De telemetry-stack leest van Wazuh maar vervangt het niet: Wazuh detecteert en correleert, Grafana visualiseert.

Een bewuste keuze in het ontwerp: elke log-bron heeft zijn eigen kleine Python-forwarder-container. Als één forwarder vastloopt, blijven de anderen gewoon doorsturen.`},{id:"metrics",boardId:"telemetry",num:"02 / METRICS",title:"Node Exporter en Prometheus scrapen metrics",desc:"Node Exporter draait als systemd-service op mgmt01 (en dc01) en exporteert CPU, RAM, schijf en netwerk op poort 9100. Prometheus draait in host-netwerkmodus en scrapt elke 15-30 seconden alle exporters.",activeNodes:["sources","nodeexporter","prometheus"],activeEdges:["sources-nodeexporter","nodeexporter-prometheus"],packet:{path:"nodeexporter-prometheus",color:"var(--cyan)",label:"scrape :9100"},meta:[["node exporter","v1.9.1. :9100. systemd-service"],["prometheus","host-netwerk. geen Docker DNS"],["scrape-interval","15-30s. retentie 7d / 5GB"],["targets","node-mgmt01 UP. node-dc01 DOWN (OPNsense blokkeert)"]],log:[["00:00.10","info","node_exporter[mgmt01]: metrics actief op :9100"],["00:00.12","info","prometheus: scrape node-mgmt01:9100"],["00:00.13","ok","prometheus: CPU/RAM/disk/network opgeslagen"],["00:00.14","block","prometheus: node-dc01:9100 -> connection refused (OPNsense)"]],fullText:"**Node Exporter** is het standaard Prometheus-exporterformaat voor host-metrics. Het draait als lichtgewicht systemd-service op de gemonitoorde host en stelt een HTTP-endpoint beschikbaar op `:9100`. Prometheus haalt de metrics op via een periodieke HTTP-GET, ook wel een 'scrape' genoemd.\n\n**Prometheus** werkt pull-based: het bepaalt zelf wanneer het scrapet en houdt de tijdreeksen op in zijn eigen database. In dit project draait Prometheus in `network_mode: host` zodat het zowel containers als host-level services kan bereiken. Een neveneffect is dat het geen Docker DNS heeft: containers worden aangesproken via hun brug-gateway-IP, niet via naam.\n\nEr zijn vier scrape-targets geconfigureerd: `prometheus` (zelfmonitoring), `node-mgmt01` (host-metrics), `loki` (Loki gezondheid) en `gns3` (GNS3 node-status). De target `node-dc01` staat geconfigureerd maar is DOWN: dc01 zit achter OPNsense en de firewall blokkeert TCP van het WAN-segment naar `:9100`. Dat is een bekend open punt in de build.\n\nEen gotcha bij Loki: Docker kent aan de Loki-container een dynamisch bridge-IP toe. Als Loki herstart, kan dat IP veranderen en valt de Prometheus-scrape weg. De tijdelijke fix is het IP opzoeken via `docker inspect` en `prometheus.yml` aanpassen."},{id:"logs",boardId:"telemetry",num:"03 / LOGS",title:"NATS en Python-forwarders vullen Loki",desc:"Logs bereiken Loki niet via Promtail maar via kleine Python-forwarder-containers. De meeste logbronnen sturen via de bestaande NATS JetStream-bus. De forwarder leest van NATS en schrijft naar Loki met labels afgeleid uit het NATS-subject.",activeNodes:["sources","nats","loki"],activeEdges:["sources-nats","nats-loki"],packet:{path:"sources-nats",color:"var(--cyan)",label:"logs.pop01.firewall"},meta:[["bus","NATS JetStream. stream LOGS. subject logs.>"],["forwarder","mon-nats-loki-forwarder (durable consumer)"],["labels","logs.pop01.firewall -> device=pop01, category=firewall"],["timestamp","time.time() (ingest-tijd). geen originele log-timestamp"]],log:[["00:00.20","info","nats: publish logs.pop01.firewall"],["00:00.21","info","forwarder: consume logs.> (durable)"],["00:00.22","info","forwarder: labels afgeleid: device=pop01, category=firewall"],["00:00.23","ok","loki: log-entry opgeslagen. 17 categorieën actief"]],fullText:"Waarom geen Promtail? In de vorige build (poc-1a) gebruikte de stack Promtail als syslog-ontvanger, maar OPNsense stuurt logs in RFC3164-formaat terwijl Promtail RFC5424 verwacht. Dat veroorzaakte parse-fouten. Bovendien is poort 514 al bezet door Wazuh in de huidige setup.\n\nDe oplossing is elegant: de **NATS JetStream-bus** bestond al voor het CASB-domein. In plaats van een aparte syslog-pipeline te bouwen, abonneert de forwarder zich als durable consumer op `logs.>` en vertaalt elk bericht naar een Loki-entry. Labels worden afgeleid uit het NATS-subject: `logs.pop01.firewall` wordt `device=pop01, category=firewall`.\n\nEen bewuste keuze voor de **timestamp**: Loki werkt met tijdreeksen en weigert entries die te ver in het verleden liggen. OPNsense (FreeBSD) stuurt timestamps die `+00:00` claimen maar feitelijk CEST zijn. Om 'entry too far behind'-fouten te vermijden, gebruiken de forwarders `time.time()` als Loki-timestamp in plaats van de originele log-timestamp. Dit is de ingest-tijd, niet de event-tijd.\n\nNaast de NATS-forwarder zijn er aparte forwarders voor Wazuh (pollt OpenSearch op level >= 5) en een NetBird API-poller (REST API elke 60 seconden). De NetBird container-logs zijn te summier voor observability; de rijke ZTNA-data zit in de API."},{id:"grafana",boardId:"telemetry",num:"04 / GRAFANA",title:"Grafana visualiseert in vier dashboards",desc:"Grafana bevraagt Prometheus (PromQL) en Loki (LogQL) en toont de resultaten in vier vaste dashboards. De dashboards zijn geprovisioneerd vanuit JSON-bestanden en leven buiten de container: een rebuild verliest geen dashboards.",activeNodes:["prometheus","loki","grafana"],activeEdges:["prometheus-grafana","loki-grafana"],subActive:["dash1","dash2"],packet:{path:"prometheus-grafana",color:"var(--cyan)",label:"PromQL query"},meta:[["dashboards","Node Status. VM Metrics. OPNsense Log Stream. Stack Health"],["provisioning","JSON-bestanden in /opt/sase-monitor/grafana/dashboards/"],["read-only","geprovisioneerde dashboards zijn niet bewerkbaar via UI"],["toegang","grafana.sase.local via Caddy (NetBird-peers)"]],log:[["00:00.30","info","grafana: datasource Prometheus geconfigureerd"],["00:00.31","info","grafana: datasource Loki geconfigureerd"],["00:00.32","ok","grafana: 4 dashboards geprovisioneerd in SASE PoC-map"],["00:00.33","info","grafana: bereikbaar via grafana.sase.local (Caddy)"]],fullText:`Grafana heeft twee databronnen: **Prometheus** voor metrics (PromQL-queries) en **Loki** voor logs (LogQL-queries). Beide zijn geconfigureerd als Grafana-datasources via YAML-bestanden in de provisioning-map, zodat ze bij elke containerstart automatisch beschikbaar zijn.

De vier dashboards in de 'SASE PoC'-map:

- **Node Status**: één statuspaneel per GNS3-node, groen (started) of rood (stopped). Gebaseerd op de \`gns3_node_status\`-metric van de GNS3 REST API-exporter.
- **VM Metrics**: CPU, RAM, schijf-I/O en netwerk van mgmt01 via Node Exporter. De dc01-panelen zijn aanwezig maar leeg (target DOWN).
- **OPNsense Log Stream**: live logstroom met Device- en Component-dropdowns. Toont ook Wazuh-alerts en NetBird API-events. Query over \`{job=~"sase-logs|wazuh-alerts"}\`.
- **Stack Health**: alle Prometheus-targets UP/DOWN in één oogopslag.

Een belangrijk detail: geprovisioneerde dashboards en datasources zijn **read-only in de Grafana-UI**. Aanpassingen moeten in de JSON/YAML-bestanden op schijf worden gemaakt, gevolgd door een container-restart. Dit is een bewuste trade-off: de dashboards zijn versie-beheersbaar en overleven rebuilds.`},{id:"decision",boardId:"telemetry",num:"05 / BESLISSING",title:"Waarom Grafana en geen custom React-UI",desc:"Het oorspronkelijke plan was een React/Next.js frontend voor monitoring. Na evaluatie bleek dat Grafana al alles biedt wat nodig is. De enige unieke feature van een custom UI was GNS3-node-besturing, maar GNS3 heeft al een eigen webinterface.",activeNodes:["grafana"],activeEdges:[],packet:null,meta:[["optie A","custom React/Next.js — weken werk. dupliceert Grafana"],["optie B","Grafana — industrie-standaard. log + metrics + alerts ingebouwd"],["beslissend","GNS3 heeft eigen web UI voor node start/stop"],["uitkomst","minder code, minder containers, sneller resultaat"]],log:[["00:00.40","info","evaluatie: custom UI vs. Grafana"],["00:00.41","info","custom UI: log-tailing, metric-graphs, alerting -> duplicaat van Grafana"],["00:00.42","info","enige unieke feature: GNS3 node-control -> al beschikbaar in GNS3 web UI"],["00:00.43","ok","beslissing: Grafana. geen custom frontend"]],fullText:`De oorspronkelijke telemetry-planning omvatte een **eigen React/Next.js-frontend** voor het bekijken van logs en metrics en het starten en stoppen van GNS3-nodes vanuit één scherm. Voordat dat gebouwd werd, volgde een eerlijke evaluatie.

Grafana biedt out-of-the-box: log-tailing (Loki), metric-grafieken (Prometheus) en alerting. Een custom React-app bouwen die dezelfde functionaliteit levert zou weken kosten en uitkomen op een slechtere versie van wat Grafana al heeft, plus extra containers en onderhoud.

De enige feature die een custom UI zou toevoegen was het starten en stoppen van GNS3-nodes vanuit het dashboard. Maar GNS3 heeft al een eigen webinterface voor precies dat. Het was dus niet nodig om die functionaliteit na te bouwen.

De beslissing was **Grafana, zonder custom frontend**. Het gevolg: minder code, minder containers en minder onderhoud. De latere migratie van poc-1a naar mgmt01 profiteerde rechtstreeks van deze keuze: alleen de forwarders en datasources moesten verplaatst worden, niet een handgeschreven applicatie.

Een keerzijde: dashboards zijn read-only in de UI als ze geprovisioneerd zijn. Maar dat is ook een voordeel: ze zijn versie-beheersbaar en gaan niet verloren bij een rebuild.`}],io={overview:$g,swg:lS,ztna:rS,casb:oS,monitoring:sS,sdwan:uS,endpoint:cS,tproxy:dS,detection:fS,cosmos:pS,telemetry:mS},TS=[{id:"overview",label:"Overzicht — 6 domeinen",kind:"overview",scenes:gS},{id:"endpoint",label:"Endpoint — device enrollment",kind:"domain",scenes:SS},{id:"ztna",label:"ZTNA — Zero Trust Access",kind:"domain",scenes:vS},{id:"swg",label:"SWG — Secure Web Gateway",kind:"domain",scenes:hS},{id:"sdwan",label:"SD-WAN — ZT-Branch",kind:"domain",scenes:kS},{id:"casb",label:"CASB — Detectie & Quarantaine",kind:"domain",scenes:bS},{id:"monitoring",label:"Monitoring & Respons",kind:"domain",scenes:yS},{id:"tproxy",label:"Transparent Proxy — bypass-gap",kind:"domain",scenes:wS},{id:"detection",label:"Zeek & RITA — gedragsanalyse",kind:"domain",scenes:AS},{id:"cosmos",label:"Cosmos — two-layer ZTNA",kind:"domain",scenes:zS},{id:"telemetry",label:"Telemetry — Grafana & metrics",kind:"domain",scenes:xS}],eh=Object.keys($g.nodes);function ES(a){return a.replace(/^\s*\d+\.\s*/,"").trim()}function DS(a){const l=a.replace(/\s+/g," ").trim(),o=l.match(/^(.{0,200}?[.!?])(\s|$)/);return o?o[1]:l.length>200?l.slice(0,197)+"...":l}function CS(a){if(!a.startsWith("domain:"))return null;const l=a.slice(7);return eh.includes(l)?l:null}function NS(a){return a.startsWith("article:components/")?"component":a.startsWith("article:concepts/")?"concept":a.startsWith("article:decisions/")?"decision":a.startsWith("article:testing/")?"bewijs":null}function jS(a,l){const o=io[a];if(!o)return{activeEdges:[],packet:null};const s=new Set(l),c=Object.entries(o.edges).filter(([,g])=>s.has(g.from)&&s.has(g.to)).map(([g])=>g);if(c.length===0)return{activeEdges:[],packet:null};const d=o.edges[c[0]],f={path:c[0],color:d.dns?"var(--violet)":"var(--cyan)",label:d.label||""};return{activeEdges:c,packet:f}}function RS(
