rete data-flow ervan.",fullText:`Secure Access Service Edge (SASE) brengt netwerk- en beveiligingsfuncties samen op de rand, dicht bij de gebruiker. In dit project bestaat dat uit zes domeinen:

- **Endpoint Enforcement** bepaalt of een toestel gezond genoeg is om toegang te krijgen.
- **ZTNA** verleent identity-aware toegang via een WireGuard-overlay; niets is impliciet vertrouwd.
- **SWG** inspecteert al het webverkeer (proxy, malware-scan, DLP, DNS-filtering).
- **ZT-Branch (SD-WAN)** trekt bijkantoren via dezelfde overlay het zero-trust model in.
- **Monitoring & Respons** detecteert en reageert op basis van events.
- **CASB** bewaakt cloudgebruik en stuurt detectie door naar quarantaine.

Kies een domein om de stap-voor-stap data-flow te bekijken.`,activeNodes:["endpoint","ztna","swg","sdwan","monitoring","casb"],activeEdges:[],packet:null,meta:[["model","SASE (6 domeinen)"],["kern","ZTNA-overlay (NetBird + Zitadel)"],["inspectie","SWG (Squid + ICAP)"],["respons","NATS + Wazuh + Control Daemon"]],log:[["00:00.00","info","overzicht: 6 domeinen geladen"],["00:00.00","ok","klik een domein om in te zoomen"]]},{id:"ov-access",boardId:"overview",num:"02 / TOEGANG",title:"Van toestel naar geverifieerde toegang",desc:"Endpoint-posture en branch-overlay voeden ZTNA. Pas na verificatie mag verkeer door naar de inspectieketen (SWG).",fullText:"Toegang is een keten, geen poort. **Endpoint Enforcement** levert de device-posture (compliance, identiteit) aan **ZTNA**. **ZT-Branch** sluit bijkantoren via dezelfde overlay aan. ZTNA beslist per sessie op basis van identiteit en context; alleen geverifieerd verkeer bereikt de **SWG**-inspectieketen.",activeNodes:["endpoint","sdwan","ztna","swg"],activeEdges:["endpoint-ztna","sdwan-ztna","ztna-swg"],packet:{path:"endpoint-ztna",color:"var(--cyan)",label:"posture"},meta:[["posture-bron","Intune + Entra ID"],["overlay","NetBird (WireGuard)"],["beslisser","Zitadel (IdP / policy)"],["volgende","SWG-inspectie"]],log:[["00:00.04","info","endpoint: posture compliant -> claim"],["00:00.05","info","ztna: identity-aware policy match -> allow"],["00:00.06","ok","ztna: sessie geautoriseerd -> SWG"]]},{id:"ov-inspect",boardId:"overview",num:"03 / INSPECTIE",title:"Inspectie voedt detectie",desc:"SWG inspecteert egress en stuurt signalen naar CASB; CASB correleert en geeft detectie-events door aan Monitoring & Respons.",fullText:"De **SWG** ziet het feitelijke webverkeer en levert egress-signalen. **CASB** legt die naast cloudgebruik en gebruikerscontext (Identity Bridge) en produceert detectie-events. Die events stromen naar **Monitoring & Respons**, waar Wazuh correleert en de Control Daemon kan ingrijpen.",activeNodes:["swg","casb","monitoring"],activeEdges:["swg-casb","casb-monitoring"],packet:{path:"swg-casb",color:"var(--amber)",label:"signaal"},meta:[["swg-uit","egress-metadata"],["casb","NATS + Control Daemon"],["correlatie","Wazuh (SIEM/XDR)"],["bus","NATS JetStream"]],log:[["00:00.10","info","swg: egress-signaal gepubliceerd"],["00:00.11","hit","casb: detectie -> quarantaine-kandidaat"],["00:00.12","info","monitoring: event gecorreleerd in Wazuh"]]},{id:"ov-loop",boardId:"overview",num:"04 / LUS",title:"Continue verificatie",desc:"Respons koppelt terug naar ZTNA: een detectie kan re-authenticatie of intrekking van toegang afdwingen. Zo wordt vertrouwen continu herijkt.",fullText:"Zero trust is geen eenmalige check. **Monitoring & Respons** koppelt terug naar **ZTNA**: bij een detectie kan de Control Daemon re-authenticatie afdwingen of een sessie intrekken. Toegang die geldig was, vervalt zodra het risico verandert. Deze terugkoppellus maakt het geheel adaptief in plaats van statisch.",activeNodes:["monitoring","ztna"],activeEdges:["monitoring-ztna"],nodeStates:{ztna:"hit"},packet:{path:"monitoring-ztna",color:"var(--violet)",label:"re-auth"},meta:[["trigger","detectie-event"],["actie","re-auth / sessie-intrekking"],["uitvoerder","Control Daemon"],["effect","continue verificatie"]],log:[["00:00.20","dns","monitoring: risico verhoogd -> respons"],["00:00.21","block","ztna: sessie ingetrokken -> re-auth vereist"],["00:00.22","ok","lus: vertrouwen herijkt"]]}],hS=[{id:"client",boardId:"swg",num:"01 / CLIENT",title:"mobile01 start request",desc:"Corporate mobile device opent een HTTPS verbinding. Systeem-proxy is nog niet geconfigureerd. Eerst moet het apparaat weten WAAR de proxy zit.",activeNodes:["mobile"],activeEdges:[],packet:null,meta:[["client","mobile01 (iOS / Android MDM)"],["request","GET https://example.com/"],["proxy","auto-detect via WPAD"]],log:[["00:00.01","info","mobile01 netstack: resolve proxy via WPAD"],["00:00.02","info","DHCP option 252 -> http://wpad.sandbox.local/wpad.dat"]],fullText:`Een corporate apparaat wil een HTTPS-verbinding openen, maar het netwerk gebruikt een **explicit proxy**: het apparaat mag niet rechtstreeks naar het internet, maar moet eerst al zijn verkeer via Squid leiden. Het probleem is dat de proxy-instelling nog ontbreekt.

Om dat op te lossen zoekt het apparaat automatisch naar een **WPAD**-bestand (Web Proxy Auto-Discovery). Via DHCP-optie 252 of DNS-query krijgt het het adres van een PAC-script dat precies vertelt welke proxy het moet gebruiken. Pas als dat script is geladen, weet het apparaat dat al zijn verkeer naar \`100.70.154.79:3128\` moet.

Dit is de eerste schakel in de SWG-keten: zonder proxy-configuratie bereikt geen enkel verzoek de inspectie-pipeline.`},{id:"wpad",boardId:"swg",num:"02 / WPAD",title:"WPAD/PAC geserveerd door Caddy",desc:"Caddy webserver levert de wpad.dat (PAC-script). De client leert: alle HTTP(S) verkeer gaat naar 100.70.154.79:3128.",activeNodes:["mobile","caddy"],activeEdges:["mobile-caddy"],packet:{path:"mobile-caddy",color:"var(--cyan)",label:"GET /wpad.dat"},meta:[["service","Caddy v2.x"],["endpoint","http://wpad.sandbox.local/wpad.dat"],["pac rule","PROXY 100.70.154.79:3128; DIRECT"],["mime","application/x-ns-proxy-autoconfig"]],log:[["00:00.04","info","caddy: GET /wpad.dat 200 (application/x-ns-proxy-autoconfig, 612 B)"],["00:00.05","ok","mobile01: PAC geladen. FindProxyForURL -> PROXY 100.70.154.79:3128"]],fullText:"**Caddy** draait op mgmt01 en serveert het **PAC-bestand** (Proxy Auto-Configuration) op `http://wpad.sandbox.local/wpad.dat`. Het PAC-bestand is een klein JavaScript-script dat de browser uitvoert bij elk verzoek: de functie `FindProxyForURL` geeft terug welke proxy (of DIRECT) het apparaat moet gebruiken.\n\nHet resultaat: intern verkeer (overlay-adressen, `*.sandbox.local`) gaat rechtstreeks, al het overige verkeer gaat via `PROXY 100.70.154.79:3128`. Caddy levert het bestand met het juiste MIME-type `application/x-ns-proxy-autoconfig`, anders weigert WinHTTP het script uit te voeren.\n\nCaddy speelt hier een control-plane rol: het distribueert configuratie naar de clients, maar raakt het dataverkeer zelf niet aan. Het dataverkeer stroomt uitsluitend via Squid op pop01."},{id:"squid",boardId:"swg",num:"03 / PROXY",title:"Squid 3128 accepteert CONNECT",desc:"Client stuurt CONNECT example.com:443 naar Squid. Squid is geconfigureerd met ssl_bump om TLS te intercepten.",activeNodes:["mobile","squid"],activeEdges:["mobile-squid"],packet:{path:"mobile-squid",color:"var(--cyan)",label:"CONNECT :443"},meta:[["service","Squid 6.x on tcp/3128"],["mode","explicit forward proxy"],["action","peek-and-bump"],["acl","corp_devices ALLOW"]],log:[["00:00.06","info","squid[3128]: accept from 10.20.4.17:54812"],["00:00.06","info","squid: CONNECT example.com:443 HTTP/1.1"],["00:00.07","info","squid: acl match corp_devices -> bump candidate"]],fullText:"**Squid** draait op pop01 in explicit proxy-modus en luistert op `tcp/3128`. Voor een HTTPS-verbinding stuurt de browser een `CONNECT`-verzoek: het vraagt de proxy om een TCP-tunnel te openen naar de doelserver. In een gewone proxy-opstelling gaat Squid die tunnel transparant doorsturen en ziet hij de inhoud niet.\n\nHier is dat anders. Squid is geconfigureerd met **ssl_bump** in peek-and-bump-modus: eerst leest het de SNI-hostnaam uit de TLS ClientHello om de domeinnaam te kennen (peek), daarna beslist het of het de verbinding bumpt of doorstuurt (splice). Overlay-clients (ACL `corp_devices`) komen in aanmerking voor bump.\n\nSquid is ook de toegangspoort voor URL-filtering: blacklists en de UT1 Toulouse-categorielijst (malware, phishing, adult, gokken) worden gefilterd voordat het verzoek de internet-kant op gaat. ACL-regels zijn first-match-wins."},{id:"bump",boardId:"swg",num:"04 / TLS",title:"SSL Bump. TLS intercept",desc:"Squid genereert on-the-fly een cert voor example.com, getekend door de SASE-PoC-CA die via MDM op de client is geinstalleerd. Plaintext payload wordt nu inspecteerbaar voor de ICAP keten.",activeNodes:["squid"],activeEdges:[],subActive:["bump"],packet:null,meta:[["ca","SASE-PoC-CA (gedistribueerd via MDM)"],["leaf","CN=example.com (dynamisch)"],["cipher","TLS_AES_256_GCM_SHA384"],["sni","example.com"]],log:[["00:00.09","info","ssl_bump: SslBump1 peek. SNI=example.com"],["00:00.11","info","ssl_bump: mimicking upstream cert chain"],["00:00.12","ok","ssl_bump: bumped. plaintext beschikbaar voor ICAP"]],fullText:"**SSL Bump** is de TLS-intercept-techniek die Squid gebruikt om HTTPS-verkeer te kunnen inspecteren. Squid bouwt twee afzonderlijke TLS-verbindingen: een met de client en een met de doelserver. Voor de client genereert Squid on-the-fly een certificaat met de juiste hostnaam, ondertekend door de **SASE-PoC-CA**. Die CA is via MDM op alle corporate apparaten geïnstalleerd als vertrouwde root, zodat de browser geen certificaatwaarschuwing toont.\n\nHet resultaat is dat de HTTP-payload nu in plaintext beschikbaar is binnen Squid, terwijl de verbinding naar buiten toe gewoon versleuteld blijft. Zonder SSL Bump zouden ClamAV en de Python DLP-service alleen versleutelde bytes zien en niets kunnen inspecteren.\n\nNiet alle domeinen worden gebumpt. De Microsoft-authenticatiedomeinen (`login.microsoftonline.com`, `.microsoft.com`, enzovoort) staan op de no-bump-lijst: als Squid die verbindingen zou intercepten, breken Entra-login en Intune-inschrijving."},{id:"icap1",boardId:"swg",num:"05 / ICAP-1",title:"ICAP Layer 1. c-icap + ClamAV (RESPMOD)",desc:"Response body van een download wordt door Squid naar c-icap gestuurd. ClamAV scant op malware-signatures; YARA matcht op labels en gevoelige patronen; StructuredDataDetection valideert creditcardnummers met Luhn.",activeNodes:["squid","icap1"],activeEdges:["squid-icap1"],packet:{path:"squid-icap1",color:"var(--cyan)",label:"RESPMOD"},meta:[["engine","c-icap + ClamAV 1.x"],["mode","RESPMOD (response body)"],["port","tcp/1344"],["preview","4 KB then stream body"]],log:[["00:00.18","info","squid: RESPMOD -> icap://icap-1:1344/clamav"],["00:00.20","info","c-icap: preview 4 KB accepted, streaming body"],["00:00.22","info","clamd: scan started (sig-db: daily, 3.6M+ sigs)"]],fullText:"**ICAP** (Internet Content Adaptation Protocol) is het protocol waarmee Squid de response body naar een externe scanservice stuurt. In **RESPMOD**-modus stuurt Squid de server-respons (een download) door naar c-icap op `tcp/1344`, voordat hij het antwoord aan de client doorgeeft.\n\n**c-icap** is de ICAP-serverlaag die de body ontvangt, uitpakt en doorstuurt naar de eigenlijke scanengines. **ClamAV** werkt met meer dan 3,6 miljoen signatures voor bekende malware. Een belangrijk voordeel: ClamAV decomprimeert containers zoals ZIP en DOCX automatisch, zodat YARA-regels ook binnen een ingepakt bestand kunnen matchen.\n\nDit is ICAP-laag 1: alleen downloads (responses). Uploads worden apart behandeld in ICAP-laag 2. Als c-icap niets verdachts vindt, stuurt het een `204 No Content` terug en geeft Squid het bestand door. Bij een treffer retourneert het een blokkeer-respons en ziet de client een 403-pagina."},{id:"yara",boardId:"swg",num:"06 / YARA",title:"YARA regels evalueren content",desc:"Parallel aan ClamAV draait YARA. Rules: Confidential_Label, IBAN, BSN, AWS_Key. Een hit zet het item op de block-lijst.",activeNodes:["icap1"],activeEdges:[],subActive:["yara"],ruleHits:{"yara-conf":!0,"yara-iban":!1,"yara-bsn":!1,"yara-aws":!1},nodeStates:{icap1:"hit"},packet:null,meta:[["rule","Confidential_Label"],["pattern",'strings: $a="CONFIDENTIAL" nocase'],["match","offset 0x1A4. header van .docx"],["action","flag -> block candidate"]],log:[["00:00.24","info","yara: evaluating 4 rulesets"],["00:00.25","hit","yara: MATCH Confidential_Label @ 0x1A4"],["00:00.25","info","yara: IBAN/BSN/AWS_Key. no match"]],fullText:"**YARA** is een patroon-matchingtaal die specifiek ontworpen is voor het classificeren van bestanden op basis van tekenreeksen en bytereeksen. ClamAV laadt de YARA-regels automatisch bij het opstarten en evalueert ze parallel aan de malware-signaturen.\n\nDe vier aangepaste regels in dit project richten zich op **DLP**: `Confidential_Label` matcht op labels zoals `CONFIDENTIAL` of `VERTROUWELIJK` (case-insensitief), `DLP_IBAN_Pattern` op NL/DE/BE IBAN-formaten, `DLP_BSN_Candidate` op clusters van 9-cijferige reeksen, en `DLP_AWS_AccessKey` op het `AKIA`-prefix van AWS access keys.\n\nBelangrrijk verschil met de Python DLP-service: YARA detecteert patronen op basis van opmaak, maar voert geen wiskundige validatie uit. Een IBAN-patroon dat YARA matcht is niet per definitie een geldig rekeningnummer. De 11-proef en mod-97 zitten in ICAP-laag 2. Een YARA-hit bij een download resulteert direct in een blokkeer-beslissing."},{id:"luhn",boardId:"swg",num:"07 / SDD",title:"StructuredDataDetection. Luhn CC",desc:"Creditcard-achtige getallen worden Luhn-gevalideerd. Drempel = 3 geldige nummers per response. Onder de threshold gaat door; erboven wordt geblokkeerd.",activeNodes:["icap1"],activeEdges:[],subActive:["sdd"],nodeStates:{icap1:"hit"},packet:null,meta:[["detector","StructuredDataDetection"],["validator","Luhn mod-10"],["threshold","3 per response"],["found","5 candidates. 4 valid"]],log:[["00:00.26","info","sdd: candidates=5 (13-19 digits, separators stripped)"],["00:00.26","info","sdd: luhn-valid=4 -> threshold(3) overschreden"],["00:00.27","block","icap-1: response BLOCKED. 403 template served"]],fullText:`**StructuredDataDetection (SDD)** is een ingebouwde ClamAV-functie die specifiek ontworpen is voor gestructureerde data zoals creditcardnummers. In plaats van een vast patroon te matchen, zoekt SDD eerst naar alle reeksen van 13-19 cijfers in de response body (na het verwijderen van spaties en koppeltekens) en valideert daarna elk kandidaat-nummer met het **Luhn-algoritme** (mod-10 controlesom).

Een losse reeks cijfers die toevallig op een creditcardnummer lijkt, leidt niet direct tot een blokkade. De drempel is ingesteld op 3 geldige nummers per bestand: pas als er drie of meer Luhn-geldige nummers in één response voorkomen, blokkeert c-icap de download. Zo vermindert het aantal valse positieven bij documenten die toevallig lange cijferreeksen bevatten.

In dit scenario vindt SDD vijf kandidaten, waarvan er vier wiskundig geldig zijn. Dat overschrijdt de drempel van 3, dus de response wordt geblokkeerd. De treffer wordt ook als event op \`security.alert.malware\` gepubliceerd via NATS, zodat de Control Daemon de dreiging kan meewegen in de per-peer threat score.`},{id:"icap2",boardId:"swg",num:"08 / ICAP-2",title:"ICAP Layer 2. Python DLP (REQMOD)",desc:"Bij uploads (POST/PUT) stuurt Squid de REQUEST-body naar de custom Python DLP-service in Docker op tcp/1345. Scant multipart bodies voor Luhn CC, IBAN mod-97, BSN 11-proef, AWS access keys.",activeNodes:["squid","icap2"],activeEdges:["squid-icap2"],packet:{path:"squid-icap2",color:"var(--amber)",label:"REQMOD"},meta:[["engine","python-dlp (docker, py3.11)"],["mode","REQMOD (request body)"],["port","tcp/1345"],["content-type","multipart/form-data"]],log:[["00:00.30","info","squid: REQMOD -> icap://icap-2:1345/dlp"],["00:00.31","info","dlp: parsing multipart. 2 parts (text, binary)"]],fullText:"ICAP-laag 2 werkt in **REQMOD**-modus: in plaats van de server-respons onderschept Squid hier de client-request, nog vóórdat die de proxy verlaat. Alleen `POST`, `PUT` en `PATCH`-verzoeken komen in aanmerking, want die zijn de enige methoden die een request body met te uploaden data kunnen bevatten.\n\nDe reden voor een aparte Python-service is dat ClamAV's c-icap de `multipart/form-data`-encoding die browsers gebruiken bij bestandsuploads niet correct ontleedt. De Python DLP-service herkent en verwerkt die encoding wel, splitst de afzonderlijke velden en bestanden, en past dan per onderdeel de validatoren toe.\n\nDe service draait als **Docker-container** op mgmt01 en is bereikbaar op `192.168.122.23:1345`. Squid op pop01 bereikt hem via het management-segment, onafhankelijk van de NetBird-overlay. Als de container niet beschikbaar is, geldt fail-open: het upload-verzoek gaat door terwijl ClamAV-scanning op de download-kant actief blijft."},{id:"dlp",boardId:"swg",num:"09 / DLP",title:"DLP validators. mod-97 / 11-proef / AWS",desc:"Elke validator draait onafhankelijk. Een IBAN wordt via mod-97 gecheckt, een BSN via de Nederlandse 11-proef, AWS access keys op het AKIA-prefix. Bij hit wordt de upload geweigerd met 403.",activeNodes:["icap2"],activeEdges:[],subActive:["dlp"],ruleHits:{"dlp-luhn":!1,"dlp-iban":!0,"dlp-bsn":!1,"dlp-aws":!0},nodeStates:{icap2:"block"},packet:null,meta:[["iban","NL91ABNA0417164300. mod-97 = 1 ok"],["aws","AKIA[A-Z0-9]{16}. access key ID"],["bsn","not found"],["verdict","BLOCK. 403 Forbidden (DLP-blokkeringspagina)"]],log:[["00:00.33","hit","dlp: IBAN mod-97 valid -> NL91ABNA0417164300"],["00:00.33","hit","dlp: AWS_KEY prefix AKIA + 40-byte secret matched"],["00:00.34","block","icap-2: REQUEST BLOCKED. upload denied (403)"]],fullText:"De Python DLP-service past drie **algoritmische validators** toe, die elk verder gaan dan patroonherkenning alleen.\n\n- **IBAN mod-97**: controleert het wiskundige controlecijfer van een IBAN-rekeningnummer. Willekeurige cijferreeksen die op een IBAN lijken maar wiskundig ongeldig zijn, worden genegeerd.\n- **BSN 11-proef**: de Nederlandse elfproef valideert burgerservicenummers via een gewogen som. Zo worden negen-cijferige reeksen zonder geldige checksum niet als BSN aangemerkt.\n- **AWS access keys**: het prefix `AKIA` gevolgd door 16 alfanumerieke tekens (`AKIA[A-Z0-9]{16}`) is het detectiepatroon voor een AWS access key ID. Dat is een ondubbelzinnig signaal dat echte cloud-credentials worden geüpload.\n\nAls een van de validators een treffer vindt, blokkeert de service de upload en stuurt Squid een specifieke DLP-blokkeringspagina naar de client. De treffer wordt als `security.alert.dlp`-event gepubliceerd op NATS, zodat de Control Daemon de dreiging kan meewegen voor een eventuele quarantaine."},{id:"suricata",boardId:"swg",num:"10 / IDS",title:"Suricata IDS. WAN + LAN sensoren",desc:"Onafhankelijk van de proxy-keten tapt Suricata beide interfaces (vtnet0 = WAN, vtnet1 = LAN). Ruleset: 79.620+ signatures uit ET Open + Abuse.ch feeds.",activeNodes:["squid","suricata"],activeEdges:["squid-suricata"],nodeStates:{suricata:"hit"},packet:{path:"squid-suricata",color:"var(--amber)",label:"tap (PCAP/BPF)"},meta:[["engine","suricata 7.0"],["ifaces","vtnet0 (WAN). vtnet1 (LAN)"],["rules","79.620+ (ET Open + Abuse.ch)"],["output","eve.json -> SIEM"]],log:[["00:00.36","info","suricata[vtnet0]: PCAP capture (BPF)"],["00:00.37","info","suricata[vtnet1]: decoder.tcp segment reassembly"],["00:00.38","hit","suricata: ET MALWARE signature match -> eve.json"]],fullText:"**Suricata** werkt volledig onafhankelijk van de proxy-keten. In plaats van verkeer te onderscheppen, leest het ruwe pakketten van de netwerkinterfaces via BPF (Berkeley Packet Filter). Op `vtnet0` (WAN) ziet Suricata de herversleutelde verbindingen die Squid naar buiten opent, DNS-queries van de resolver, en direct verkeer dat de proxy omzeilt. Op `vtnet1` (LAN) ziet het onversleuteld intern verkeer van dc01.\n\nSuricata draait in **IDS-modus** (detectie, geen blokkering). IPS-modus vereist NIC-drivers met native Netmap-ondersteuning, die niet beschikbaar zijn op de virtio-NIC's in deze QEMU-omgeving. Alle detecties worden weggeschreven naar `eve.json` in JSON-formaat. Een Python-producer tailt dit bestand en publiceert alerts op `security.alert.ids` via NATS.\n\nDe ruleset bestaat uit meer dan 79.620 regels (ET Open, Abuse.ch URLhaus, SSL Fingerprint Blacklist, SSL IP Blacklist). Suricata herkent ook TLS-metadata zoals JA3/JA4-fingerprints en SNI-hostnamen, zodat het C2-verkeer kan detecteren dat de proxy omzeilt."},{id:"dns-query",boardId:"swg",num:"11 / DNS",title:"DNS query. client naar Unbound",desc:"Naast het proxy-pad loopt DNS. Iedere client-query gaat naar Unbound. Unbound heeft een RPZ zone die als sinkhole dient voor bekende bad-domains.",activeNodes:["mobile","unbound"],activeEdges:["mobile-unbound"],packet:{path:"mobile-unbound",color:"var(--violet)",label:"A? badstuff.tld"},meta:[["resolver","Unbound 1.24.2"],["port","udp/53 + tcp/53"],["rpz","enabled. response-policy zone"],["query","A badstuff.tld"]],log:[["00:00.40","dns","unbound: query A badstuff.tld from 10.20.4.17"],["00:00.40","dns","unbound: consulting RPZ zone rpz.local"]],fullText:"DNS-filtering werkt op een ander niveau dan de proxy. Voordat een browser überhaupt een TCP-verbinding kan opbouwen, moet het de hostnaam naar een IP-adres resolven. Alle DNS-queries van overlay-clients gaan via de NetBird primary nameserver-instelling automatisch naar **Unbound** op pop01.\n\nUnbound is een validerende, recursieve resolver met de `respip`-module geladen. Die module implementeert **RPZ** (Response Policy Zone): bij elke query consulteert Unbound een lokale zone die bekende kwaadaardige domeinen bevat. Als de gezochte domeinnaam in die zone staat, retourneert Unbound `NXDOMAIN` in plaats van het echte IP-adres. De client denkt dat het domein niet bestaat en kan geen verbinding opzetten.\n\nDit is DNS-filtering die werkt ongeacht poort, protocol of of het apparaat wel of niet de proxy gebruikt."},{id:"rpz",boardId:"swg",num:"12 / RPZ",title:"BIND 9.20 <- ioc2rpz <- URLhaus + ThreatFox",desc:"De RPZ wordt opgebouwd door ioc2rpz dat URLhaus en ThreatFox feeds periodiek pulled (~71.767 records). BIND 9.20 serveert de zone; Unbound laadt hem via RPZ.",activeNodes:["unbound","bind","ioc2rpz"],activeEdges:["unbound-bind","bind-ioc2rpz"],nodeStates:{unbound:"block"},packet:{path:"unbound-bind",color:"var(--violet)",label:"RPZ lookup"},meta:[["feeder","ioc2rpz. pulls: URLhaus, ThreatFox"],["records","~71.767"],["bind","BIND 9.20 (secondary, TSIG-AXFR van ioc2rpz)"],["unbound","rpz-action = NXDOMAIN"]],log:[["00:00.41","dns","bind: RPZ match badstuff.tld -> CNAME ."],["00:00.41","block","unbound: rewrite -> NXDOMAIN (RPZ hit)"],["00:00.42","info","client: getaddrinfo() EAI_NONAME. connection aborted"]],fullText:"De RPZ-zone die Unbound gebruikt wordt gevoed door een drielaagse keten. **ioc2rpz** is een zone-aggregator die periodiek threat intelligence feeds pulled van Abuse.ch (URLhaus voor malware-distributiedomeinen en ThreatFox voor C2-indicators). Uit die feeds bouwt ioc2rpz een DNS-zone met ongeveer 71.767 records op.\n\nUnbound 1.24.2 ondersteunt nog geen TSIG-authenticatie voor zonetransfers. Daarom fungeert **BIND 9.20** als tussenstap: het haalt de zone op van ioc2rpz via een TSIG-authenticeerde AXFR en serveert hem vervolgens via loopback aan Unbound, zonder authenticatie. Unbound laadt de zone in geheugen via de `respip`-module. Elke query kost daardoor geen extra netwerkvertraging: de RPZ-lookup is een in-memory operatie.\n\nBij een treffer retourneert Unbound `NXDOMAIN` aan de client. Het DNS-event wordt ook gepubliceerd op NATS (`security.alert.dns`) voor Wazuh-logging. De Control Daemon gebruikt RPZ-hits bewust niet voor score-beslissingen: DNS-hits zijn te noisy voor geautomatiseerde quarantaine."},{id:"summary",boardId:"swg",num:"13 / RECAP",title:"End-to-end controles actief",desc:"Traffic flow afgerond. Samengevat: WPAD stuurt client naar Squid, SSL-bump opent plaintext voor ICAP, laag-1 scant downloads (ClamAV + YARA + Luhn), laag-2 scant uploads (Python DLP), Suricata tapt mee op WAN+LAN, en DNS wordt gefilterd door Unbound + RPZ gevoed door ioc2rpz.",activeNodes:["mobile","caddy","squid","icap1","icap2","suricata","unbound","bind","ioc2rpz"],activeEdges:["mobile-caddy","mobile-squid","squid-icap1","squid-icap2","squid-suricata","mobile-unbound","unbound-bind","bind-ioc2rpz"],packet:null,meta:[["proxy","Squid 3128 + ssl_bump"],["icap-1","c-icap + ClamAV + YARA + SDD"],["icap-2","python-dlp (docker:1345)"],["ids","Suricata 7.0. vtnet0/vtnet1"],["dns","Unbound. BIND 9.20. ioc2rpz"]],log:[["00:00.50","ok","pipeline healthy. all controls reporting"],["00:00.50","ok","icap-1 RESPMOD active (downloads scanned)"],["00:00.50","ok","icap-2 REQMOD active (uploads scanned)"],["00:00.50","ok","suricata IDS tap healthy (monitor mode, 0 drops)"]],fullText:`De SWG-keten bestaat uit vier onafhankelijke verdedigingslagen die samen elk HTTP/HTTPS-verzoek afdekken.

**Proxy + TLS-inspectie**: Caddy distribueert het PAC-bestand, Squid accepteert het verkeer en SSL Bump opent de TLS-laag zodat de inhoud zichtbaar wordt. Zonder deze stap kunnen de ICAP-services niets inspecteren.

**ICAP-laag 1 (downloads)**: c-icap met ClamAV scant elke server-respons op malware-signatures (3,6M+), YARA-regels (gevoelige labels en patronen) en creditcardnummers via StructuredDataDetection. Een treffer blokkeert de download.

**ICAP-laag 2 (uploads)**: de Python DLP-service ontleedt \`multipart/form-data\`-uploads en valideert IBAN (mod-97), BSN (11-proef) en AWS-credentials algoritmisch. Een treffer blokkeert de upload en publiceert een NATS-event (\`security.alert.dlp\`) dat de Control Daemon meeneemt in de per-peer threat score.

**Suricata IDS + RPZ**: Suricata tapt het ruwe netwerkverkeer op WAN en LAN en detecteert dreigingen die de proxy omzeilen. Unbound met RPZ blokkeert DNS-resolution van bekende malware-domeinen vóórdat er ook maar een verbinding tot stand komt.`}],vS=[{id:"intro",boardId:"ztna",num:"01 / ZTNA",title:"Identity-aware toegang start",desc:"Een corporate apparaat wil bij een interne dienst. Er is geen impliciet vertrouwen op netwerk-niveau. Eerst moet de gebruiker bewijzen wie hij is voordat er een overlay-tunnel ontstaat.",activeNodes:["device"],activeEdges:[],packet:null,meta:[["client","Entra-joined device"],["model","zero trust. deny-by-default"],["overlay","NetBird (WireGuard)"]],log:[["00:00.01","info","device: geen overlay-route actief. wt0 down"],["00:00.02","info","device: start OIDC login om toegang te krijgen"]],fullText:`ZTNA vervangt het klassieke VPN-model waarin een apparaat na het inloggen op het netwerk meteen alles kan bereiken. Hier is toegang **identiteitsgebonden**: de tunnel die straks ontstaat geeft alleen toegang tot wat de groepen van deze gebruiker toestaan.

De keten is: apparaat bewijst identiteit bij Entra ID, Zitadel vertaalt de groepslidmaatschappen naar een schone token, en NetBird bouwt op basis daarvan een overlay met de juiste ACL's.`},{id:"login-mfa",boardId:"ztna",num:"02 / IdP",title:"Entra ID. MFA + sign-in risk",desc:"Het apparaat doet een OIDC-authorize bij Entra ID. Naast wachtwoord wordt MFA afgedwongen en evalueert Entra het sign-in risk (locatie, geo, onbekend apparaat). Bij verhoogd risico kan de login geweigerd worden.",activeNodes:["device","entra"],activeEdges:["device-entra"],subActive:["mfa"],packet:{path:"device-entra",color:"var(--cyan)",label:"/authorize"},meta:[["idp","Entra ID (OIDC)"],["factor","MFA verplicht"],["risk","sign-in risk + geo-check"],["output","id_token met group-claims"]],log:[["00:00.05","info","entra: GET /authorize response_type=code"],["00:00.07","info","entra: MFA challenge -> satisfied"],["00:00.08","ok","entra: sign-in risk=low. id_token uitgegeven"]],fullText:"Entra ID is de **identity provider**. De group-claims in het uitgegeven token dragen nog de ruwe Entra-groepsnamen, inclusief organisatie-prefixen zoals `2ITCSC1A-`.\n\n**Sign-in risk** is een continu signaal: een login vanaf een nieuwe locatie of een onmogelijke reis (impossible travel) verhoogt het risico en kan extra verificatie of weigering triggeren. Dit is de eerste poort in de keten."},{id:"zitadel-broker",boardId:"ztna",num:"03 / BROKER",title:"Zitadel vertaalt groepen",desc:"Zitadel treedt op als OIDC-broker tussen Entra en NetBird. Het neemt de Entra group-claims, zet ze via een hardcoded allowlist om naar schone interne namen (2ITCSC1A-Studenten → Studenten), en geeft een schone JWT uit. Groepen die niet in de allowlist staan worden stil verwijderd (fail-closed).",activeNodes:["entra","zitadel"],activeEdges:["entra-zitadel"],subActive:["map"],packet:{path:"entra-zitadel",color:"var(--cyan)",label:"id_token"},meta:[["broker","Zitadel (OIDC)"],["in","Entra groups (met prefix)"],["transform","allowlist-map 2ITCSC1A-Studenten -> Studenten (fail-closed)"],["out","clean JWT (groups)"]],log:[["00:00.10","info","zitadel: id_token van Entra ontvangen"],["00:00.11","info","zitadel: allowlist-mapping 2ITCSC1A-Studenten -> Studenten"],["00:00.12","ok","zitadel: schone JWT uitgegeven aan NetBird"]],fullText:"Waarom een broker? NetBird wil **stabiele, schone groepsnamen** voor zijn ACL-policy, maar Entra levert groepen met organisatie-specifieke prefixen. Zitadel ontkoppelt die twee werelden.\n\nEen hardcoded **allowlist** in een Zitadel Action zet `2ITCSC1A-Studenten` om naar `Studenten`. Groepen die niet in de allowlist staan worden stil verwijderd — de mapping is **fail-closed**. Zo blijft het NetBird-beleid leesbaar en onafhankelijk van hoe Entra zijn groepen toevallig benoemt. De broker is ook het punt waar je later van IdP zou kunnen wisselen zonder het overlay-beleid te herschrijven."},{id:"netbird-tunnel",boardId:"ztna",num:"04 / OVERLAY",title:"NetBird bouwt de tunnel",desc:"NetBird leest de groepen uit de schone JWT, kent het apparaat een overlay-IP toe en brengt een WireGuard-tunnel omhoog op interface wt0. De ACL's bepalen op basis van de groep welke peers en diensten bereikbaar zijn.",activeNodes:["zitadel","netbird"],activeEdges:["zitadel-netbird"],subActive:["assign"],packet:{path:"zitadel-netbird",color:"var(--cyan)",label:"clean JWT"},meta:[["overlay","NetBird. WireGuard"],["iface","wt0"],["assign","group -> overlay-IP"],["policy","ACL per groep. deny-by-default"]],log:[["00:00.14","info","netbird: JWT geverifieerd. groups=[Studenten]"],["00:00.15","info","netbird: overlay-IP 100.70.95.98 toegekend"],["00:00.16","ok","netbird: WireGuard peer up op wt0. ACL toegepast"]],fullText:"NetBird is een **WireGuard-gebaseerde overlay**. De tunnel komt op interface `wt0` te staan en het apparaat krijgt een overlay-IP in het 100.x-bereik.\n\nHet cruciale punt: het overlay-IP is niet zomaar een adres, het is **gekoppeld aan de groep**. De ACL-policy zegt bijvoorbeeld dat `Studenten` wel bij dienst A maar niet bij dienst B mogen. Deny-by-default betekent dat alles wat niet expliciet is toegestaan, geweigerd wordt. Zo is laterale beweging op het overlay beperkt tot wat de identiteit toelaat."},{id:"identity-bridge-map",boardId:"ztna",num:"05 / BRIDGE",title:"Identity Bridge koppelt IP aan groep",desc:"De Identity Bridge pollt elke 30 seconden de NetBird API en bouwt een cache van overlay-IP naar groep. Zo kunnen andere componenten (zoals de SWG of de Control Daemon) een verbinding terugvertalen naar een gebruiker en zijn groepen.",activeNodes:["netbird","bridge"],activeEdges:["netbird-bridge"],packet:{path:"netbird-bridge",color:"var(--cyan)",label:"GET /api/peers"},meta:[["service","Identity Bridge"],["source","NetBird API"],["interval","elke 30s"],["cache","overlay-IP -> group"]],log:[["00:00.30","info","bridge: GET /api/peers (poll-cyclus)"],["00:00.30","info","bridge: 100.70.95.98 -> groups=[Studenten]"],["00:00.31","ok","bridge: cache ververst. 1 peer toegevoegd"]],fullText:"Een overlay-IP zegt op zichzelf niets over wie erachter zit. De **Identity Bridge** lost dat op: het pollt de NetBird API elke 30 seconden en houdt een actuele tabel bij van overlay-IP naar groep.\n\nDit is de lijm tussen het netwerk-niveau en het identiteits-niveau. Wanneer de SWG straks verkeer ziet van `100.70.95.98`, of de Control Daemon een incident scoort, kunnen zij via deze cache zien dat het om de groep `Studenten` gaat. Het maakt **identiteitsbewuste beslissingen** mogelijk verderop in de keten."},{id:"recap",boardId:"ztna",num:"06 / RECAP",title:"Identiteit gekoppeld aan toegang",desc:"ZTNA-keten afgerond: Entra ID verifieert met MFA en risico, Zitadel normaliseert de groepen, NetBird bouwt een overlay met groep-gebaseerde ACL's, en de Identity Bridge houdt de koppeling IP-naar-groep actueel voor de rest van het platform.",activeNodes:["device","entra","zitadel","netbird","bridge"],activeEdges:["device-entra","entra-zitadel","zitadel-netbird","netbird-bridge"],packet:null,meta:[["idp","Entra ID. MFA + risk"],["broker","Zitadel. allowlist-map (fail-closed)"],["overlay","NetBird. wt0. ACL per groep"],["mapping","Identity Bridge. 30s poll"]],log:[["00:00.40","ok","ztna: overlay actief. toegang identiteitsgebonden"],["00:00.40","ok","ztna: ACL deny-by-default afgedwongen"],["00:00.40","ok","bridge: IP->group cache live voor SWG / CASB"]],fullText:`De rode draad: **geen toegang zonder bewezen identiteit, en toegang strikt beperkt tot wat de groep toelaat**.

Deze keten levert ook iets op voor de andere domeinen. Doordat de Identity Bridge de koppeling overlay-IP naar groep publiceert, kan de SWG zijn inspectie koppelen aan een gebruiker en kan de CASB / Control Daemon bij een incident gericht de juiste peer uit zijn groep verwijderen (quarantaine). ZTNA is daarmee niet alleen een toegangspoort maar ook de identiteitsbron voor het hele SASE-platform.`}],bS=[{id:"intro",boardId:"casb",num:"01 / CASB",title:"Detectie wordt reactie",desc:"De inspectie-componenten zien dingen, maar zien alleen is niet genoeg. De CASB-keten verbindt detectie aan een geautomatiseerde reactie: alerts stromen samen, worden gescoord, en bij genoeg dreiging volgt quarantaine.",activeNodes:["sensors"],activeEdges:[],packet:null,meta:[["doel","detectie -> automatische respons"],["bus","NATS JetStream"],["beslisser","Control Daemon"]],log:[["00:00.01","info","casb: sensoren actief (ClamAV, DLP, Suricata)"],["00:00.02","info","casb: wacht op security.alert.* events"]],fullText:`Een CASB (Cloud Access Security Broker) bewaakt hier vooral het gedrag van apparaten op het overlay. De kern van deze implementatie is **event-gedreven**: in plaats van dat elke sensor zelf mag ingrijpen, publiceren ze hun bevindingen op een centrale bus.

Een enkele beslisser, de Control Daemon, weegt alles samen. Zo voorkom je dat losse, op zichzelf onschuldige signalen onnodig blokkeren, terwijl een opeenstapeling juist wel tot actie leidt.`},{id:"alert-publish",boardId:"casb",num:"02 / PUBLISH",title:"Sensoren publiceren op NATS",desc:"ClamAV, de Python DLP-service en Suricata publiceren hun bevindingen als security.alert.* berichten op NATS JetStream. JetStream persisteert de events zodat niets verloren gaat als een consumer even weg is.",activeNodes:["sensors","nats"],activeEdges:["sensors-nats"],packet:{path:"sensors-nats",color:"var(--amber)",label:"security.alert.*"},meta:[["publishers","ClamAV. DLP. Suricata (log-only)"],["subject","security.alert.*"],["bus","NATS JetStream (persistent)"],["payload","type. peer-IP. severity"]],log:[["00:00.05","hit","clamav: alert -> security.alert.malware"],["00:00.06","hit","dlp: alert -> security.alert.dlp"],["00:00.07","info","nats: 2 events persisted op stream"]],fullText:"NATS JetStream is de **event-bus** met persistentie. Elk alert is een bericht op een subject onder `security.alert.*`, bijvoorbeeld `security.alert.malware` of `security.alert.dlp`.\n\nDe winst van persistentie: als de Control Daemon herstart of even achterloopt, blijven de events op de stream staan en worden ze alsnog verwerkt. De sensoren hoeven niets te weten over wie er luistert, ze publiceren simpelweg. Dat ontkoppelt detectie van besluitvorming."},{id:"score-calculate",boardId:"casb",num:"03 / SCORE",title:"Control Daemon scoort",desc:"De Control Daemon consumeert de alerts en houdt per peer een sliding-window score bij. Malware weegt 80 punten, een DLP-match 30. Zodra de gewogen som de drempel van 80 raakt, is dat genoeg voor een reactie.",activeNodes:["nats","control"],activeEdges:["nats-control"],subActive:["score"],nodeStates:{control:"hit"},packet:{path:"nats-control",color:"var(--amber)",label:"consume"},meta:[["window","sliding window per peer"],["malware","80 punten"],["dlp_match","30 punten"],["threshold",">= 80 -> actie"]],log:[["00:00.10","info","control: consume security.alert.* (peer 100.70.95.98)"],["00:00.11","info","control: malware(80) -> score=80"],["00:00.12","hit","control: score 80 >= threshold 80. trigger respons"]],fullText:`De **sliding window** is wat dit slim maakt. In plaats van per losse alert te beslissen, telt de Control Daemon recente alerts per peer bij elkaar op met een gewicht.

Met malware=80 en dlp_match=30 en drempel 80 betekent dat: een enkele malware-hit is meteen genoeg, maar het vergt drie DLP-matches binnen het venster (30+30+30=90) voordat een reeks data-leak-signalen escaleert. Zo blijven losse, mogelijk valse, DLP-treffers onder de drempel, terwijl echte malware direct tot actie leidt. De gewichten en drempel zijn beleidskeuzes, geen vaste wet.`},{id:"quarantine-execute",boardId:"casb",num:"04 / QUARANTAINE",title:"NetBird haalt peer uit zijn groep",desc:"Bij score >= 80 roept de Control Daemon de NetBird Groups API aan: eerst GET om de huidige groepen op te halen, dan PUT om de peer eruit te verwijderen. Door deny-by-default valt daarmee onmiddellijk alle toegang weg: het apparaat is in quarantaine zonder dat er een firewall-regel hoeft te wijzigen.",activeNodes:["control","netbird"],activeEdges:["control-netbird"],subActive:["quarantine"],nodeStates:{netbird:"block"},packet:{path:"control-netbird",color:"var(--red)",label:"Groups API GET/PUT"},meta:[["trigger","score >= 80"],["actie","NetBird Groups API. peer uit groep"],["effect","deny-by-default -> geen toegang"],["peer","100.70.95.98 (Studenten)"]],log:[["00:00.14","info","control: Groups API GET -> huidige groepen ophalen"],["00:00.15","info","control: Groups API PUT -> peer uit Studenten-groep"],["00:00.16","block","netbird: peer 100.70.95.98 uit groep Studenten"],["00:00.17","block","netbird: ACL deny-by-default. alle toegang gestopt"]],fullText:`Quarantaine hergebruikt het ZTNA-model in plaats van een aparte blokkeer-laag. Omdat toegang **groep-gebonden** is en de ACL deny-by-default hanteert, is een peer uit zijn groep halen genoeg: er blijft simpelweg niets meer over dat hij mag bereiken.

Dit is elegant omdat er geen losse blocklist of firewall-mutatie nodig is die kan verlopen of inconsistent raken. De bron van waarheid blijft NetBird, en de Identity Bridge ziet de wijziging bij de volgende poll vanzelf.`},{id:"wazuh-log",boardId:"casb",num:"05 / SIEM",title:"Wazuh legt alles vast",desc:"Parallel aan de respons consumeert de Wazuh Forwarder dezelfde events op security.alert.> — onafhankelijk van de Control Daemon. Daar worden ze gecorreleerd en bewaard, zodat er een audittrail is van wat er gedetecteerd is en welke reactie volgde.",activeNodes:["nats","wazuh"],activeEdges:["nats-wazuh"],packet:{path:"nats-wazuh",color:"var(--cyan)",label:"security.alert.>"},meta:[["siem","Wazuh (SIEM / XDR)"],["bron","NATS security.alert.>"],["functie","correlatie + audittrail"],["retentie","events bewaard"]],log:[["00:00.18","info","wazuh-forwarder: consumeert security.alert.> (durable PULL)"],["00:00.19","info","wazuh: alert + quarantaine-actie gecorreleerd"],["00:00.20","ok","wazuh: audittrail bijgewerkt voor peer 100.70.95.98"]],fullText:"Reageren is niet hetzelfde als verantwoorden. Wazuh is de **SIEM / XDR** die de volledige geschiedenis vasthoudt: welk alert kwam binnen, hoe scoorde de Control Daemon, en welke quarantaine volgde.\n\nDe Wazuh Forwarder is een **parallelle** consumer op `security.alert.>` — onafhankelijk van de Control Daemon, beide als durable PULL-consumer op dezelfde bus. Zo is er een onafhankelijke registratie los van de live-besluitvorming. Dat is nodig voor onderzoek achteraf, voor het bijstellen van de score-gewichten, en om te kunnen aantonen dat het systeem deed wat het hoorde te doen."},{id:"recap",boardId:"casb",num:"06 / RECAP",title:"Gesloten detectie-respons-lus",desc:"CASB-keten afgerond: sensoren publiceren op NATS, de Control Daemon scoort met een sliding window, bij score >= 80 haalt de Control Daemon de peer via Groups API GET/PUT uit zijn groep (quarantaine via deny-by-default), en Wazuh houdt de volledige audittrail bij.",activeNodes:["sensors","nats","control","netbird","wazuh"],activeEdges:["sensors-nats","nats-control","control-netbird","nats-wazuh"],packet:null,meta:[["bus","NATS JetStream. security.alert.*"],["score","malware=80. dlp=30. drempel=80"],["respons","NetBird. peer uit groep"],["audit","Wazuh. security.alert.>"]],log:[["00:00.30","ok","casb: lus gesloten. detectie -> respons -> audit"],["00:00.30","ok","casb: quarantaine zonder firewall-mutatie"],["00:00.30","ok","casb: events vastgelegd voor onderzoek"]],fullText:`De rode draad: **één bus, één beslisser, hergebruik van het ZTNA-model voor de reactie, en een onafhankelijke audittrail**.

Deze keten leunt op de andere domeinen. De sensoren komen deels uit de SWG (ClamAV, DLP) en uit Monitoring (Suricata). De quarantaine werkt alleen omdat ZTNA toegang groep-gebonden maakt. En de Identity Bridge zorgt dat een peer-IP herleidbaar is naar een gebruiker. CASB is daarmee de plek waar de signalen van het hele platform samenkomen en omgezet worden in actie.`}],yS=[{id:"intro",boardId:"monitoring",num:"01 / OBSERVE",title:"Zicht over het hele platform",desc:"Elk domein produceert signalen. Monitoring brengt ze samen op één bus, correleert ze in een SIEM en koppelt ze aan geautomatiseerde respons. Zonder dit overzicht zou elk component een blind eiland zijn.",activeNodes:["suricata"],activeEdges:[],packet:null,meta:[["doel","observe -> correlate -> act"],["bus","NATS JetStream"],["siem","Wazuh"]],log:[["00:00.01","info","monitoring: sensoren en streams online"],["00:00.02","info","monitoring: wacht op events van alle domeinen"]],fullText:`Monitoring & Respons is het **observability-domein**. Het maakt geen verkeer en blokkeert ook niets rechtstreeks, maar geeft de rest van het platform ogen en een geheugen.

De drie lagen zijn: **observe** (sensoren leveren events), **correlate** (Wazuh bouwt er een samenhangend beeld van), en **act** (de Control Daemon zet bevindingen om in respons). Dezelfde NATS-bus die de CASB gebruikt, draagt hier ook de bredere telemetrie.`},{id:"tap",boardId:"monitoring",num:"02 / IDS",title:"Suricata tapt het verkeer",desc:"Suricata draait als IDS op beide interfaces (vtnet0 = WAN, vtnet1 = LAN) en schrijft bevindingen naar eve.json. Het is bewust detectie, niet preventie: het tapt mee en alarmeert, het zit niet inline in het pad.",activeNodes:["suricata"],activeEdges:[],nodeStates:{suricata:"hit"},packet:null,meta:[["engine","Suricata 7.0 (IDS)"],["ifaces","vtnet0 (WAN). vtnet1 (LAN)"],["rules","79.620+ (ET Open + Abuse.ch)"],["output","eve.json"]],log:[["00:00.05","info","suricata[vtnet0]: PCAP capture (BPF)"],["00:00.06","hit","suricata: ET signature match -> eve.json"],["00:00.07","info","suricata: alarmeert, blokkeert niet (IDS-modus)"]],fullText:"Suricata is hier een **IDS, geen IPS**. Dat is een bewuste keuze: het systeem zit niet inline in het verkeerspad, dus een vals positief legt de boel niet plat. Het tapt mee op WAN en LAN en alarmeert.\n\nDe inline-blokkering gebeurt elders (Squid/ICAP voor web, NetBird voor toegang). Door detectie en preventie te scheiden, kun je agressief detecteren zonder beschikbaarheid te riskeren. De bevindingen gaan als gestructureerde `eve.json`-events de pijplijn in."},{id:"bus",boardId:"monitoring",num:"03 / BUS",title:"NATS draagt de events",desc:"Suricata en de andere sensoren publiceren op NATS JetStream onder de subject-familie security.alert.<bron> (ids/proxy/dlp/malware/dns/casb), stream SECURITY_ALERTS. Wazuh en de Control Daemon zijn twee onafhankelijke durable consumers. JetStream persisteert zodat niets verloren gaat.",activeNodes:["suricata","nats"],activeEdges:["suricata-nats"],packet:{path:"suricata-nats",color:"var(--cyan)",label:"eve.json -> security.alert.ids"},meta:[["bus","NATS JetStream (persistent)"],["stream","SECURITY_ALERTS = security.alert.*"],["subjects","security.alert.ids/proxy/dlp/malware/dns/casb"],["consumers","Wazuh + Control Daemon (parallel, durable)"]],log:[["00:00.10","info","nats: publish eve.json -> security.alert.ids"],["00:00.11","info","nats: JetStream persisteert op SECURITY_ALERTS stream"],["00:00.12","ok","nats: events persistent. consumers kunnen later lezen"]],fullText:"NATS JetStream is de **ruggengraat** van zowel monitoring als CASB. Alle detectiebronnen publiceren op de subject-familie `security.alert.<bron>`: Suricata op `security.alert.ids`, de proxy op `security.alert.proxy`, enzovoort. De stream `SECURITY_ALERTS` vangt `security.alert.*` op en persisteert het.\n\nWazuh en de Control Daemon zijn **twee onafhankelijke durable consumers** op dezelfde stream — ze lezen parallel, niet serieel. Persistentie betekent dat een herstartende consumer de gemiste events alsnog ophaalt."},{id:"correlate",boardId:"monitoring",num:"04 / SIEM",title:"Wazuh correleert en bewaart",desc:"Wazuh consumeert security.alert.> als durable consumer en bouwt er een samenhangend beeld van. Losse events worden via regels gecorreleerd tot betekenisvolle incidenten en getoond op dashboards, met retentie voor onderzoek achteraf.",activeNodes:["nats","wazuh"],activeEdges:["nats-wazuh"],subActive:["corr"],packet:{path:"nats-wazuh",color:"var(--cyan)",label:"security.alert.>"},meta:[["siem","Wazuh (SIEM / XDR)"],["input","NATS security.alert.> (durable consumer)"],["functie","correlatie-regels + dashboards"],["retentie","events bewaard voor analyse"]],log:[["00:00.14","info","wazuh: consume security.alert.> (durable)"],["00:00.15","info","wazuh: correlatie-regel matcht reeks events"],["00:00.16","ok","wazuh: incident zichtbaar op dashboard"]],fullText:`Wazuh is de **SIEM / XDR**. Het verschil met een losse alert: Wazuh ziet patronen over de tijd en over componenten heen. Een enkel event is ruis, maar een reeks gerelateerde events kan een aanval zijn.

Naast detectie levert Wazuh **geheugen**: retentie van events maakt forensisch onderzoek mogelijk en helpt om de detectieregels en de score-gewichten van de Control Daemon bij te stellen. Het is de plek waar een analist het hele verhaal terugziet.`},{id:"respond",boardId:"monitoring",num:"05 / RESPONS",title:"Control Daemon zet om in actie",desc:"Waar Wazuh observeert, handelt de Control Daemon. Het consumeert de reactie-waardige signalen, scoort ze (zie CASB) en triggert bij overschrijding van de drempel een geautomatiseerde respons zoals quarantaine via NetBird.",activeNodes:["nats","control"],activeEdges:["nats-control"],packet:{path:"nats-control",color:"var(--amber)",label:"security.alert.>"},meta:[["respons","Control Daemon"],["input","security.alert.> (durable consumer, parallel aan Wazuh)"],["beslissing","sliding-window score"],["actie","quarantaine via NetBird API"]],log:[["00:00.18","info","control: consume security.alert.> (durable)"],["00:00.19","info","control: score bijgewerkt per peer"],["00:00.20","ok","control: bij drempel -> respons getriggerd"]],fullText:"De **Control Daemon** is de schakel tussen weten en doen. Hij is een tweede durable consumer op `security.alert.>` — parallel aan Wazuh, niet via Wazuh. Hij hergebruikt exact dezelfde scoring-logica als in de CASB-keten: een sliding window per peer, met gewichten en een drempel van 80.\n\nDat monitoring en CASB dezelfde beslisser delen is geen toeval, het is één respons-mechanisme dat door verschillende detectiebronnen gevoed wordt. Of een signaal nu van Suricata, ClamAV of de DLP komt, het loopt door dezelfde poort naar dezelfde geautomatiseerde actie."},{id:"recap",boardId:"monitoring",num:"06 / RECAP",title:"Observe, correlate, act",desc:"Monitoring-keten afgerond: Suricata en sensoren tappen en alarmeren, NATS draagt de events op gescheiden subjects, Wazuh correleert en bewaart, en de Control Daemon zet bevindingen om in geautomatiseerde respons.",activeNodes:["suricata","nats","wazuh","control"],activeEdges:["suricata-nats","nats-wazuh","nats-control"],packet:null,meta:[["observe","Suricata IDS. eve.json"],["transport","NATS security.alert.*"],["correlate","Wazuh SIEM / XDR (durable consumer)"],["act","Control Daemon -> NetBird (durable consumer, parallel)"]],log:[["00:00.30","ok","monitoring: observe-correlate-act keten gesloten"],["00:00.30","ok","monitoring: detectie gescheiden van preventie"],["00:00.30","ok","monitoring: één bus, gedeelde respons-beslisser"]],fullText:`De rode draad: **detectie centraliseren, scheiden van preventie, en koppelen aan één geautomatiseerde respons**.

Dit domein bindt het platform samen. De SWG levert web-detecties, ZTNA levert de identiteit achter een IP, CASB deelt de respons-logica, en SD-WAN/endpoint leveren context over apparaten. Monitoring is waar al die signalen een gedeeld beeld en een gedeelde reactie krijgen.`}],kS=[{id:"intro",boardId:"sdwan",num:"01 / BRANCH",title:"Een bijkantoor zonder site-tunnel",desc:"Klassiek SD-WAN bouwt een IPsec-tunnel tussen kantoren waarna alles op het andere subnet bereikbaar is. Hier niet: elk apparaat op site01 krijgt zelf toegang via het overlay, en VyOS regelt alleen het lokale netwerk en QoS.",activeNodes:["device"],activeEdges:[],packet:null,meta:[["site","site01 (branch)"],["model","ZT-Branch (geen site-tunnel)"],["router","VyOS"],["overlay","NetBird per apparaat"]],log:[["00:00.01","info","site01: branch device boot. LAN up"],["00:00.02","info","site01: geen IPsec site-to-site actief"]],fullText:`Dit domein is bewust **gedescopet tot ZT-Branch**: de oorspronkelijke IPsec site-to-site stukken zijn geschrapt. In plaats van twee netwerken aan elkaar te knopen, behandelt het ontwerp een bijkantoor als een verzameling losse, individueel geverifieerde apparaten.

De winst: een ingebroken apparaat op site01 krijgt geen vrij zicht op het hele bedrijfsnetwerk, want er is geen impliciet vertrouwd subnet. VyOS blijft als lokale router relevant voor adressering en verkeersprioritering, maar is niet langer de vertrouwde poort.`},{id:"branch-netbird",boardId:"sdwan",num:"02 / AUTH",title:"Elk apparaat authenticeert apart",desc:"Het branch-apparaat doorloopt dezelfde identity-aware login als elke andere client en wordt een individuele peer op het NetBird-overlay. Er is geen IPsec en geen impliciet subnet: alleen dit apparaat, met zijn eigen groepen, krijgt toegang.",activeNodes:["device","vyos"],activeEdges:["device-vyos"],packet:{path:"device-vyos",color:"var(--cyan)",label:"LAN"},meta:[["auth","per apparaat (zie ZTNA)"],["peer","individuele NetBird-peer"],["geen","IPsec / impliciet subnet"],["groepen","bepalen toegang"]],log:[["00:00.05","info","device: OIDC login (Entra -> Zitadel -> NetBird)"],["00:00.06","ok","netbird: branch device als losse peer toegevoegd"],["00:00.07","info","site01: geen subnet-route gedeeld met core"]],fullText:`De kern van ZT-Branch: het bijkantoor erft de **ZTNA-keten** een-op-een. Het apparaat logt in via Entra ID, Zitadel normaliseert de groepen, en NetBird maakt er een individuele peer van.

Daardoor geldt op de branch precies hetzelfde beleid als overal: toegang is groep-gebonden en deny-by-default. Een laptop op site01 en een laptop thuis worden identiek behandeld, omdat de locatie geen vertrouwen meer geeft.`},{id:"vyos-qos",boardId:"sdwan",num:"03 / QoS",title:"VyOS markeert verkeer (DSCP)",desc:"VyOS op site01 verzorgt QoS via DSCP-markeringen: EF voor Teams-audio (realtime spraak), AF41 voor Teams-video, AF21 voor Teams-schermdelen. Zo krijgt latency-gevoelig verkeer voorrang op de uplink van het bijkantoor.",activeNodes:["vyos"],activeEdges:[],subActive:["qos-ef","qos-af41","qos-af21"],nodeStates:{vyos:"hit"},packet:null,meta:[["router","VyOS (site01)"],["EF","Teams audio (realtime)"],["AF41","Teams video"],["AF21","Teams schermdelen"]],log:[["00:00.10","info","vyos: classify flow -> Teams"],["00:00.11","ok","vyos: DSCP EF gemarkeerd. prioriteit op uplink"],["00:00.12","info","vyos: Teams-video -> AF41. Teams-schermdelen -> AF21"]],fullText:"Zero trust gaat over toegang, maar een bijkantoor heeft ook een **beperkte uplink** die verstandig verdeeld moet worden. Daar blijft VyOS voor zorgen met QoS.\n\nDSCP is een markering in de IP-header die routers vertelt hoe belangrijk een pakket is. `EF` (Expedited Forwarding) is voor Teams-audio — realtime spraak die niet mag haperen; `AF41` geeft Teams-video een gegarandeerde maar lagere prioriteit; `AF21` is voor Teams-schermdelen dat iets meer vertraging kan verdragen. Alle drie klassen worden door Intune NetworkQoSPolicy op het eindpunt gemarkeerd en door VyOS op eth0 gevormd."},{id:"reach-core",boardId:"sdwan",num:"04 / CORE",title:"Overlay naar de kerndiensten",desc:"Het gemarkeerde verkeer gaat via de WireGuard-overlay van NetBird naar de kerndiensten. De per-peer ACL bepaalt wat dit specifieke apparaat mag bereiken; al het overige blijft dicht (deny-by-default).",activeNodes:["vyos","netbird","core"],activeEdges:["vyos-netbird","netbird-core"],subActive:["peer"],packet:{path:"netbird-core",color:"var(--cyan)",label:"overlay"},meta:[["transport","NetBird. WireGuard"],["policy","per-peer ACL"],["core","ZTNA-beschermde diensten"],["default","deny-by-default"]],log:[["00:00.14","info","netbird: peer verzendt naar core via wt0"],["00:00.15","ok","netbird: ACL staat toegestane dienst toe"],["00:00.16","info","core: verbinding alleen voor wat de groep toelaat"]],fullText:`De reis eindigt op het overlay dat we uit ZTNA kennen. Omdat het branch-apparaat een gewone peer is, gelden dezelfde **per-peer ACL's**: het bereikt alleen de diensten die zijn groepen toestaan.

Er is geen tunnel die 'site01' als geheel met 'core' verbindt. Dat is precies de bedoeling, want het verkleint de aanvalsoppervlakte: er valt niets lateraal te ontdekken vanaf de branch dat niet expliciet is toegestaan voor dit ene apparaat.`},{id:"recap",boardId:"sdwan",num:"05 / RECAP",title:"Branch als losse peers",desc:"ZT-Branch afgerond: geen IPsec site-tunnel, elk apparaat authenticeert individueel op het NetBird-overlay met groep-gebonden ACL's, en VyOS verzorgt lokaal QoS via DSCP zodat realtime verkeer voorrang houdt.",activeNodes:["device","vyos","netbird","core"],activeEdges:["device-vyos","vyos-netbird","netbird-core"],packet:null,meta:[["toegang","per apparaat (ZTNA)"],["geen","IPsec / impliciet subnet"],["qos","VyOS DSCP. EF/AF41/AF21"],["overlay","NetBird per-peer ACL"]],log:[["00:00.20","ok","ztbranch: geen vertrouwd subnet op site01"],["00:00.20","ok","ztbranch: toegang identiteitsgebonden"],["00:00.20","ok","ztbranch: QoS borgt realtime verkeer"]],fullText:`De rode draad: **locatie geeft geen vertrouwen meer; identiteit wel**. Een bijkantoor is niet langer een vertrouwde zone maar een plek waar dezelfde zero-trust-regels gelden als overal.

Dit domein leunt volledig op ZTNA voor toegang en raakt monitoring/CASB voor detectie en respons. De enige branch-specifieke toevoeging is QoS via VyOS, omdat een fysieke locatie nu eenmaal een gedeelde uplink heeft die beheerd moet worden.`}],SS=[{id:"intro",boardId:"endpoint",num:"01 / ENDPOINT",title:"Een apparaat klaarmaken",desc:"Voordat een apparaat veilig mag deelnemen, moet het bekend en correct geconfigureerd zijn. Endpoint Enforcement zorgt dat elk corporate apparaat een identiteit krijgt en automatisch de juiste beveiligingsinstellingen ontvangt.",activeNodes:["device"],activeEdges:[],packet:null,meta:[["device","Windows endpoint"],["idp","Entra ID"],["mdm","Microsoft Intune"],["doel","identiteit + posture"]],log:[["00:00.01","info","endpoint: nieuw corp device, nog niet enrolled"],["00:00.02","info","endpoint: start Entra ID enrollment"]],fullText:`Endpoint Enforcement is het fundament onder de rest. Een ZTNA-overlay en SWG-inspectie hebben weinig waarde als de apparaten er zelf rommelig bij staan.

De twee stappen: het apparaat krijgt eerst een **identiteit** bij Entra ID (zodat het herkenbaar is in elke andere keten), en daarna een **posture** via Intune (de configuratie die het apparaat veilig en compatibel maakt met de rest van het platform).`},{id:"entra-join",boardId:"endpoint",num:"02 / JOIN",title:"Entra ID Join / Register",desc:"Het Windows-apparaat doet een Entra ID Join (of Register). Daarmee krijgt het een device-identiteit in de directory, los van de gebruiker. Die identiteit is wat later in de ZTNA-login en in policies aan dit specifieke apparaat gekoppeld wordt.",activeNodes:["device","entra"],activeEdges:["device-entra"],packet:{path:"device-entra",color:"var(--cyan)",label:"Join / Register"},meta:[["actie","Entra ID Join / Register"],["resultaat","device-identiteit in directory"],["scope","apparaat (los van gebruiker)"],["gebruik","ZTNA-login + policies"]],log:[["00:00.05","info","device: Entra ID Join gestart"],["00:00.06","ok","entra: device geregistreerd. object aangemaakt"],["00:00.07","info","entra: device geldt nu als bekend in directory"]],fullText:`Het verschil tussen **Join** en **Register**: een Entra ID Join maakt het apparaat volledig bedrijfseigendom in de directory, terwijl Register lichter is (bring-your-own). In beide gevallen ontstaat een **device-object** dat losstaat van de gebruiker.

Dat aparte apparaat-identiteit is belangrijk: policies kunnen zo eisen stellen aan het apparaat zelf, niet alleen aan wie inlogt. Een geldige gebruiker op een onbekend apparaat is iets anders dan diezelfde gebruiker op een enrolled, compliant apparaat.`},{id:"intune-push",boardId:"endpoint",num:"03 / PUSH",title:"Intune duwt 5 profielen",desc:"Zodra het apparaat bekend is, levert Intune automatisch 5 configuratieprofielen: de proxy via OMA-URI, het CA-certificaat, een firewall-profiel, QoS DSCP-markeringen en split-tunnel routes. Geen handmatige setup, alles via MDM.",activeNodes:["entra","intune"],activeEdges:["entra-intune"],packet:{path:"entra-intune",color:"var(--cyan)",label:"device identity"},meta:[["mdm","Microsoft Intune"],["trigger","device enrolled"],["profielen","5 (auto-push)"],["methode","OMA-URI + configprofielen"]],log:[["00:00.10","info","intune: device compliant -> profielen toewijzen"],["00:00.11","info","intune: 5 configuratieprofielen in de wachtrij"],["00:00.12","ok","intune: push gestart naar endpoint"]],fullText:`Intune is het **MDM** dat het apparaat zonder handwerk in de juiste staat brengt. Configuratie via een centrale push is reproduceerbaar en controleerbaar: elk apparaat krijgt exact dezelfde basis.

De vijf profielen samen vormen de brug naar de andere domeinen: ze zorgen dat het apparaat de proxy gebruikt, de inspectie vertrouwt, en zich netjes op het netwerk gedraagt. Zonder deze push zou een gebruiker handmatig dingen moeten instellen, met alle fouten en gaten van dien.`},{id:"profiles-active",boardId:"endpoint",num:"04 / POSTURE",title:"Profielen actief op het apparaat",desc:"De profielen landen op het apparaat en maken het pas echt onderdeel van het platform: het stuurt verkeer naar Squid (proxy), vertrouwt de SSL-Bump CA, heeft firewall-regels, markeert verkeer met DSCP en kent de split-tunnel routes naar het overlay.",activeNodes:["intune","device"],activeEdges:["intune-device"],subActive:["proxy","cacert","fw","qos","split"],nodeStates:{device:"active"},packet:{path:"intune-device",color:"var(--cyan)",label:"5 profielen",dur:5.5},meta:[["proxy","OMA-URI -> Squid 3128"],["ca-cert","vertrouw SASE-PoC-CA (SSL Bump)"],["firewall","host-regels actief"],["qos + split","DSCP + routes naar overlay"]],log:[["00:00.14","ok","device: proxy ingesteld -> 100.70.154.79:3128"],["00:00.15","ok","device: SASE-PoC-CA vertrouwd (SSL Bump werkt)"],["00:00.16","ok","device: firewall + QoS + split-tunnel toegepast"]],fullText:`Nu valt alles op zijn plek. Elk profiel haakt in op een ander domein:

- **proxy (OMA-URI)** stuurt al het webverkeer naar Squid, zodat de SWG-inspectie niet te omzeilen is.
- **CA-cert** laat het apparaat het dynamische certificaat van SSL Bump vertrouwen, anders zou elke bumped site een certificaatfout geven.
- **firewall** geeft host-niveau bescherming.
- **QoS DSCP** zorgt dat verkeer al bij de bron correct gemarkeerd is (sluit aan op VyOS in ZT-Branch).
- **split-tunnel routes** bepalen wat via het NetBird-overlay gaat en wat direct.

Het CA-cert profiel is de stilzwijgende voorwaarde voor de hele SWG: zonder dat vertrouwen werkt de TLS-interceptie niet schoon.`},{id:"recap",boardId:"endpoint",num:"05 / RECAP",title:"Bekend, compliant, klaar",desc:"Endpoint-keten afgerond: Entra ID geeft het apparaat een identiteit, Intune duwt automatisch 5 profielen (proxy, CA-cert, firewall, QoS, split-tunnel), en daarmee is het apparaat klaar om vertrouwd deel te nemen aan ZTNA en de SWG-inspectie.",activeNodes:["device","entra","intune"],activeEdges:["device-entra","entra-intune","intune-device"],packet:null,meta:[["identiteit","Entra ID Join / Register"],["posture","Intune. 5 profielen"],["enabler swg","proxy + CA-cert"],["enabler ztna","split-tunnel routes"]],log:[["00:00.20","ok","endpoint: device bekend en compliant"],["00:00.20","ok","endpoint: posture afgedwongen via MDM"],["00:00.20","ok","endpoint: klaar voor ZTNA + SWG"]],fullText:`De rode draad: **een apparaat verdient geen vertrouwen omdat het bestaat, maar omdat het bekend en correct geconfigureerd is**.

Dit domein is de basis waarop de rest rust. De proxy- en CA-cert-profielen maken de SWG mogelijk; de split-tunnel routes maken het ZTNA-overlay mogelijk; de QoS-markering sluit aan op ZT-Branch. Endpoint Enforcement levert dus niet alleen veilige apparaten, het levert de voorwaarden waaronder alle andere domeinen kunnen werken.`}],wS=[{id:"intro",boardId:"tproxy",num:"01 / INTRO",title:"De bypass-gap: wie pakt PAC niet op?",desc:"De explicit proxy (WPAD/PAC) werkt alleen als een applicatie de systeem-proxyconfiguratie respecteert. Apps met een eigen netwerk-stack negeren die instelling en sturen hun verkeer rechtstreeks door de NetBird-tunnel, buiten Squid om.",activeNodes:["client"],activeEdges:[],packet:null,meta:[["probleem","bypass van explicit proxy"],["betrokken apps","Spotify. Teams services. PowerShell"],["effect","geen Squid-log. geen DLP. geen URL-filter"],["oplossing","TPROXY op linuxpop01"]],log:[["00:00.01","info","niet-managed device: TCP/443 → internet (direct, geen proxy)"],["00:00.02","hit","squid: 0 log entries voor dit device — verkeer omzeilt proxy"]],fullText:`Een **explicit proxy** werkt op basis van medewerking van de client. De PAC-file vertelt de browser welke proxy hij moet gebruiken, maar alleen applicaties die de WinINET-systeemproxy respecteren sturen hun verkeer daadwerkelijk via Squid.

Apps met een eigen netwerkstack, zoals Spotify, Teams-systeemservices of PowerShell-scripts, omzeilen die instelling volledig. Ze openen een directe TCP-verbinding via de NetBird-overlay, langs linuxpop01 naar het internet. Dat verkeer verschijnt nooit in de Squid-logs, DLP ziet het niet en er is geen Identity Bridge-trace.

Dit raakt twee rubriekeisen direct: 'volledig door de SWG geforceerd' en 'identiteitsgebonden toegang'. Zolang er verkeer buiten Squid om loopt, zijn beide eigenschappen niet sluitend.

De transparante proxy is de oplossing voor dit scenario: linuxpop01 vangt het verkeer af voordat het de node verlaat, zonder dat de client iets hoeft te configureren.`},{id:"pf-redirect",boardId:"tproxy",num:"02 / IPTABLES",title:"iptables vangt het verkeer op",desc:"linuxpop01 heeft twee iptables-regels in de mangle-tabel PREROUTING: TCP/80 en TCP/443 die binnenkomen op wt0 (WireGuard) krijgen een TPROXY-mark en worden doorgestuurd naar de lokale Squid op poort 3129 respectievelijk 3130.",activeNodes:["client","linuxpop"],activeEdges:["client-linuxpop"],subActive:["mangle","mangle443","iprule"],nodeStates:{linuxpop:"active"},packet:{path:"client-linuxpop",color:"var(--cyan)",label:"TCP/443"},meta:[["interface","wt0 (WireGuard overlay)"],["regel 1","TPROXY TCP/80 → 127.0.0.1:3129"],["regel 2","TPROXY TCP/443 → 127.0.0.1:3130"],["routing","ip rule fwmark 1 → table 100 (local 0/0 via lo)"]],log:[["00:00.05","info","linuxpop01: pakket binnenkomend op wt0 (src 100.86.x.x:54321 dst 104.16.x.x:443)"],["00:00.05","info","iptables mangle: TPROXY match TCP/443 → fwmark 1"],["00:00.06","ok","ip rule: fwmark 1 → table 100 → local socket"]],fullText:`**iptables TPROXY** werkt fundamenteel anders dan gewone NAT of masquerade. Bij NAT schrijft de kernel het bestemmingsadres om vóór het pakket de socket bereikt. Bij TPROXY blijven bron- en bestemmingsadres intact: de kernel levert het pakket aan een lokale socket terwijl de originele adressen zichtbaar blijven.

De regel staat in de **mangle-tabel**, in de PREROUTING-keten: dat is vóór de routeringsbeslissing. Zo wordt het pakket naar de lokale Squid-socket gestuurd zonder de normale forwarding-pipeline te doorlopen. Er is geen tweede router tussen client en proxy die de return-path kan verstoren.

Een ip rule-entry koppelt de fwmark aan een aparte routeringstabel (\`table 100\`). Die tabel heeft één entry: \`local 0.0.0.0/0 via lo\`. Dat zorgt dat het gemarkeerde pakket als lokaal wordt beschouwd en de kernel het aan het lokale Squid-proces overhandigt.

De regel geldt alleen voor TCP/80 en TCP/443. Overig verkeer, zoals UDP/51820 voor de WireGuard-tunnel zelf, wordt niet onderschept.`},{id:"tproxy-squid",boardId:"tproxy",num:"03 / TPROXY",title:"Squid ontvangt verbinding met echt bron-IP",desc:"Dankzij IP_TRANSPARENT ontvangt de Squid-listener op linuxpop01 het pakket met het originele bron-IP van de client (de NetBird overlay-IP) en het originele bestemmingsadres. Squid logt de echte client-IP, wat de Identity Bridge mogelijk maakt.",activeNodes:["linuxpop","squid"],activeEdges:["linuxpop-squid"],subActive:["srcip","bump"],nodeStates:{squid:"active"},packet:{path:"linuxpop-squid",color:"var(--cyan)",label:"TPROXY → local socket"},meta:[["src IP in access.log","100.86.x.x (overlay IP)"],["socket optie","IP_TRANSPARENT"],["ssl_bump","peek → bump (dezelfde SASE-PoC-CA)"],["identiteit","overlay IP → Entra ID user via Identity Bridge"]],log:[["00:00.07","info","squid[3130]: accept (tproxy). src=100.86.233.213:54321 dst=104.16.x.x:443"],["00:00.08","info","squid: TLS ClientHello: SNI=example.com"],["00:00.08","ok","squid: ssl_bump peek → bump. CA=SASE-PoC-CA"]],fullText:"De **IP_TRANSPARENT** socket-optie is het sleutelstuk van TPROXY. Normaal kan een socket alleen verbindingen accepteren op het eigen IP-adres van de machine. Met IP_TRANSPARENT mag de socket verbindingen accepteren die voor een willekeurig IP bedoeld zijn: de kernel bewaart de originele bron- en bestemmingsadressen en geeft die door aan het luisterende proces.\n\nVoor Squid betekent dit dat het access.log het echte overlay-IP van de client toont, bijvoorbeeld `100.86.233.213`, in plaats van het IP van linuxpop01. Dat is de voorwaarde voor de **Identity Bridge**: de `external_acl_type` met `%SRC` kan het overlay-IP opzoeken in de NetBird API en zo de Entra ID-gebruiker achterhalen.\n\nZonder IP_TRANSPARENT zou de source IP verloren gaan door masquerade, zoals in de diagnostische testen (T-TP4) bleek. Met masquerade ON werkte de proxy wel, maar de Identity Bridge was onbruikbaar omdat elk verzoek het IP van linuxpop01 toonde.\n\nDe SSL Bump-configuratie is identiek aan de explicit proxy op pop01: dezelfde SASE-PoC-CA, dezelfde peek-and-bump-modus. Een client met de CA in het vertrouwensanker merkt geen verschil."},{id:"inspectie",boardId:"tproxy",num:"04 / ICAP",title:"Inspectie via dezelfde ICAP-keten",desc:"Na het bump stuurt Squid het ontsleutelde verkeer naar de ICAP-keten: ClamAV op pop01 (RESPMOD, poort 1344) voor malware-detectie en de Python DLP-service op mgmt01 (REQMOD, poort 1345) voor data-lekdetectie. De inspectielogica is identiek aan de SWG.",activeNodes:["squid","icap"],activeEdges:["squid-icap"],subActive:["clamav","dlp"],nodeStates:{icap:"active"},packet:{path:"squid-icap",color:"var(--amber)",label:"ICAP RESPMOD + REQMOD"},meta:[["ClamAV","RESPMOD op pop01:1344 (response-body)"],["Python DLP","REQMOD op mgmt01:1345 (request-body)"],["YARA","Confidential. IBAN. BSN. AWS-key"],["actie bij hit","ICAP 403 → Squid blokkeert verbinding"]],log:[["00:00.10","info","squid → icap1 (RESPMOD): OPTIONS OK. ClamAV 3.6M+ sigs"],["00:00.11","info","squid → icap2 (REQMOD): OPTIONS OK. Python DLP actief"],["00:00.12","ok","icap1: response body clean (geen malware)"],["00:00.12","ok","icap2: request body clean (geen DLP-hit)"]],fullText:`De kracht van TPROXY is dat het de volledige inspectie-pipeline hergebruikt zonder die te dupliceren. Squid op linuxpop01 communiceert over het netwerk met dezelfde ICAP-services die de explicit proxy ook gebruikt.

**ClamAV** draait op pop01 en ontvangt via RESPMOD de response-body van de server: het antwoord dat de client anders ongeïnspecteerd zou ontvangen. ClamAV controleert dit op malware-signaturen en YARA-regels (vertrouwelijke bestanden, IBAN, BSN, AWS-sleutels).

**Python DLP** draait op mgmt01 en ontvangt via REQMOD de request-body: de gegevens die de client naar de server wil sturen. Een positieve match blokkeert de upload voordat die de server bereikt.

Als een van beide ICAP-services een 403 teruggeeft, blokkeert Squid de verbinding en stuurt een leesbare foutmelding naar de client. Het verkeer bereikt de bestemming nooit.

Het enige verschil met de explicit proxy: ClamAV wordt via het netwerk bereikt (pop01:1344) in plaats van lokaal, omdat ClamAV op pop01 draait en niet op linuxpop01. DLP op mgmt01 was ook voor de explicit proxy al een netwerkverbinding.`},{id:"verschil-explicit",boardId:"tproxy",num:"05 / VERGELIJKING",title:"WPAD/PAC versus TPROXY: twee lagen",desc:"WPAD/PAC en TPROXY zijn complementair, niet concurrerend. WPAD/PAC configureert compliant verkeer (browser, WinINET-apps). TPROXY is de afdwing-grens voor al het overige: het vangt al het TCP-verkeer op dat via linuxpop01 loopt, ongeacht de client-configuratie.",activeNodes:["client","linuxpop","squid","icap"],activeEdges:["client-linuxpop","linuxpop-squid","squid-icap"],packet:null,meta:[["WPAD/PAC","browser + WinINET-apps → pop01:3128"],["TPROXY","alle overige TCP/80+443 → linuxpop01:3129/3130"],["overlap","geen: TPROXY vangt op wat PAC niet bereikt"],["status TPROXY","architectureel gevalideerd. nog niet live op sandbox"]],log:[["00:00.15","ok","wpad: browser → squid pop01:3128 (PAC-instelling gerespecteerd)"],["00:00.15","ok","tproxy: Spotify → squid linuxpop01:3130 (transparant onderschept)"],["00:00.16","info","beide paden: zelfde ICAP-keten. zelfde CA. zelfde logging"]],fullText:`Een veelvoorkomend misverstand: de transparante proxy vervangt WPAD/PAC. Dat klopt niet. Ze dienen elk een ander doel.

**WPAD/PAC** is het configuratiemechanisme voor meewerkende clients. Het distribueert proxy-instellingen via een PAC-script. Browsers en WinINET-apps volgen die instelling en sturen hun verkeer naar Squid op pop01 (poort 3128). Dat is de primaire route, en ook het SASE-patroon: Zscaler Client Connector werkt op precies dezelfde manier.

**TPROXY** is de afdwing-laag voor alles wat PAC niet bereikt. Het onderschept verkeer op netwerkniveau, vóór de forwarding-beslissing, zonder dat de applicatie iets hoeft te weten of te configureren. Niet-managed devices, apps met een eigen netwerkstack en BYOD-apparaten worden allemaal door dezelfde inspectie-pipeline geleid.

De twee paden zijn daarmee **complementair**: WPAD/PAC dekt het merendeel van het verkeer af, TPROXY sluit de resterende gaten. Samen zorgen ze dat de claim 'volledig door de SWG geforceerd' ook voor niet-meewerkende clients geldt.

Belangrijke nuance voor dit project: TPROXY op linuxpop01 is architectureel gevalideerd op de parallelle stack (de diagnostische sessie bewees dat Option D correct is), maar is nog niet live geïmplementeerd op de sandbox. De managed-device aanpak via Intune (V41) dekte de primaire behoefte, waardoor sessieprioritering de TPROXY-implementatie uitstelde.`},{id:"recap",boardId:"tproxy",num:"06 / RECAP",title:"Transparante proxy afgerond",desc:"Recap: niet-managed devices sturen verkeer via linuxpop01 (exit node). iptables TPROXY vangt TCP/80 en 443 op in mangle PREROUTING, levert de verbinding met intact bron-IP aan de lokale Squid, die bumpt, ICAP-inspecteert en logt alsof het expliciet verkeer is.",activeNodes:["client","linuxpop","squid","icap","internet"],activeEdges:["client-linuxpop","linuxpop-squid","squid-icap","squid-internet"],packet:null,meta:[["onderschepping","iptables mangle PREROUTING. IP_TRANSPARENT"],["src IP bewaard","ja → Identity Bridge werkt"],["inspectie","ClamAV + Python DLP (zelfde als SWG)"],["complementair","WPAD/PAC (compliant) + TPROXY (enforcement)"]],log:[["00:00.20","ok","tproxy: bypass-gap gesloten voor TCP/80+443"],["00:00.20","ok","tproxy: src IP bewaard. Identity Bridge beschikbaar"],["00:00.20","ok","tproxy: ICAP-keten actief (ClamAV + DLP)"],["00:00.20","info","tproxy: architectureel gevalideerd. sandbox: gepland"]],fullText:`De rode draad: **onderschepping op netwerkniveau, inspectie via de bestaande pipeline**.

linuxpop01 fungeert als exit node voor het NetBird-overlay. Alle niet-managed devices sturen hun verkeer via deze node. iptables TPROXY onderschept TCP/80 en TCP/443 in de mangle PREROUTING-keten, vóór de forwarding-beslissing, en levert de verbinding aan de lokale Squid. Dankzij IP_TRANSPARENT ziet Squid het echte overlay-IP van de client: de Identity Bridge blijft bruikbaar.

Vanaf Squid is het pad identiek aan de explicit proxy: SSL Bump met dezelfde CA, ICAP RESPMOD naar ClamAV en ICAP REQMOD naar Python DLP. De inspectielogica is niet gedupliceerd maar hergebruikt over het netwerk.

Dit domein sluit direct aan op SWG (zelfde Squid + ICAP), Identity Bridge (overlay-IP als sleutel) en de diagnosebevinding dat Option C architectureel kapot is vanwege de asymmetrische return path. Option D, de keuze voor TPROXY op de exit node zelf, lost dat fundamentele probleem op.`}],AS=[{id:"intro",boardId:"detection",num:"01 / INTRO",title:"Gedragsanalyse naast signature-detectie",desc:"Suricata matcht bekende aanvalspatronen per pakket. Maar een C2-server die nog op geen enkele lijst staat, loopt daar ongemerkt doorheen. Zeek en RITA vullen die blinde vlek in: ze kijken niet naar inhoud maar naar gedragspatronen over tijd.",activeNodes:["tap"],activeEdges:[],packet:null,meta:[["suricata","signature-based. 79.620+ regels. bekende dreigingen"],["zeek + rita","behavioral. patronen over tijd. onbekende dreigingen"],["aanpak","passieve tap. geen inline. geen blokkering vanuit Zeek"],["stack","parallelle stack (mgmt01 192.168.122.20)"]],log:[["00:00.01","info","zeek: passieve sensor actief op ens4 + gre-tunnels"],["00:00.02","info","rita: ClickHouse backend bereikbaar. klaar voor import"]],fullText:`Signature-gebaseerde detectie, zoals Suricata die doet, is effectief voor bekende dreigingen. Elke regel beschrijft een specifiek patroon in een pakket of flow: als het pakket matcht, is er een hit. Dat werkt uitstekend voor bekende malware-families, exploit-kits en bekende C2-infrastructuur die al in een ruleset staat.

Maar een aanvaller die zijn eigen C2-domein registreert en nog nergens op een blacklist staat, glijdt hier gewoon doorheen. Geen signature-match, geen alert.

**Gedragsanalyse** pakt dit anders aan. In plaats van te vragen 'matcht dit pakket een patroon?' vraagt het: 'gedraagt dit gesprek zich zoals menselijk verkeer?' Malware die elke tien minuten precies twee pakketjes stuurt, heeft een statistisch regelmatig patroon dat een gebruiker nooit vertoont. Dat patroon is zichtbaar in de flowdata, ongeacht de inhoud of het domein.

Zeek en RITA zijn de implementatie van die gedachte: Zeek verzamelt de data passief, RITA scoort het gedrag over tijd. De sensor staat op de parallelle stack en is niet inline: hij blokkeert niets zelf, maar voedt een DNS-blokkering via RPZ.`},{id:"zeek-capture",boardId:"detection",num:"02 / ZEEK",title:"Zeek parsed alle flows op het netwerk",desc:"Zeek draait als multi-worker cluster op mgmt01 en luistert op drie segmenten tegelijk: de core via een Hub die alle frames naar ens4 stuurt, en twee remote segmenten via GRE-tunnels. Per flow schrijft Zeek één gestructureerde logregel in conn.log, dns.log, ssl.log en andere logbestanden.",activeNodes:["tap","zeek"],activeEdges:["tap-zeek"],subActive:["hub","gre","conn","dns","ssl"],nodeStates:{zeek:"active"},packet:{path:"tap-zeek",color:"var(--cyan)",label:"PCAP / promiscuous"},meta:[["ens4","core-segment via Hub1 (flood naar monitor NIC)"],["gre-site1","Site1 via VyOS kernel mirror → GRE"],["gre-dc","DC via GRE (partieel. geen FreeBSD mirror)"],["output","/opt/zeek/logs/ (hourly rotatie)"]],log:[["00:00.05","ok","zeek worker-core: ens4 UP. promiscuous. offloading OFF"],["00:00.05","ok","zeek worker-site1: gre-site1 UP. GRE decapsulatie actief"],["00:00.06","info","zeek: conn.log schrijft 1 regel per TCP/UDP flow"],["00:00.06","info","zeek: dns.log schrijft 1 regel per DNS-transactie"]],fullText:`**Zeek** is een passieve sensor: het zit niet inline en blokkeert niets. Het leest frames van netwerkinterfaces in promiscuous-modus, reconstrueert TCP-streams en identificeert het applicatieprotocol. Per flow of DNS-transactie schrijft het één gestructureerde JSON-logregel.

De uitdaging in dit lab is dat geen enkel enkelvoudig interface het hele netwerk ziet. De oplossing is een **multi-worker cluster**: één worker per capture-interface, met een manager die alle output samenvoegt.

Voor de **core-segment** werd GNS3's Ethernet Switch vervangen door een Hub. Een switch stuurt unicast-frames alleen naar de bestemmingspoort (na MAC-learning), waardoor een monitor-NIC niets ziet. Een Hub stuurt alle frames naar alle poorten, wat functioneel equivalent is aan een SPAN-poort.

De **remote segmenten** bereiken mgmt01 via GRE-tunnels. VyOS heeft een ingebouwde kernel-mirror (\`mirror ingress/egress\`) die alle frames op een interface kopieert naar een GRE-tunnel. OPNsense (FreeBSD) heeft geen equivalent, dus het DC-segment is alleen partieel zichtbaar.
