site_name: Security Project Wiki
site_url: https://ArneVDA-AP.github.io/sase-poc-wiki/
site_description: SASE PoC — OPNsense / Squid / ClamAV / c-icap / NetBird
site_author: Arne
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.tooltips
    - toc.follow

plugins:
  - search:
      lang:
        - en
        - nl
  - tags:
      tags_file: tags.md
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: nl
          name: Nederlands
          build: true
