site_name: Security Project Wiki
site_url: https://ArneVDA-AP.github.io/sase-poc-wiki/
site_description: SASE PoC — OPNsense / Squid / ClamAV / c-icap / NetBird
site_author: Arne
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.tooltips
    - toc.follow

plugins:
  - search:
      lang:
        - en
        - nl
  - tags:
      tags_file: tags.md
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: nl
          name: Nederlands
          build: true
          nav_translations:
            Home: Startpagina
            Architecture: Architectuur
            Components: Componenten
            Concepts: Concepten
            Decisions: Beslissingen
            Findings: Bevindingen
            Tags: Tags
            Log: Logboek
            Squid: Squid
            ClamAV / c-icap: ClamAV / c-icap
            Python DLP: Python DLP
            Suricata: Suricata
            ioc2rpz: ioc2rpz
            NetBird: NetBird
            Caddy: Caddy
            GNS3: GNS3
            VyOS: VyOS
            SASE: SASE
            Zero Trust: Zero Trust
            ICAP: ICAP
            SSL Bump: SSL Bump
            WPAD/PAC: WPAD/PAC
            RPZ: RPZ
            DLP: DLP
            WPAD vs Transparent Proxy: WPAD vs Transparante Proxy
            Two-Layer DLP: Twee-laags DLP
            ioc2rpz vs Unbound native: ioc2rpz vs Unbound native
            BIND as TSIG Intermediary: BIND als TSIG-tussenstap
            IDS vs IPS: IDS vs IPS
            Suricata WAN+LAN: Suricata WAN+LAN
            GNS3 vs EVE-NG: GNS3 vs EVE-NG
            Zitadel as IdP Broker: Zitadel als IdP-broker
            CA + Posture Hybrid: CA + Posture Hybride
            wt0 pf rdr limitation: wt0 pf rdr beperking
            pre-auth ssl-bump params: pre-auth ssl-bump parameters
            Squid clearlog destroys file: Squid clearlog vernietigt bestand
            StevenBlack incompatible: StevenBlack incompatibel
            Suricata interface default bug: Suricata interface default bug
            Suricata Netmap/virtio: Suricata Netmap/virtio
            Unbound no TSIG: Unbound geen TSIG
            Unbound config path: Unbound config-pad
            ioc2rpz GUI JS bug: ioc2rpz GUI JS bug
            pyicap collections bug: pyicap collections bug
            iptables FORWARD ordering: iptables FORWARD-volgorde
            NetBird primary nameserver: NetBird primaire nameserver
            NetBird config zero bytes: NetBird config nul bytes
            Docker volume recreation: Docker volume hermaak

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - abbr
  - toc:
      permalink: true

