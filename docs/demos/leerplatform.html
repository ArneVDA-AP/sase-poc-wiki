 beslissing:**\\n\\n1. Herhaal de vraag in je eigen woorden\\n2. Noem het probleem dat de keuze vereiste\\n3. Noem minstens één verworpen alternatief en waarom het afviel\\n4. Geef de gekozen oplossing en de doorslaggevende factor\\n5. Noem één consequentie (\\"dat betekent wel dat...\\")\\n\\n**Extra keuzes om te kennen:**\\n- GNS3 boven EVE-NG: multi-user client-server model voor 4 teamleden\\n- NATS `accounts{}` in plaats van `authorization{}`: JetStream API-permissies werken alleen met accounts\\n\\n**Tip voor de verdediging:** als je een vraag niet weet, zeg: \\"Dat raakt aan onze beslissing over X, waar we Y en Z hebben overwogen.\\" Dat koopt je denktijd en toont dat je het beslissingslandschap kent.","nodeIds":["article:decisions/gns3-vs-eveng.nl","article:decisions/nats-accounts-auth.nl","domain:ztna","domain:swg","domain:casb","domain:sdwan","domain:monitoring","domain:endpoint"]}]},{"id":"evidence","name":"Bewijs & Integratie","description":"Hoe weten we dat het werkt, en hoe hangt alles samen? Van losse tests naar één bewezen, geïntegreerde keten.","steps":[{"order":1,"title":"1. Van \'het zou moeten werken\' naar bewijs","description":"**Bouwt voort op:** Tour 1 (je kent de pilaren) en Tour 2 (je kent de keuzes). Nu de moeilijkste vraag: *hoe weten we dat dit echt werkt?*\\n\\nEen expert gelooft geen architectuurplaatje. Hij wil bewijs: een test die slaagt, een log die de blokkade toont, een gemeten resultaat. Deze tour koppelt elke claim aan bewijs.\\n\\n**Het bewijsraamwerk:** het project draait op een testkader van 15 acceptatietests (F1-F15) plus 13 extra tests (T-A1-T-A13). Elke test heeft een commando, een verwachte uitkomst, en een gemeten uitkomst. Samen dekken ze alle vijf rubriek-pilaren.\\n\\n**Kernidee van deze tour:** bewijs is niet alleen \'de test slaagt\'. Bewijs is ook *integratie*: dat de componenten geen losse eilanden zijn maar één keten vormen die end-to-end één verzoek verwerkt.","nodeIds":["article:testing/acceptance-tests.nl","article:overview/architecture.nl","domain:ztna","domain:swg","domain:casb","domain:sdwan","domain:monitoring","article:runbooks/01-lab-environment.nl","article:components/gns3.nl","article:findings/docker-volume-recreation.nl","article:findings/curl-ssl-no-revoke.nl","article:findings/gns3-host-ram-overcommit.nl"],"languageLesson":"**Acceptatietest:** een vooraf afgesproken test met een vast commando en een vaste verwachte uitkomst. Slaagt hij, dan is een functie aantoonbaar \'opgeleverd\': geen mening, maar een meetbaar feit."},{"order":2,"title":"2. SWG-bewijs: al het verkeer ècht door de proxy","description":"**Hoe weten we dat dit werkt?** De eerste SWG-claim is dat er geen local breakout is: al het verkeer wordt geforceerd door de Secure Web Gateway.\\n\\n**Het bewijs:** test F1 toont `InterfaceAlias: wt0`, dus al het verkeer verlaat het apparaat via de WireGuard-tunnel. Test F5 toont dat `curl -x http://100.70.154.79:3128` het verkeer door Squid stuurt. Het PAC-bestand geeft `PROXY 100.70.154.79:3128` terug voor àlle externe bestemmingen.\\n\\n**Hoe hangt dit samen?** De forcering komt niet van de proxy zelf maar van Intune: het PAC-bestand wordt via MDM afgedwongen zodat de gebruiker het niet kan uitschakelen. Endpoint en SWG werken samen: de ene dwingt af wat de andere inspecteert.\\n\\n**Waar het zwak is, eerlijk:** dc01 (een serverworkload, geen browser) gebruikt pop01 als gateway maar gaat niet door Squid. Dat is een bewuste scope-keuze, geen gat: het staat expliciet in de architectuur.","nodeIds":["article:components/squid.nl","article:concepts/wpad-pac.nl","domain:swg","flow:web-request","step:squid-receive","article:runbooks/03-proxy-wpad.nl","article:findings/squid-clearlog-destroys-file.nl","article:findings/squid-overlay-bind-race.nl"]},{"order":3,"title":"3. SWG-bewijs: TLS-decryptie en malware-detectie","description":"**Hoe weten we dat dit werkt?** Inspectie op versleuteld verkeer (DPI) is de zwaarste SWG-eis: TLS-decryptie + malware-detectie.\\n\\n**Het bewijs:** test F6 toont dat na SSL Bump de certificaatuitgever \'SASE PoC\' is in plaats van het origineel. De TLS-verbinding wordt dus echt opengebroken en heringepakt. Test F7 toont dat een EICAR-testbestand wordt geblokkeerd via ClamAV/c-icap (RESPMOD): Squid geeft een 403 en het antwoord is de 8245-byte blokkeringspagina in plaats van het 68-byte EICAR-bestand.\\n\\n**Hoe hangt dit samen?** Decryptie en scanning zijn twee schakels in dezelfde keten: Squid breekt de TLS open (SSL Bump), geeft de gedecodeerde inhoud via ICAP door aan ClamAV, en blokkeert op diens oordeel. Zonder decryptie zou de scanner alleen versleutelde ruis zien.\\n\\n**Eerlijke nuance:** sommige domeinen (Microsoft-login) worden bewust *niet* gebumpt: test B4 toont daar het originele Microsoft-certificaat. Dat is geen lek maar een noodzakelijke uitzondering voor cert-pinning.","nodeIds":["article:concepts/ssl-bump.nl","article:components/clamav-cicap.nl","domain:swg","flow:web-request","step:ssl-bump-decrypt","step:icap-clamav","article:findings/pre-auth-ssl-bump-params.nl","article:findings/pyicap-collections-bug.nl"],"languageLesson":"**EICAR:** een onschadelijk standaard-testbestand dat élke antivirus herkent als \'malware\'. Zo test je een scanner veilig: je triggert detectie zonder echte schade te kunnen aanrichten."},{"order":4,"title":"4. SWG-bewijs: DLP in twee richtingen","description":"**Hoe weten we dat dit werkt?** Data Loss Prevention moet voorkomen dat gevoelige data weglekt, zowel bij downloads als uploads.\\n\\n**Het bewijs, drie tests:** T-A1 toont dat een download met een CONFIDENTIAL-label wordt geblokkeerd via YARA. T-A2 toont dat de drempel werkt: vier creditcardnummers in een POST blokkeren, één laat door (StructuredDataDetection). T-A3 toont dat een Luhn-geldige creditcard in een upload-POST wordt geblokkeerd door de Python-DLP via REQMOD.\\n\\n**Hoe hangt dit samen?** Twee DLP-lagen dekken twee richtingen die één scanner niet samen aankan: ClamAV ziet de download (RESPMOD), de Python-DLP parseert de upload-velden (REQMOD). Squid roept ze sequentieel in dezelfde keten aan.\\n\\n**Waarom de drempel slim is:** één creditcardnummer kan toeval zijn (een ordernummer dat toevallig de Luhn-test haalt). Pas vanaf meerdere treffers is het een echt lek. De drempel vermindert valse alarmen: een teken van doordachte engineering, geen ruwe match.","nodeIds":["article:components/python-dlp.nl","article:concepts/dlp.nl","domain:swg","flow:web-request","step:icap-dlp","article:runbooks/04-malware-dlp.nl"]},{"order":5,"title":"5. DNS-bewijs: dezelfde filter, drie netwerkpaden","description":"**Hoe weten we dat dit werkt?** DNS-filtering op basis van threat intelligence moet werken ongeacht waar de client zit.\\n\\n**Het bewijs, één test op drie plekken:** bij T-A4 geeft een geblokkeerd domein NXDOMAIN mét aa-flag lokaal op pop01. T-A5 toont dezelfde NXDOMAIN vanaf mobile01 via de NetBird-overlay. T-A6 toont dezelfde NXDOMAIN vanaf dc01 via de DC-LAN. Drie verschillende paden, één consistent resultaat.\\n\\n**Hoe hangt dit samen?** De data komt uit een keten: URLhaus + ThreatFox feeds → ioc2rpz → TSIG-beveiligde zone-transfer naar BIND → Unbound\'s RPZ-module. 71.767 records, automatisch ververst. De client merkt niets van die keten: hij krijgt gewoon NXDOMAIN.\\n\\n**Waarom de aa-flag bewijs is:** de aa-flag betekent dat de blokkade van *onze eigen* resolver komt, niet van een upstream die toevallig hetzelfde antwoordt. Dat bewijst dat onze RPZ-zone de beslissing nam.","nodeIds":["article:components/ioc2rpz.nl","article:concepts/rpz.nl","domain:swg","flow:dns-lookup","step:dns-query","step:rpz-check","article:runbooks/06-dns-threat-intel.nl","article:findings/unbound-config-path.nl","article:findings/ioc2rpz-gui-js-bug.nl","article:findings/stevenblack-incompatible.nl"],"languageLesson":"**NXDOMAIN:** het DNS-antwoord \'dit domein bestaat niet\'. RPZ misbruikt dit bewust: een gevaarlijk domein bestaat technisch wél, maar onze resolver doet alsof het niet bestaat, zodat de verbinding nooit wordt opgezet."},{"order":6,"title":"6. ZTNA-bewijs: toegang die standaard dicht is","description":"**Hoe weten we dat dit werkt?** Het Zero Trust-model belooft dat er geen netwerk-exposure is: je krijgt alleen wat je identiteit toestaat.\\n\\n**Het bewijs, een positieve én een negatieve test:** F4 toont dat de DC-LAN bereikbaar is via NetBird Networks mét groepslidmaatschap. F8 is de tegenproef: een niet-ingeschreven apparaat heeft geen route naar 10.0.0.0/24, dus de bestemming is onbereikbaar. De tunnel (F1) staat met `wt0`, peer-count 1/1 Connected.\\n\\n**Hoe hangt dit samen?** De isolatie komt uit een elegante truc (zie [Finding: DC-LAN isolatie](article:findings/dc-lan-isolation-route-acl.nl)): een lege route-ACL-groep. Wie geen expliciete groepsmatch heeft, krijgt géén toegang, terwijl de route wel bestaat. Deny-by-default zonder extra firewallregels.\\n\\n**Waarom de negatieve test telt:** iedereen kan tonen dat toegang wérkt. Een expert wil zien dat toegang *faalt* voor wie geen recht heeft. F8 is daarom het sterkere bewijs.","nodeIds":["article:components/netbird.nl","article:findings/dc-lan-isolation-route-acl.nl","domain:ztna","flow:branch-access","step:netbird-tunnel","article:runbooks/02-ztna-overlay.nl","article:findings/netbird-config-zero-bytes.nl","article:findings/overlay-ip-instability.nl","article:findings/wt0-pf-rdr-limitation.nl"]},{"order":7,"title":"7. ZTNA-bewijs: identiteit + context als drie poorten","description":"**Hoe weten we dat dit werkt?** Zero Trust eist meer dan identiteit alleen: ook context (geo, device posture) telt mee.\\n\\n**Het bewijs:** F2 toont de OIDC-keten: NetBird → Zitadel → Entra ID → JWT met groepsclaims. De peer verschijnt met zijn Entra ID-gebruikersnaam. F3 toont de vijf Conditional Access-policies (MFA, geo-block, legacy-auth, risk-based, compliant device) plus Intune-compliance (OS-versie, Defender, firewall).\\n\\n**Hoe hangt dit samen?** Dit is het drie-poortenmodel uit Tour 1, nu bewezen: Poort 1 (identiteit, Entra CA), Poort 2 (apparaat, Intune), Poort 3 (inhoud, de SWG-keten). De Identity Bridge koppelt poort 1 aan poort 3: hij vertaalt de overlay-IP terug naar de persona-groep (dezelfde identiteitsgroepen uit Tour 1) zodat de proxy weet wíe er surft.\\n\\n**Eerlijke status:** F3 is *gedeeltelijk* bewezen. De CA-policies zijn actief en het apparaat is Intune-ingeschreven, maar twee policies draaien nog in Report-only. De architectuur is klaar en het omzetten naar enforce is een eenmalige toggle.","nodeIds":["article:components/identity-bridge.nl","article:concepts/identity-flow.nl","domain:ztna","flow:user-login","step:login-mfa","step:identity-bridge-map","article:runbooks/07-access-policy.nl","article:runbooks/08-groupsync.nl","article:runbooks/09-identity-bridge.nl"]},{"order":8,"title":"8. Detectie-bewijs: Suricata ziet wat de proxy mist","description":"**Hoe weten we dat dit werkt?** Een IDS moet aanvallen detecteren op netwerkniveau, los van de proxy.\\n\\n**Het bewijs:** bij D1 triggert testmyids.com Suricata SID 2100498 (GPL ATTACK_RESPONSE). Bij D2 triggert een verdachte User-Agent \'BlackSun\' SID 2008983 (ET MALWARE). Bij D3 triggert een DNS-anomalie SID 2027863. Bij D4 wordt DC-LAN-verkeer op vtnet1 gedetecteerd. 79.620+ regels, Hyperscan-engine.\\n\\n**Hoe hangt dit samen?** Suricata zit bewust *naast* de ICAP-keten, niet erin: het is een packet-flow-engine die TCP-streams herassembleert en patronen over verbindingen correleert. Een los HTTP-lichaam via ICAP verliest die context. De splitsing is architectonisch fundamenteel.\\n\\n**Een gotcha die engineering bewijst:** Suricata vuurt maar één keer per SID per TCP-flow, door Squid\'s connection-pooling (zie [Finding](article:findings/suricata-connection-pooling.nl)). Dit leek eerst op alert-suppression, maar de root-cause-analyse toont dat het correct gedrag is, geen bug.","nodeIds":["article:components/suricata.nl","article:findings/suricata-connection-pooling.nl","domain:monitoring","flow:threat-response","step:alert-publish","article:runbooks/05-ids.nl","article:findings/suricata-interface-default-bug.nl","article:findings/suricata-netmap-virtio.nl"],"languageLesson":"**SID (Signature ID):** het unieke nummer van een Suricata-detectieregel. Door in een test de exacte SID te noemen (bv. 2100498) bewijs je precíes welke regel vuurde: niet \'er gebeurde iets\', maar \'regel X herkende aanval Y\'."},{"order":9,"title":"9. Integratie-bewijs: de event-bus als ruggengraat","description":"**Hoe hangt dit samen?** Dit is de kern van integratie. Elke detectie-silo (Suricata, Squid, DLP, ClamAV, DNS-RPZ, O365, Identity Bridge) publiceert gestructureerde events op één centrale NATS JetStream-bus.\\n\\n**Het bewijs:** T-A11 toont cross-component event-delivery: een event van de ene component komt aan bij de andere. T-A13 toont dat Wazuh die NATS-events ingest en dat je ze terugvindt in het Discover-dashboard.\\n\\n**De dual-write architectuur:** twee consumers lezen onafhankelijk van elkaar mee. De Control Daemon doet real-time respons (scoren, quarantaine). Wazuh doet forensiek (regels, dashboards). Geen van beide paden hangt van het andere af: valt de ene uit, dan blijft de andere werken.\\n\\n**Waarom dit het integratie-criterium scoort:** zonder de bus zou elke detectie een eiland zijn. Mét de bus wordt een malware-detectie op pop01 binnen seconden een quarantaine-actie via de NetBird-API op mgmt01. Losse tools worden één systeem.","nodeIds":["article:components/nats-jetstream.nl","article:components/wazuh.nl","domain:casb","domain:monitoring","step:wazuh-log","article:runbooks/10-nats-jetstream.nl","article:runbooks/11-wazuh.nl","article:findings/nats-store-dir.nl","article:findings/wazuh-dashboard-airgate.nl","article:findings/wazuh-cpu-glibc.nl"]},{"order":10,"title":"10. Integratie-bewijs: van detectie tot quarantaine in seconden","description":"**Hoe weten we dat de hele keten end-to-end werkt?** Dit is het zwaarste integratiebewijs: een aanval die door het complete systeem reist en automatisch beantwoord wordt.\\n\\n**Het bewijs:** bij T-A12 accumuleert de Control Daemon een dreigingsscore en voert quarantaine uit. Eén EICAR-detectie geeft score 80/80, de peer wordt uit zijn persona-groep gehaald (deny-by-default), en na een decay-periode hersteld. Attack-scenario\'s F1-F3 tonen dit live: high-severity event → quarantaine binnen seconden; meerdere medium-alerts → score stijgt → drempel → quarantaine; daarna score-verval → herstel.\\n\\n**Hoe hangt dit samen?** Dit raakt elke laag: ClamAV detecteert → NATS transporteert → Control Daemon scoort → NetBird-API trekt toegang in → Wazuh logt. Eén verzoek, vijf componenten, één geautomatiseerde reactie.\\n\\n**Eerlijke nuance:** de proxy_block-bron is bewust uit de scoring gehaald (te veel valse positieven) en IDS-correlatie is doelbewust níet geïmplementeerd. Dat staat als kritische reflectie in de Control Daemon-scope: een gat dat je kènt, is geen gat dat je verbergt.","nodeIds":["article:components/control-daemon.nl","article:testing/attack-scenarios.nl","domain:casb","flow:threat-response","step:score-calculate","step:quarantine-execute"]},{"order":11,"title":"11. SWG-bewijs: transparante proxy en enforcement","description":"**Hoe weten we dat dit werkt?** De rubric eist dat al het verkeer geforceerd door de SWG passeert, ook verkeer van apps die de systeemproxy negeren. Het bewijs valt in twee delen: de diagnostiek die de architectuurkeuze onderbouwt, en de managed-device variant die live op de sandbox draait.\\n\\n**Het bewijs (diagnostiek, parallelle stack):** test T-TP1 toont dat het overlay-IP (`src=100.86.x.x`) intact blijft na masquerade OFF. T-TP2 toont 536 state creations op de pf rdr HTTPS-regel: de interceptie matcht. T-TP3 is het beslissende bewijs dat de gecentraliseerde pf-rdr-aanpak (Optie C) faalt: de SYN-ACK arriveert wel op ens3 maar verschijnt nooit op wt0, want conntrack op de tussenliggende router dropt hem (`SYN_RCVD`-hang). T-TP4 verklaart waarom masquerade ON het probleem maskeerde, ten koste van het source-IP. T-TP5 en T-TP6 (TPROXY/Optie D, source-IP-behoud en symmetrisch return-pad) zijn niet uitgevoerd: linuxpop01 bestaat niet op de sandbox en Sessie 9 is gedeprioriteerd. Hun verwachte resultaat volgt uit de gedocumenteerde `IP_TRANSPARENT`-kernel-eigenschap, niet uit een meting.\\n\\n**Het bewijs (managed enforcement, sandbox live):** T-ME1 toont de Intune-pushed proxy systeembreed: issuer `O=SASE PoC` (bump actief) en het overlay-IP in pop01\'s access.log, niet door de non-admin user terug te draaien. T-ME2 toont dat de firewall-CSP QUIC blokkeert zodat de browser terugvalt op TCP/443 en Squid het alsnog bumpt. T-ME3 bewijst dat NetBird-tunnel, webbrowsing en MDM-check-in intact blijven. T-ME4 logt een live DLP-blokkade end-to-end (`YARA.DLP_Confidential_Label`) via de afgedwongen proxy.\\n\\n**Hoe hangt dit samen?** De diagnostiek bewees waarom interceptie op de verkeerde node structureel niet kan, en de managed-device pivot maakte die interceptie overbodig voor beheerde devices: Intune dwingt de proxy af zonder dat de user het kan terugdraaien. De twee bewijslijnen vullen elkaar aan in plaats van te concurreren.\\n\\n**Eerlijke nuance:** de zichtbaarheid op de parallelle stack is niet volledig. Het DC-inner-segment kan niet gemirrord worden omdat FreeBSD geen kernel-mirror heeft (dekking geschat op ~90%), acceptabel omdat het DC exact een workload-host bevat en er dus geen lateral movement te missen valt. Het Site1-segment werkte wel, maar vereiste een VyOS twee-staps commit (eerst de GRE-tunnel, dan de mirror-regels), omdat VyOS het mirror-target op commit-moment valideert. Een gat dat je kent en documenteert, is geen gat dat je verbergt.","nodeIds":["article:testing/transparent-proxy-tests.nl","article:components/transparent-proxy.nl","domain:swg","article:findings/dc-segment-mirror-limit.nl","article:findings/vyos-gre-two-step-commit.nl"]},{"order":12,"title":"12. Het volledige bewijsdossier: synthese","description":"**Bouwt voort op:** alle vorige stappen. Je hebt nu per pilaar bewijs gezien. Tijd om het als één dossier te zien.\\n\\n**Drie bewijslagen werken samen:**\\n1. **Acceptatietests (F1-F15, T-A1-T-A13):** de pass/fail-feiten met commando en gemeten uitkomst.\\n2. **Attack & bypass-scenario\'s:** niet alleen \'werkt het?\', maar \'houdt het stand tegen een aanvaller?\' Elk scenario is écht gedraaid en getraceerd naar een geslaagde test.\\n3. **Demo-script:** de rubriek-gemapte choreografie met per criterium wat je test, waarom het bewijst, wat je screencapt en wat je zegt.\\n\\n**Het integratie-argument in één zin:** de componenten zijn geen losse tools maar één keten. Een verzoek doorloopt DNS-filter, identiteitscontrole, URL-filter, DLP, decryptie, malware-scan en IDS, en elke detectie loopt via de event-bus naar real-time respons én forensiek.\\n\\n**De afronding:** waar bewijs gedeeltelijk is (F3 report-only, CASB-revoke detect-only), wordt dat eerlijk benoemd mét het pad naar volledige enforcement. In Tour 4 leer je dit verdedigen tegen kritische expertvragen.","nodeIds":["article:testing/acceptance-tests.nl","article:testing/attack-scenarios.nl","article:testing/demo-script.nl","article:overview/architecture.nl","domain:ztna","domain:swg","domain:casb","domain:sdwan","domain:monitoring","domain:endpoint","flow:web-request"]}]},{"id":"defense","name":"Verdediging","description":"Bereid je voor op de jury. Per rubriek-pilaar: de verwachte expertvraag, hoe de wiki antwoordt, welk bewijs het staaft, en welk criterium het scoort.","steps":[{"order":1,"title":"1. Hoe je een expertvraag pareert","description":"**Bouwt voort op:** Tour 2 (de keuzes) en Tour 3 (het bewijs). Nu het echte werk: een jury die je probeert te kraken.\\n\\nEen expert valt aan op drie manieren: *\\"Waarom deze keuze?\\"* (ontwerp), *\\"Bewijs dat het werkt\\"* (evidence), en *\\"Wat is hier zwak aan?\\"* (kritische reflectie). Wie alleen het eerste kan, zakt op het derde.\\n\\n**Het antwoordpatroon van deze tour, per stap:**\\n1. **Expertvraag:** wat de jury waarschijnlijk vraagt.\\n2. **Antwoord uit de wiki:** waar het staat en wat het zegt.\\n3. **Bewijs/beslissing:** welke test of ADR het staaft.\\n4. **Rubriek-criterium:** welk vakje dit aankruist.\\n\\n**Gouden regel:** een gat dat je zelf benoemt mét een verbetervoorstel scoort hoger dan een gat dat de jury vindt. De rubriek beloont \'kritische reflectie + verbetervoorstellen\' expliciet bij CASB en bij de algemene beoordeling.","nodeIds":["article:overview/architecture.nl","article:testing/acceptance-tests.nl","domain:ztna","domain:swg","domain:casb","domain:sdwan","domain:monitoring"]},{"order":2,"title":"2. SWG: \\"Hoe weet ik dat àlle verkeer geïnspecteerd wordt?\\"","description":"**Expertvraag:** \\"Een gebruiker kan toch gewoon de proxy uitzetten of er omheen gaan? Bewijs me dat er geen local breakout is.\\"\\n\\n**Antwoord uit de wiki:** het PAC-bestand stuurt àl het externe verkeer naar `PROXY 100.70.154.79:3128`, en die instelling wordt via Intune MDM afgedwongen, dus de gebruiker kan hem niet uitschakelen. Bovendien verlaat al het verkeer het apparaat via de WireGuard-tunnel (`wt0`), dus er ís geen direct pad naar internet.\\n\\n**Bewijs:** F1 (`InterfaceAlias: wt0`), F5 (`curl -x` door Squid → 403 op gambling.com), het afgedwongen PAC via Intune.\\n\\n**Rubriek-criterium:** SWG → Traffic routing → \'Volledig geforceerd via SWG\' (Uitstekend).\\n\\n**Eerlijke nuance vooraf:** dc01 is een serverworkload zonder browser en gaat bewust niet door de proxy. Benoem dit zelf als scope-keuze vóór de jury het vraagt.","nodeIds":["article:components/squid.nl","article:concepts/wpad-pac.nl","article:components/intune-endpoint-enforcement.nl","domain:swg","flow:web-request","step:pac-discovery"]},{"order":3,"title":"3. SWG: \\"Inspecteer je versleuteld verkeer? En filter je DNS slim?\\"","description":"**Expertvraag:** \\"99% van het web is HTTPS. Zie je daar überhaupt iets in? En is je DNS-filtering meer dan een statische blocklist?\\"\\n\\n**Antwoord uit de wiki:** SSL Bump breekt TLS open met de SASE-PoC-CA, scant de inhoud via ICAP (ClamAV-malware, YARA + SDD voor DLP) en pakt opnieuw in. DNS draait op RPZ gevoed door live threat-intel (URLhaus + ThreatFox, 71.767 records), met logging en policy per segment, dus geen statische lijst.\\n\\n**Bewijs:** F6 (cert-issuer = SASE PoC), F7 (EICAR geblokkeerd), T-A1/A2/A3 (DLP), T-A4/A5/A6 (RPZ NXDOMAIN + aa-flag op drie paden).\\n\\n**Rubriek-criteria:** SWG → Malware-inspectie → \'DPI + TLS-decryptie + malware-detectie\' (Uitstekend); SWG → DNS-filtering → \'Geavanceerd (threat intel, logging, policy-based)\' (Uitstekend).\\n\\n**Pareer de tegenvraag:** \\"Wat met cert-pinning?\\" → Microsoft-login wordt bewust niet gebumpt (B4 toont het originele cert); een no-bump-uitzondering is noodzakelijk en bewust, geen lek.","nodeIds":["article:concepts/ssl-bump.nl","article:components/ioc2rpz.nl","article:concepts/rpz.nl","domain:swg","flow:dns-lookup","step:ssl-bump-decrypt","step:rpz-check","article:findings/unbound-no-tsig.nl","article:findings/netbird-primary-nameserver.nl"]},{"order":4,"title":"4. CASB: \\"Blokkeer je cloud-apps context-afhankelijk?\\"","description":"**Expertvraag:** \\"Een blocklist is geen CASB. Blokkeer je dynamisch en op basis van wíe de gebruiker is?\\"\\n\\n**Antwoord uit de wiki:** CASB is in drie lagen gebouwd. Laag 1 doet identiteitsgebaseerd URL-filteren: dezelfde URL is geblokkeerd voor Studenten maar toegestaan voor Docenten. Laag 2 is Wazuh met de M365 Management Activity API, die risicovolle cloud-acties detecteert (bv. anonieme SharePoint-links). Laag 3 is de Control Daemon, die detecties omzet in real-time quarantaine.\\n\\n**Bewijs:** C1 (student → deepai.org geblokkeerd) vs C2 (docent → toegestaan) bewijst context-afhankelijkheid; F11 + C3 (SharePoint anonymous-link gedetecteerd, rule 100601); T-A12 (quarantaine).\\n\\n**Rubriek-criteria:** CASB → Blokkeren cloud-apps → \'Dynamische en context-based blokkering\' (Uitstekend); CASB → Policy-configuratie → \'Geavanceerde policies (groepen, risico, device)\' (Uitstekend).\\n\\n**Eerlijke nuance:** de live link-revoke staat nog detect-only (ENFORCE-gate pending). Benoem dit met het pad naar enforce.","nodeIds":["article:decisions/casb-three-layers.nl","article:components/wazuh.nl","article:components/control-daemon.nl","domain:casb","flow:threat-response","step:quarantine-execute"]},{"order":5,"title":"5. CASB: \\"Toon je kritische reflectie?\\"","description":"**Expertvraag:** \\"Wat werkt er níet goed? Waar zitten de zwakke plekken, en wat zou je verbeteren?\\"\\n\\n**Antwoord uit de wiki:** dit is bewust een sterk punt. De CASB three-layers-beslissing benoemt expliciet de \'dunnere dimensies\' van het ontwerp. De Control Daemon-scope legt uit waarom `proxy_block` als scoringsbron is verwijderd (te veel valse positieven) en waarom IDS-correlatie doelbewust níet is geïmplementeerd.\\n\\n**Bewijs/beslissing:** [Decision: CASB three layers](article:decisions/casb-three-layers.nl) met een \'mogelijke verbeteringen\'-sectie; [Decision: Control Daemon scope](article:decisions/control-daemon-scope.nl); 24 findings met root-cause-analyse.\\n\\n**Rubriek-criterium:** CASB → Beperkingen & analyse → \'Kritische reflectie + verbetervoorstellen\' (Uitstekend); raakt ook Algemeen → Troubleshooting → \'Diepgaande analyse\'.\\n\\n**De verdedigingstruc:** de jury kàn geen gat vinden dat jij al hebt opgeschreven mét een oplossing. Open zwakke punten zelf: dat is precies wat dit criterium beloont.","nodeIds":["article:decisions/control-daemon-scope.nl","article:decisions/casb-three-layers.nl","domain:casb","domain:monitoring","step:score-calculate"],"languageLesson":"**Vals positief:** een alarm dat afgaat zonder echte dreiging. Te veel valse positieven maken een systeem onbruikbaar (alarmmoeheid). Bewust een ruisbron uitschakelen is daarom een kwaliteitskeuze, geen functieverlies."},{"order":6,"title":"6. ZTNA: \\"Is dit écht zero trust of een verkapte VPN?\\"","description":"**Expertvraag:** \\"Bij een VPN ben je na inloggen binnen op het hele netwerk. Bewijs dat dit géén netwerk-exposure geeft.\\"\\n\\n**Antwoord uit de wiki:** toegang is per-resource en deny-by-default. Een lege route-ACL-groep zorgt dat wie geen expliciete groepsmatch heeft, géén route naar de DC-LAN krijgt, terwijl de route wel bestaat. Geen netwerk-toegang zonder identiteit.\\n\\n**Bewijs:** F4 (DC-LAN alleen mét groepslidmaatschap) plus de tegenproef F8 (niet-ingeschreven apparaat: geen route naar 10.0.0.0/24). F1 toont de actieve per-apparaat WireGuard-tunnel.\\n\\n**Rubriek-criteria:** ZTNA → Per-applicatie toegang → \'Volledig zero trust model (geen netwerk exposure)\' (Uitstekend); ZTNA → Test & validatie → \'Aanvallen gesimuleerd + logging geanalyseerd\' (Uitstekend, via de negatieve test + Wazuh).\\n\\n**Pareer de tegenvraag:** \\"Wat als de JWT-config fout staat?\\" → bekend en gedocumenteerd: een verkeerde \'JWT allow groups\' veroorzaakt een totale lockout (zie de finding). Je kènt de valkuil.","nodeIds":["article:components/netbird.nl","article:concepts/zero-trust.nl","article:findings/dc-lan-isolation-route-acl.nl","domain:ztna","flow:branch-access","step:netbird-tunnel","article:findings/iptables-forward-ordering.nl"]},{"order":7,"title":"7. ZTNA: \\"Hoe context-aware is de toegang?\\"","description":"**Expertvraag:** \\"Identiteit is stap één. Houd je ook rekening met het apparaat, de locatie en de risico-score?\\"\\n\\n**Antwoord uit de wiki:** het drie-gate-model. Gate 1 is Entra ID Conditional Access met vijf policies (MFA, geo-block, legacy-auth, risk-based, compliant device). Gate 2 is Intune-device-compliance (OS-versie, Defender, firewall), continu geëvalueerd. Gate 3 is de content-keten. De Identity Bridge koppelt identiteit aan de proxy zodat élk verzoek de persona-groep kent.\\n\\n**Bewijs/beslissing:** F2 (OIDC-keten + Entra-username op de peer), F3 (5 CA-policies + Intune-compliance), [Decision: CA + Posture hybrid](article:decisions/ca-posture-hybrid.nl).\\n\\n**Rubriek-criterium:** ZTNA → Identity & context awareness → \'Identity + context (geoIP, device posture, malware check)\' (Uitstekend).\\n\\n**Eerlijke status, proactief:** twee CA-policies en de Intune-enforcement draaien in Report-only tot de demo. De policy evalueert en logt de beslissing al; enforce is een eenmalige toggle, niet een ontbrekende functie.","nodeIds":["article:decisions/ca-posture-hybrid.nl","article:concepts/zero-trust.nl","article:concepts/identity-flow.nl","domain:ztna","domain:endpoint","flow:user-login","step:login-mfa"]},{"order":8,"title":"8. SD-WAN: \\"Waar is je SD-WAN? Ik zie geen IPsec-tunnels.\\"","description":"**Expertvraag:** \\"De rubriek vraagt SD-WAN met failover en routing. Maar er is geen klassieke IPsec-tunnel. Mist het project een pilaar?\\"\\n\\n**Antwoord uit de wiki:** dit is een bewuste architectuurkeuze, geen gat. Klassieke IPsec site-to-site is afgewezen omdat het haaks staat op Zero Trust (het creëert een vertrouwd netwerksegment). In plaats daarvan: het Zero Trust Branch-model (VyOS als SASE-gateway), in lijn met Zscaler\'s ZT-SD-WAN. Tests F12/F13/F14 zijn dus N/A als klassieke-IPsec-tests en zijn vervangen door ZT-Branch-tests.\\n\\n**Bewijs/beslissing:** [Decision: SD-WAN descoped](article:decisions/sdwan-descoped.nl) (waarom IPsec weg), [Decision: ZT SD-WAN Branch](article:decisions/zt-sdwan-branch.nl); V43 (verslag 43) Test #5 (QoS DSCP EF: 300/300 pakketten, 0 drops onder congestie) en V43 Test #6 (failover-detectie: CRITICAL binnen 30s, herstel gelogd).\\n\\n**Rubriek-criteria:** SD-WAN → Integratie met SASE → \'Duidelijke rol binnen SASE\' (Uitstekend); → Routing/policies → QoS + app-based split-tunnel; → Basis connectiviteit → failover-detectie.\\n\\n**Pareer de hardste vraag:** \\"Maar dan heb je geen latency-based path-selection.\\" → Klopt, dat vereist meerdere WAN-paden; het ZT-Branch-model heeft er bewust één, met inspectie gecentraliseerd op de PoP. Verdedig de keuze, niet het gat.","nodeIds":["article:decisions/sdwan-descoped.nl","article:decisions/zt-sdwan-branch.nl","article:components/vyos.nl","domain:sdwan","flow:branch-access","step:vyos-qos"]},{"order":9,"title":"9. Algemeen: \\"Waarom juist déze open-source tools?\\"","description":"**Expertvraag:** \\"Je had commerciële SASE-suites kunnen nemen. Waarom dit zelfgebouwde open-source samenraapsel, en is het wel geïntegreerd?\\"\\n\\n**Antwoord uit de wiki:** elke toolkeuze is onderbouwd in een ADR (Architecture Decision Record) met context, alternatieven en consequenties, 17 beslissingen totaal. De concept-pagina SASE bevat een tabel met commerciële equivalenten per component, zodat de jury ziet welk Zscaler/Netskope-onderdeel elke open-source-tool vervangt.\\n\\n**Bewijs/beslissing:** 17 decision-pagina\'s in ADR-formaat; [Concept: SASE](article:concepts/sase.nl) met de equivalenten-tabel; voor integratie: T-A11 (NATS cross-component) en T-A12 (end-to-end).\\n\\n**Rubriek-criteria:** Algemeen → Keuze open-source tools → \'Sterk onderbouwd\' (Uitstekend); Algemeen → Integratie componenten → \'Volledig geïntegreerd\' (Uitstekend); Algemeen → Architectuur → \'Professioneel\'.\\n\\n**De integratie-één-liner:** de NATS-event-bus maakt van losse detectie-eilanden één systeem met dual-write naar real-time respons én forensiek. Dat is het bewijs dat het geen \'samenraapsel\' is.","nodeIds":["article:concepts/sase.nl","article:components/nats-jetstream.nl","article:overview/architecture.nl","domain:monitoring","domain:casb","step:alert-publish"]},{"order":10,"title":"10. Algemeen: \\"Waarom is dit pakket geblokkeerd?\\"","description":"**Expertvraag:** de letterlijke vraag uit de rubriek-toelichting: \\"Toon me, voor een gebruiker of admin, wáárom een pakket geblokkeerd of toegestaan is, transparant en zichtbaar.\\"\\n\\n**Antwoord uit de wiki:** elke blokkade laat een leesbaar spoor na. DNS-policy → NXDOMAIN met aa-flag. URL/CASB → Squid 403 ERR_ACCESS_DENIED. Malware → ClamAV \'VIRUS DETECTED\' in de log. Alles komt samen in het Wazuh-dashboard (Discover), doorzoekbaar per gebeurtenis.\\n\\n**Bewijs:** F5 (Squid 403), F7 (ClamAV-log), T-A4/5/6 (RPZ NXDOMAIN), F10 (centrale log-aggregatie), T-A13 (Wazuh-query).\\n\\n**Rubriek-criteria:** Algemeen → Transparantie voor klant (logging & inzicht) → \'Duidelijke uitleg waarom verkeer geblokkeerd/toegestaan is\' (Uitstekend); → Pakketflow-uitleg → \'Stap-voor-stap analyse\' (de vier flows in de architectuur §5); → Performantie → Hyperscan, cert-cache, QoS-tuning.\\n\\n**Demo-koppeling:** het demo-script mapt precies dit per criterium: wat je test, waarom het bewijst, wat je screencapt, wat je zegt.","nodeIds":["article:components/wazuh.nl","article:testing/demo-script.nl","article:overview/architecture.nl","domain:monitoring","flow:web-request","step:wazuh-log"]},{"order":11,"title":"11. Detectie: \'mis je geen C2-/behavioral-detectie?\'","description":"**Expertvraag:** \\"Jullie Control Daemon laat IDS-correlatie en C2-detectie bewust vallen. Mis je dan geen behavioral detectie?\\"\\n\\n**Antwoord uit de wiki:** de C2-detectie is bewust niet bij de Control Daemon belegd. De Control Daemon-scope haalde de IDS-correlatiebranch eruit (die dupliceerde de malware-branch met slechtere attributie) en benoemt C2 beacon-detectie expliciet als open capability gap, met Zeek/RITA als het aangewezen pad. Dat pad is intussen gebouwd en gevalideerd op de parallelle stack: een bewuste taakverdeling met een gedocumenteerde gap, niet een verzwegen gat. Zeek registreert passief elke flow in gestructureerde logs en RITA scoort het gedrag over tijd: een mens die surft is onregelmatig, malware die incheckt bij zijn C2 is metronomisch. RITA detecteert beaconing, C2-over-DNS en lange verbindingen, precies wat een signature-engine en een statische blocklist missen.\\n\\n**Bewijs/beslissing:** RITA scoort elk `source -> destination` paar op regelmaat (beacon score 0 tot 1); op een known-good netwerk landden legitieme beacons rond 100% (NetBird update-check) en 99% (Ubuntu NTP), wat bewijst dat de scoring klopt. End-to-end werd `grafana.com` als Critical beacon (score ~0,998) gescoord en via de RITA->RPZ-pipeline tot NXDOMAIN geblokkeerd. Zo voedt behavioral detectie de DNS-enforcement.\\n\\n**Rubriek-criterium:** raakt kritische reflectie (een doelbewust verplaatste functie, expliciet gedocumenteerd) en de behavioral-detectiedekking die de signature-IDS aanvult.\\n\\n**Eerlijke nuance:** Zeek/RITA draaien op de parallelle stack en zijn nog niet op de sandbox-eventbus; het enige pad waarlangs hun bevindingen de sandbox bereiken is het RITA->RPZ feed-bestand, niet NATS of de Control Daemon. Net als bij de Cosmos-laag (waar de hostname-op-IP cross-domain OAuth/SSO beperkt) geldt: de beperking staat opgeschreven met een pad-naar-volledig, en de kernfunctie werkt. Benoem dit zelf voor de jury het vraagt.","nodeIds":["article:components/zeek.nl","article:components/rita.nl","article:decisions/rita-rpz-automation.nl","article:decisions/cosmos-two-layer-ztna.nl","domain:monitoring","article:findings/cosmos-hostname-oauth.nl"]},{"order":12,"title":"12. Observability: \'hoe maak je dit zichtbaar en transparant?\'","description":"**Expertvraag:** \\"Hoe toon je, voor een operator, in een oogopslag wie toegang heeft, wat ze doen en of er dreigingen zijn? En hoe normaliseer je al die uiteenlopende logbronnen?\\"\\n\\n**Antwoord uit de wiki:** de telemetry stack (Grafana + Prometheus + Loki) is de observability-laag die metrics, logs en SASE security telemetry in een single pane of glass samenbrengt. Prometheus levert metrics (GNS3 node status, host metrics), Loki bewaart logs, en Grafana toont vier geprovisionde dashboards (Node Status, VM Metrics, OPNsense Log Stream, Stack Health). NetBird-ZTNA-data verschijnt onder `category=netbird_api`, Wazuh-alerts onder `device=wazuh`. De forwarders liften mee op de bestaande NATS JetStream bus en zijn bewust container-per-bron, zodat een kapotte feed de andere niet stillegt.\\n\\n**Bewijs/beslissing:** Grafana werd gekozen boven een custom React UI omdat het log tailing, metric grafieken en alerting al ingebouwd heeft, met dashboards-als-JSON die container rebuilds overleven; een eigen frontend zou een zwakkere versie opleveren plus onderhoudslast. De syslog-normalisatie is een gekende valkuil: netwerkapparaten sturen RFC3164 terwijl moderne log tooling RFC5424 verwacht. In de v1-build loste een rsyslog relay dat op (RFC3164 op UDP 514 -> RFC5424-template -> Promtail). De huidige mgmt01-build omzeilt het volledig door op de NATS-bus mee te liften, met `time.time()` als ingestijtijd tegen OPNsense\'s verkeerde CEST-timestamps.\\n\\n**Rubriek-criterium:** transparantie en inzicht (logging en visualisatie waarom verkeer geblokkeerd of toegestaan is) plus een onderbouwde toolkeuze.\\n\\n**Eerlijke nuance:** deze stack draait op de parallelle `SASE_POC`-stack en is nog niet in het sandbox-geheel geïntegreerd. De security-observability van de sandbox zelf blijft Wazuh SIEM als source of truth; de telemetry stack detecteert of enforcet niet, het leest uit Wazuh (`level >= 5` alerts) en aggregeert en visualiseert.","nodeIds":["article:components/telemetry-stack.nl","article:decisions/grafana-vs-custom-ui.nl","domain:monitoring","article:findings/rfc3164-vs-rfc5424-syslog.nl"]},{"order":13,"title":"13. Synthese: de verdediging als geheel","description":"**Bouwt voort op:** alle vier de tours. Je kent nu het wat (1), het waarom (2), het bewijs (3) en de verdediging per criterium (4).\\n\\n**Je verdedigings-frame in drie zinnen:**\\n1. *Architectuur:* één edge-PoP inspecteert al het verkeer via drie complementaire poorten (identiteit, apparaat, inhoud), bewust gebouwd op het Zero Trust-model in plaats van kasteel-en-slotgracht.\\n2. *Bewijs:* 28 tests (F1-F15 + T-A1-T-A13) plus echte attack-scenario\'s dekken alle vijf pilaren, met commando, gemeten uitkomst en log-bewijs.\\n3. *Integratie:* de NATS-event-bus verbindt elke silo tot één systeem met real-time respons én forensiek.\\n\\n**De eerlijkheids-strategie die scoort:** noem de drie open punten zelf (F3 Report-only, CASB live-revoke detect-only, SD-WAN bewust descoped), elk mét rationale en pad-naar-enforce. De rubriek beloont kritische reflectie hoger dan perfecte claims.\\n\\n**Laatste advies voor de jury:** als je een antwoord niet paraat hebt, val terug op het patroon: Context, Alternatieven, Beslissing, Consequentie, Bewijs. Wijs naar de juiste beslissings-, test- of finding-pagina. De wiki is je geheugen; deze tour is je voorbereiding.","nodeIds":["article:index.nl","article:overview/architecture.nl","article:testing/acceptance-tests.nl","domain:ztna","domain:swg","domain:casb","domain:sdwan","domain:monitoring","domain:endpoint","flow:web-request"]}]}]'),Ak=JSON.parse(`[{"id":"article:components/caddy.nl","name":"Caddy: WPAD-server, Reverse Proxy, TLS-terminator"},{"id":"article:components/clamav-cicap.nl","name":"ClamAV + c-icap: Malware-scanning en DLP-laag 1"},{"id":"article:components/control-daemon.nl","name":"Control Daemon"},{"id":"article:components/gns3.nl","name":"GNS3: Virtualisatie en Lab-topologie"},{"id":"article:components/identity-bridge.nl","name":"Identity Bridge"},{"id":"article:components/index.nl","name":"Componenten"},{"id":"article:components/intune-endpoint-enforcement.nl","name":"Intune Endpoint Enforcement"},{"id":"article:components/ioc2rpz.nl","name":"ioc2rpz + BIND + Unbound: DNS-threat intelligence"},{"id":"article:components/nats-jetstream.nl","name":"NATS JetStream"},{"id":"article:components/netbird.nl","name":"NetBird + Zitadel + Entra ID: ZTNA-overlay"},{"id":"article:components/python-dlp.nl","name":"Python DLP ICAP-server: Upload-DLP-laag 2"},{"id":"article:components/squid.nl","name":"Squid: Expliciete proxy, WPAD/PAC, SSL Bump, URL-filtering"},{"id":"article:components/surica
