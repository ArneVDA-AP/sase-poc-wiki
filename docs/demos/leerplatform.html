- **Endpoint Enforcement** bepaalt of een toestel gezond genoeg is om toegang te krijgen.
- **ZTNA** verleent identity-aware toegang via een WireGuard-overlay; niets is impliciet vertrouwd.
- **SWG** inspecteert al het webverkeer (proxy, malware-scan, DLP, DNS-filtering).
- **ZT-Branch (SD-WAN)** trekt bijkantoren via dezelfde overlay het zero-trust model in.
- **Monitoring & Respons** detecteert en reageert op basis van events.
- **CASB** bewaakt cloudgebruik en stuurt detectie door naar quarantaine.

Kies een domein om de stap-voor-stap data-flow te bekijken.`,activeNodes:["endpoint","ztna","swg","sdwan","monitoring","casb"],activeEdges:[],packet:null,meta:[["model","SASE (6 domeinen)"],["kern","ZTNA-overlay (NetBird + Zitadel)"],["inspectie","SWG (Squid + ICAP)"],["respons","NATS + Wazuh + Control Daemon"]],log:[["00:00.00","info","overzicht: 6 domeinen geladen"],["00:00.00","ok","klik een domein om in te zoomen"]]},{id:"ov-access",boardId:"overview",num:"02 / TOEGANG",title:"Van toestel naar geverifieerde toegang",desc:"Endpoint-posture en branch-overlay voeden ZTNA. Pas na verificatie mag verkeer door naar de inspectieketen (SWG).",fullText:"Toegang is een keten, geen poort. **Endpoint Enforcement** levert de device-posture (compliance, identiteit) aan **ZTNA**. **ZT-Branch** sluit bijkantoren via dezelfde overlay aan. ZTNA beslist per sessie op basis van identiteit en context; alleen geverifieerd verkeer bereikt de **SWG**-inspectieketen.",activeNodes:["endpoint","sdwan","ztna","swg"],activeEdges:["endpoint-ztna","sdwan-ztna","ztna-swg"],packet:{path:"endpoint-ztna",color:"var(--cyan)",label:"posture"},meta:[["posture-bron","Intune + Entra ID"],["overlay","NetBird (WireGuard)"],["beslisser","Zitadel (IdP / policy)"],["volgende","SWG-inspectie"]],log:[["00:00.04","info","endpoint: posture compliant -> claim"],["00:00.05","info","ztna: identity-aware policy match -> allow"],["00:00.06","ok","ztna: sessie geautoriseerd -> SWG"]]},{id:"ov-inspect",boardId:"overview",num:"03 / INSPECTIE",title:"Inspectie voedt detectie",desc:"SWG inspecteert egress en stuurt signalen naar CASB; CASB correleert en geeft detectie-events door aan Monitoring & Respons.",fullText:"De **SWG** ziet het feitelijke webverkeer en levert egress-signalen. **CASB** legt die naast cloudgebruik en gebruikerscontext (Identity Bridge) en produceert detectie-events. Die events stromen naar **Monitoring & Respons**, waar Wazuh correleert en de Control Daemon kan ingrijpen.",activeNodes:["swg","casb lid"]],log:[["00:00.26","info","sdd: candidates=5 (13-19 digits, separators stripped)"],["00:00.26","info","sdd: luhn-valid=4 -> threshold(3) overschreden"],["00:00.27","block","icap-1: response BLOCKED. 403 template served"]]},{id:"icap2",boardId:"swg",num:"08 / ICAP-2",title:"ICAP Layer 2. Python DLP (REQMOD)",desc:"Bij uploads (POST/PUT) stuurt Squid de REQUEST-body naar de custom Python DLP-service in Docker op tcp/1345. Scant multipart bodies voor Luhn CC, IBAN mod-97, BSN 11-proef, AWS access keys.",activeNodes:["squid","icap2"],activeEdges:["squid-icap2"],packet:{path:"squid-icap2",color:"var(--amber)",label:"REQMOD"},meta:[["engine","python-dlp (docker, py3.11)"],["mode","REQMOD (request body)"],["port","tcp/1345"],["content-type","multipart/form-data"]],log:[["00:00.30","info","squid: REQMOD -> icap://icap-2:1345/dlp"],["00:00.31","info","dlp: parsing multipart. 2 parts (text, binary)"]]},{id:"dlp",boardId:"swg",num:"09 / DLP",title:"DLP validators. mod-97 / 11-proef / AWS",desc:"Elke validator draait onafhankelijk. Een IBAN wordt via mod-97 gecheckt, een BSN via de Nederlandse 11-proef, AWS access keys op prefix + 40-char secret. Bij hit wordt de upload geweigerd met 403.",activeNodes:["icap2"],activeEdges:[],subActive:["dlp"],ruleHits:{"dlp-luhn":!1,"dlp-iban":!0,"dlp-bsn":!1,"dlp-aws":!0},nodeStates:{icap2:"block"},packet:null,meta:[["iban","NL91ABNA0417164300. mod-97 = 1 ok"],["aws","AKIA****************. 40-char secret"],["bsn","not found"],["verdict","BLOCK. 403 Forbidden (DLP-blokkeringspagina)"]],log:[["00:00.33","hit","dlp: IBAN mod-97 valid -> NL91ABNA0417164300"],["00:00.33","hit","dlp: AWS_KEY prefix AKIA + 40-byte secret matched"],["00:00.34","block","icap-2: REQUEST BLOCKED. upload denied (403)"]]},{id:"suricata",boardId:"swg",num:"10 / IDS",title:"Suricata IDS. WAN + LAN sensoren",desc:"Onafhankelijk van de proxy-keten tapt Suricata beide interfaces (vtnet0 = WAN, vtnet1 = LAN). Ruleset: 79.620+ signatures uit ET Open + Abuse.ch feeds.",activeNodes:["squid","suricata"],activeEdges:["squid-suricata"],nodeStates:{suricata:"hit"},packet:{path:"squid-suricata",color:"var(--amber)",label:"tap (PCAP/BPF)"},meta:[["engine","suricata 7.0"],["ifaces","vtnet0 (WAN). vtnet1 (LAN)"],["rules","79.620+ (ET Open + Abuse.ch)"],["output","eve.json -> SIEM"]],log:[["00:00.36","info","suricata[vtnet0]: PCAP capture (BPF)"],["00:00.37","info","suricata[vtnet1]: decoder.tcp segment reassembly"],["00:00.38","hit","suricata: ET MALWARE signature match -> eve.json"]]},{id:"dns-query",boardId:"swg",num:"11 / DNS",title:"DNS query. client naar Unbound",desc:"Naast het proxy-pad loopt DNS. Iedere client-query gaat naar Unbound. Unbound heeft een RPZ zone die als sinkhole dient voor bekende bad-domains.",activeNodes:["mobile","unbound"],activeEdges:["mobile-unbound"],packet:{path:"mobile-unbound",color:"var(--violet)",label:"A? badstuff.tld"},meta:[["resolver","Unbound 1.24.2"],["port","udp/53 + tcp/53"],["rpz","enabled. response-policy zone"],["query","A badstuff.tld"]],log:[["00:00.40","dns","unbound: query A badstuff.tld from 10.20.4.17"],["00:00.40","dns","unbound: consulting RPZ zone rpz.local"]]},{id:"rpz",boardId:"swg",num:"12 / RPZ",title:"BIND 9.20 <- ioc2rpz <- URLhaus + ThreatFox",desc:"De RPZ wordt opgebouwd door ioc2rpz dat URLhaus en ThreatFox feeds periodiek pulled (~71.767 records). BIND 9.20 serveert de zone; Unbound laadt hem via RPZ.",activeNodes:["unbound","bind","ioc2rpz"],activeEdges:["unbound-bind","bind-ioc2rpz"],nodeStates:{unbound:"block"},packet:{path:"unbound-bind",color:"var(--violet)",label:"RPZ lookup"},meta:[["feeder","ioc2rpz. pulls: URLhaus, ThreatFox"],["records","~71.767"],["bind","BIND 9.20 (auth RPZ primary)"],["unbound","rpz-action = NXDOMAIN"]],log:[["00:00.41","dns","bind: RPZ match badstuff.tld -> CNAME ."],["00:00.41","block","unbound: rewrite -> NXDOMAIN (RPZ hit)"],["00:00.42","info","client: getaddrinfo() EAI_NONAME. connection aborted"]]},{id:"summary",boardId:"swg",num:"13 / RECAP",title:"End-to-end controles actief",desc:"Traffic flow afgerond. Samengevat: WPAD stuurt client naar Squid, SSL-bump opent plaintext voor ICAP, laag-1 scant downloads (ClamAV + YARA + Luhn), laag-2 scant uploads (Python DLP), Suricata tapt mee op WAN+LAN, en DNS wordt gefilterd door Unbound + RPZ gevoed door ioc2rpz.",activeNodes:["mobile","caddy","squid","icap1","icap2","suricata","unbound","bind","ioc2rpz"],activeEdges:["mobile-caddy","mobile-squid","squid-icap1","squid-icap2","squid-suricata","mobile-unbound","unbound-bind","bind-ioc2rpz"],packet:null,meta:[["proxy","Squid 3128 + ssl_bump"],["icap-1","c-icap + ClamAV + YARA + SDD"],["icap-2","python-dlp (docker:1345)"],["ids","Suricata 7.0. vtnet0/vtnet1"],["dns","Unbound. BIND 9.20. ioc2rpz"]],log:[["00:00.50","ok","pipeline healthy. all controls reporting"],["00:00.50","ok","icap-1 RESPMOD active (downloads scanned)"],["00:00.50","ok","icap-2 REQMOD active (uploads scanned)"],["00:00.50","ok","suricata IDS tap healthy (monitor mode, 0 drops)"]]}],dk=[{id:"intro",boardId:"ztna",num:"01 / ZTNA",title:"Identity-aware toegang start",desc:"Een corporate apparaat wil bij een interne dienst. Er is geen impliciet vertrouwen op netwerk-niveau. Eerst moet de gebruiker bewijzen wie hij is voordat er een overlay-tunnel ontstaat.",activeNodes:["device"],activeEdges:[],packet:null,meta:[["client","Entra-joined device"],["model","zero trust. deny-by-default"],["overlay","NetBird (WireGuard)"]],log:[["00:00.01","info","device: geen overlay-route actief. wt0 down"],["00:00.02","info","device: start OIDC login om toegang te krijgen"]],fullText:`ZTNA vervangt het klassieke VPN-model waarin een apparaat na het inloggen op het netwerk meteen alles kan bereiken. Hier is toegang **identiteitsgebonden**: de tunnel die straks ontstaat geeft alleen toegang tot wat de groepen van deze gebruiker toestaan.

De keten is: apparaat bewijst identiteit bij Entra ID, Zitadel vertaalt de groepslidmaatschappen naar een schone token, en NetBird bouwt op basis daarvan een overlay met de juiste ACL's.`},{id:"login-mfa",boardId:"ztna",num:"02 / IdP",title:"Entra ID. MFA + sign-in risk",desc:"Het apparaat doet een OIDC-authorize bij Entra ID. Naast wachtwoord wordt MFA afgedwongen en evalueert Entra het sign-in risk (locatie, geo, onbekend apparaat). Bij verhoogd risico kan de login geweigerd worden.",activeNodes:["device","entra"],activeEdges:["device-entra"],subActive:["mfa"],packet:{path:"device-entra",color:"var(--cyan)",label:"/authorize"},meta:[["idp","Entra ID (OIDC)"],["factor","MFA verplicht"],["risk","sign-in risk + geo-check"],["output","id_token met group-claims"]],log:[["00:00.05","info","entra: GET /authorize response_type=code"],["00:00.07","info","entra: MFA challenge -> satisfied"],["00:00.08","ok","entra: sign-in risk=low. id_token uitgegeven"]],fullText:"Entra ID is de **identity provider**. De group-claims in het uitgegeven token dragen nog de ruwe Entra-groepsnamen, inclusief organisatie-prefixen zoals `2ITCSC1A-`.\n\n**Sign-in risk** is een continu signaal: een login vanaf een nieuwe locatie of een onmogelijke reis (impossible travel) verhoogt het risico en kan extra verificatie of weigering triggeren. Dit is de eerste poort in de keten."},{id:"zitadel-broker",boardId:"ztna",num:"03 / BROKER",title:"Zitadel vertaalt groepen",desc:"Zitadel treedt op als OIDC-broker tussen Entra en NetBird. Het neemt de Entra group-claims, zet ze via een hardcoded allowlist om naar schone interne namen (2ITCSC1A-Studenten → Studenten), en geeft een schone JWT uit. Groepen die niet in de allowlist staan worden stil verwijderd (fail-closed).",activeNodes:["entra","zitadel"],activeEdges:["entra-zitadel"],subActive:["map"],packet:{path:"entra-zitadel",color:"var(--cyan)",label:"id_token"},meta:[["broker","Zitadel (OIDC)"],["in","Entra groups (met prefix)"],["transform","allowlist-map 2ITCSC1A-Studenten -> Studenten (fail-closed)"],["out","clean JWT (groups)"]],log:[["00:00.10","info","zitadel: id_token van Entra ontvangen"],["00:00.11","info","zitadel: allowlist-mapping 2ITCSC1A-Studenten -> Studenten"],["00:00.12","ok","zitadel: schone JWT uitgegeven aan NetBird"]],fullText:"Waarom een broker? NetBird wil **stabiele, schone groepsnamen** voor zijn ACL-policy, maar Entra levert groepen met organisatie-specifieke prefixen. Zitadel ontkoppelt die twee werelden.\n\nEen hardcoded **allowlist** in een Zitadel Action zet `2ITCSC1A-Studenten` om naar `Studenten`. Groepen die niet in de allowlist staan worden stil verwijderd — de mapping is **fail-closed**. Zo blijft het NetBird-beleid leesbaar en onafhankelijk van hoe Entra zijn groepen toevallig benoemt. De broker is ook het punt waar je later van IdP zou kunnen wisselen zonder het overlay-beleid te herschrijven."},{id:"netbird-tunnel",boardId:"ztna",num:"04 / OVERLAY",title:"NetBird bouwt de tunnel",desc:"NetBird leest de groepen uit de schone JWT, kent het apparaat een overlay-IP toe en brengt een WireGuard-tunnel omhoog op interface wt0. De ACL's bepalen op basis van de groep welke peers en diensten bereikbaar zijn.",activeNodes:["zitadel","netbird"],activeEdges:["zitadel-netbird"],subActive:["assign"],packet:{path:"zitadel-netbird",color:"var(--cyan)",label:"clean JWT"},meta:[["overlay","NetBird. WireGuard"],["iface","wt0"],["assign","group -> overlay-IP"],["policy","ACL per groep. deny-by-default"]],log:[["00:00.14","info","netbird: JWT geverifieerd. groups=[Studenten]"],["00:00.15","info","netbird: overlay-IP 100.70.95.98 toegekend"],["00:00.16","ok","netbird: WireGuard peer up op wt0. ACL toegepast"]],fullText:"NetBird is een **WireGuard-gebaseerde overlay**. De tunnel komt op interface `wt0` te staan en het apparaat krijgt een overlay-IP in het 100.x-bereik.\n\nHet cruciale punt: het overlay-IP is niet zomaar een adres, het is **gekoppeld aan de groep**. De ACL-policy zegt bijvoorbeeld dat `Studenten` wel bij dienst A maar niet bij dienst B mogen. Deny-by-default betekent dat alles wat niet expliciet is toegestaan, geweigerd wordt. Zo is laterale beweging op het overlay beperkt tot wat de identiteit toelaat."},{id:"identity-bridge-map",boardId:"ztna",num:"05 / BRIDGE",title:"Identity Bridge koppelt IP aan groep",desc:"De Identity Bridge pollt elke 30 seconden de NetBird API en bouwt een cache van overlay-IP naar groep. Zo kunnen andere componenten (zoals de SWG of de Control Daemon) een verbinding terugvertalen naar een gebruiker en zijn groepen.",activeNodes:["netbird","bridge"],activeEdges:["netbird-bridge"],packet:{path:"netbird-bridge",color:"var(--cyan)",label:"GET /api/peers"},meta:[["service","Identity Bridge"],["source","NetBird API"],["interval","elke 30s"],["cache","overlay-IP -> group"]],log:[["00:00.30","info","bridge: GET /api/peers (poll-cyclus)"],["00:00.30","info","bridge: 100.70.95.98 -> groups=[Studenten]"],["00:00.31","ok","bridge: cache ververst. 1 peer toegevoegd"]],fullText:"Een overlay-IP zegt op zichzelf niets over wie erachter zit. De **Identity Bridge** lost dat op: het pollt de NetBird API elke 30 seconden en houdt een actuele tabel bij van overlay-IP naar groep.\n\nDit is de lijm tussen het netwerk-niveau en het identiteits-niveau. Wanneer de SWG straks verkeer ziet van `100.70.95.98`, of de Control Daemon een incident scoort, kunnen zij via deze cache zien dat het om de groep `Studenten` gaat. Het maakt **identiteitsbewuste beslissingen** mogelijk verderop in de keten."},{id:"recap",boardId:"ztna",num:"06 / RECAP",title:"Identiteit gekoppeld aan toegang",desc:"ZTNA-keten afgerond: Entra ID verifieert met MFA en risico, Zitadel normaliseert de groepen, NetBird bouwt een overlay met groep-gebaseerde ACL's, en de Identity Bridge houdt de koppeling IP-naar-groep actueel voor de rest van het platform.",activeNodes:["device","entra","zitadel","netbird","bridge"],activeEdges:["device-entra","entra-zitadel","zitadel-netbird","netbird-bridge"],packet:null,meta:[["idp","Entra ID. MFA + risk"],["broker","Zitadel. allowlist-map (fail-closed)"],["overlay","NetBird. wt0. ACL per groep"],["mapping","Identity Bridge. 30s poll"]],log:[["00:00.40","ok","ztna: overlay actief. toegang identiteitsgebonden"],["00:00.40","ok","ztna: ACL deny-by-default afgedwongen"],["00:00.40","ok","bridge: IP->group cache live voor SWG / CASB"]],fullText:`De rode draad: **geen toegang zonder bewezen identiteit, en toegang strikt beperkt tot wat de groep toelaat**.

Deze keten levert ook iets op voor de andere domeinen. Doordat de Identity Bridge de koppeling overlay-IP naar groep publiceert, kan de SWG zijn inspectie koppelen aan een gebruiker en kan de CASB / Control Daemon bij een incident gericht de juiste peer uit zijn groep verwijderen (quarantaine). ZTNA is daarmee niet alleen een toegangspoort maar ook de identiteitsbron voor het hele SASE-platform.`}],fk=[{id:"intro",boardId:"casb",num:"01 / CASB",title:"Detectie wordt reactie",desc:"De inspectie-componenten zien dingen, maar zien alleen is niet genoeg. De CASB-keten verbindt detectie aan een geautomatiseerde reactie: alerts stromen samen, worden gescoord, en bij genoeg dreiging volgt quarantaine.",activeNodes:["sensors"],activeEdges:[],packet:null,meta:[["doel","detectie -> automatische respons"],["bus","NATS JetStream"],["beslisser","Control Daemon"]],log:[["00:00.01","info","casb: sensoren actief (ClamAV, DLP, Suricata)"],["00:00.02","info","casb: wacht op security.alert.* events"]],fullText:`Een CASB (Cloud Access Security Broker) bewaakt hier vooral het gedrag van apparaten op het overlay. De kern van deze implementatie is **event-gedreven**: in plaats van dat elke sensor zelf mag ingrijpen, publiceren ze hun bevindingen op een centrale bus.

Een enkele beslisser, de Control Daemon, weegt alles samen. Zo voorkom je dat losse, op zichzelf onschuldige signalen onnodig blokkeren, terwijl een opeenstapeling juist wel tot actie leidt.`},{id:"alert-publish",boardId:"casb",num:"02 / PUBLISH",title:"Sensoren publiceren op NATS",desc:"ClamAV, de Python DLP-service en Suricata publiceren hun bevindingen als security.alert.* berichten op NATS JetStream. JetStream persisteert de events zodat niets verloren gaat als een consumer even weg is.",activeNodes:["sensors","nats"],activeEdges:["sensors-nats"],packet:{path:"sensors-nats",color:"var(--amber)",label:"security.alert.*"},meta:[["publishers","ClamAV. DLP. Suricata (log-only)"],["subject","security.alert.*"],["bus","NATS JetStream (persistent)"],["payload","type. peer-IP. severity"]],log:[["00:00.05","hit","clamav: alert -> security.alert.malware"],["00:00.06","hit","dlp: alert -> security.alert.dlp"],["00:00.07","info","nats: 2 events persisted op stream"]],fullText:"NATS JetStream is de **event-bus** met persistentie. Elk alert is een bericht op een subject onder `security.alert.*`, bijvoorbeeld `security.alert.malware` of `security.alert.dlp`.\n\nDe winst van persistentie: als de Control Daemon herstart of even achterloopt, blijven de events op de stream staan en worden ze alsnog verwerkt. De sensoren hoeven niets te weten over wie er luistert, ze publiceren simpelweg. Dat ontkoppelt detectie van besluitvorming."},{id:"score-calculate",boardId:"casb",num:"03 / SCORE",title:"Control Daemon scoort",desc:"De Control Daemon consumeert de alerts en houdt per peer een sliding-window score bij. Malware weegt 80 punten, een DLP-match 30. Zodra de gewogen som de drempel van 80 raakt, is dat genoeg voor een reactie.",activeNodes:["nats","control"],activeEdges:["nats-control"],subActive:["score"],nodeStates:{control:"hit"},packet:{path:"nats-control",color:"var(--amber)",label:"consume"},meta:[["window","sliding window per peer"],["malware","80 punten"],["dlp_match","30 punten"],["threshold",">= 80 -> actie"]],log:[["00:00.10","info","control: consume security.alert.* (peer 100.70.95.98)"],["00:00.11","info","control: malware(80) -> score=80"],["00:00.12","hit","control: score 80 >= threshold 80. trigger respons"]],fullText:`De **sliding window** is wat dit slim maakt. In plaats van per losse alert te beslissen, telt de Control Daemon recente alerts per peer bij elkaar op met een gewicht.

Met malware=80 en dlp_match=30 en drempel 80 betekent dat: een enkele malware-hit is meteen genoeg, maar het vergt drie DLP-matches binnen het venster (30+30+30=90) voordat een reeks data-leak-signalen escaleert. Zo blijven losse, mogelijk valse, DLP-treffers onder de drempel, terwijl echte malware direct tot actie leidt. De gewichten en drempel zijn beleidskeuzes, geen vaste wet.`},{id:"quarantine-execute",boardId:"casb",num:"04 / QUARANTAINE",title:"NetBird haalt peer uit zijn groep",desc:"Bij score >= 80 roept de Control Daemon de NetBird Groups API aan: eerst GET om de huidige groepen op te halen, dan PUT om de peer eruit te verwijderen. Door deny-by-default valt daarmee onmiddellijk alle toegang weg: het apparaat is in quarantaine zonder dat er een firewall-regel hoeft te wijzigen.",activeNodes:["control","netbird"],activeEdges:["control-netbird"],subActive:["quarantine"],nodeStates:{netbird:"block"},packet:{path:"control-netbird",color:"var(--red)",label:"Groups API GET/PUT"},meta:[["trigger","score >= 80"],["actie","NetBird Groups API. peer uit groep"],["effect","deny-by-default -> geen toegang"],["peer","100.70.95.98 (Studenten)"]],log:[["00:00.14","info","control: Groups API GET -> huidige groepen ophalen"],["00:00.15","info","control: Groups API PUT -> peer uit Studenten-groep"],["00:00.16","block","netbird: peer 100.70.95.98 uit groep Studenten"],["00:00.17","block","netbird: ACL deny-by-default. alle toegang gestopt"]],fullText:`Quarantaine hergebruikt het ZTNA-model in plaats van een aparte blokkeer-laag. Omdat toegang **groep-gebonden** is en de ACL deny-by-default hanteert, is een peer uit zijn groep halen genoeg: er blijft simpelweg niets meer over dat hij mag bereiken.

Dit is elegant omdat er geen losse blocklist of firewall-mutatie nodig is die kan verlopen of inconsistent raken. De bron van waarheid blijft NetBird, en de Identity Bridge ziet de wijziging bij de volgende poll vanzelf.`},{id:"wazuh-log",boardId:"casb",num:"05 / SIEM",title:"Wazuh legt alles vast",desc:"Parallel aan de respons consumeert de Wazuh Forwarder dezelfde events op security.alert.> — onafhankelijk van de Control Daemon. Daar worden ze gecorreleerd en bewaard, zodat er een audittrail is van wat er gedetecteerd is en welke reactie volgde.",activeNodes:["nats","wazuh"],activeEdges:["nats-wazuh"],packet:{path:"nats-wazuh",color:"var(--cyan)",label:"security.alert.>"},meta:[["siem","Wazuh (SIEM / XDR)"],["bron","NATS security.alert.>"],["functie","correlatie + audittrail"],["retentie","events bewaard"]],log:[["00:00.18","info","wazuh-forwarder: consumeert security.alert.> (durable PULL)"],["00:00.19","info","wazuh: alert + quarantaine-actie gecorreleerd"],["00:00.20","ok","wazuh: audittrail bijgewerkt voor peer 100.70.95.98"]],fullText:"Reageren is niet hetzelfde als verantwoorden. Wazuh is de **SIEM / XDR** die de volledige geschiedenis vasthoudt: welk alert kwam binnen, hoe scoorde de Control Daemon, en welke quarantaine volgde.\n\nDe Wazuh Forwarder is een **parallelle** consumer op `security.alert.>` — onafhankelijk van de Control Daemon, beide als durable PULL-consumer op dezelfde bus. Zo is er een onafhankelijke registratie los van de live-besluitvorming. Dat is nodig voor onderzoek achteraf, voor het bijstellen van de score-gewichten, en om te kunnen aantonen dat het systeem deed wat het hoorde te doen."},{id:"recap",boardId:"casb",num:"06 / RECAP",title:"Gesloten detectie-respons-lus",desc:"CASB-keten afgerond: sensoren publiceren op NATS, de Control Daemon scoort met een sliding window, bij score >= 80 haalt de Control Daemon de peer via Groups API GET/PUT uit zijn groep (quarantaine via deny-by-default), en Wazuh houdt de volledige audittrail bij.",activeNodes:["sensors","nats","control","netbird","wazuh"],activeEdges:["sensors-nats","nats-control","control-netbird","nats-wazuh"],packet:null,meta:[["bus","NATS JetStream. security.alert.*"],["score","malware=80. dlp=30. drempel=80"],["respons","NetBird. peer uit groep"],["audit","Wazuh. security.alert.>"]],log:[["00:00.30","ok","casb: lus gesloten. detectie -> respons -> audit"],["00:00.30","ok","casb: quarantaine zonder firewall-mutatie"],["00:00.30","ok","casb: events vastgelegd voor onderzoek"]],fullText:`De rode draad: **één bus, één beslisser, hergebruik van het ZTNA-model voor de reactie, en een onafhankelijke audittrail**.

Deze keten leunt op de andere domeinen. De sensoren komen deels uit de SWG (ClamAV, DLP) en uit Monitoring (Suricata). De quarantaine werkt alleen omdat ZTNA toegang groep-gebonden maakt. En de Identity Bridge zorgt dat een peer-IP herleidbaar is naar een gebruiker. CASB is daarmee de plek waar de signalen van het hele platform samenkomen en omgezet worden in actie.`}],pk=[{id:"intro",boardId:"monitoring",num:"01 / OBSERVE",title:"Zicht over het hele platform",desc:"Elk domein produceert signalen. Monitoring brengt ze samen op één bus, correleert ze in een SIEM en koppelt ze aan geautomatiseerde respons. Zonder dit overzicht zou elk component een blind eiland zijn.",activeNodes:["suricata"],activeEdges:[],packet:null,meta:[["doel","observe -> correlate -> act"],["bus","NATS JetStream"],["siem","Wazuh"]],log:[["00:00.01","info","monitoring: sensoren en streams online"],["00:00.02","info","monitoring: wacht op events van alle domeinen"]],fullText:`Monitoring & Respons is het **observability-domein**. Het maakt geen verkeer en blokkeert ook niets rechtstreeks, maar geeft de rest van het platform ogen en een geheugen.

De drie lagen zijn: **observe** (sensoren leveren events), **correlate** (Wazuh bouwt er een samenhangend beeld van), en **act** (de Control Daemon zet bevindingen om in respons). Dezelfde NATS-bus die de CASB gebruikt, draagt hier ook de bredere telemetrie.`},{id:"tap",boardId:"monitoring",num:"02 / IDS",title:"Suricata tapt het verkeer",desc:"Suricata draait als IDS op beide interfaces (vtnet0 = WAN, vtnet1 = LAN) en schrijft bevindingen naar eve.json. Het is bewust detectie, niet preventie: het tapt mee en alarmeert, het zit niet inline in het pad.",activeNodes:["suricata"],activeEdges:[],nodeStates:{suricata:"hit"},packet:null,meta:[["engine","Suricata 7.0 (IDS)"],["ifaces","vtnet0 (WAN). vtnet1 (LAN)"],["rules","79.620+ (ET Open + Abuse.ch)"],["output","eve.json"]],log:[["00:00.05","info","suricata[vtnet0]: PCAP capture (BPF)"],["00:00.06","hit","suricata: ET signature match -> eve.json"],["00:00.07","info","suricata: alarmeert, blokkeert niet (IDS-modus)"]],fullText:"Suricata is hier een **IDS, geen IPS**. Dat is een bewuste keuze: het systeem zit niet inline in het verkeerspad, dus een vals positief legt de boel niet plat. Het tapt mee op WAN en LAN en alarmeert.\n\nDe inline-blokkering gebeurt elders (Squid/ICAP voor web, NetBird voor toegang). Door detectie en preventie te scheiden, kun je agressief detecteren zonder beschikbaarheid te riskeren. De bevindingen gaan als gestructureerde `eve.json`-events de pijplijn in."},{id:"bus",boardId:"monitoring",num:"03 / BUS",title:"NATS draagt de events",desc:"Suricata en de andere sensoren publiceren op NATS JetStream onder de subject-familie security.alert.<bron> (ids/proxy/dlp/malware/dns/casb), stream SECURITY_ALERTS. Wazuh en de Control Daemon zijn twee onafhankelijke durable consumers. JetStream persisteert zodat niets verloren gaat.",activeNodes:["suricata","nats"],activeEdges:["suricata-nats"],packet:{path:"suricata-nats",color:"var(--cyan)",label:"eve.json -> security.alert.ids"},meta:[["bus","NATS JetStream (persistent)"],["stream","SECURITY_ALERTS = security.alert.*"],["subjects","security.alert.ids/proxy/dlp/malware/dns/casb"],["consumers","Wazuh + Control Daemon (parallel, durable)"]],log:[["00:00.10","info","nats: publish eve.json -> security.alert.ids"],["00:00.11","info","nats: JetStream persisteert op SECURITY_ALERTS stream"],["00:00.12","ok","nats: events persistent. consumers kunnen later lezen"]],fullText:"NATS JetStream is de **ruggengraat** van zowel monitoring als CASB. Alle detectiebronnen publiceren op de subject-familie `security.alert.<bron>`: Suricata op `security.alert.ids`, de proxy op `security.alert.proxy`, enzovoort. De stream `SECURITY_ALERTS` vangt `security.alert.*` op en persisteert het.\n\nWazuh en de Control Daemon zijn **twee onafhankelijke durable consumers** op dezelfde stream — ze lezen parallel, niet serieel. Persistentie betekent dat een herstartende consumer de gemiste events alsnog ophaalt."},{id:"correlate",boardId:"monitoring",num:"04 / SIEM",title:"Wazuh correleert en bewaart",desc:"Wazuh consumeert security.alert.> als durable consumer en bouwt er een samenhangend beeld van. Losse events worden via regels gecorreleerd tot betekenisvolle incidenten en getoond op dashboards, met retentie voor onderzoek achteraf.",activeNodes:["nats","wazuh"],activeEdges:["nats-wazuh"],subActive:["corr"],packet:{path:"nats-wazuh",color:"var(--cyan)",label:"security.alert.>"},meta:[["siem","Wazuh (SIEM / XDR)"],["input","NATS security.alert.> (durable consumer)"],["functie","correlatie-regels + dashboards"],["retentie","events bewaard voor analyse"]],log:[["00:00.14","info","wazuh: consume security.alert.> (durable)"],["00:00.15","info","wazuh: correlatie-regel matcht reeks events"],["00:00.16","ok","wazuh: incident zichtbaar op dashboard"]],fullText:`Wazuh is de **SIEM / XDR**. Het verschil met een losse alert: Wazuh ziet patronen over de tijd en over componenten heen. Een enkel event is ruis, maar een reeks gerelateerde events kan een aanval zijn.

Naast detectie levert Wazuh **geheugen**: retentie van events maakt forensisch onderzoek mogelijk en helpt om de detectieregels en de score-gewichten van de Control Daemon bij te stellen. Het is de plek waar een analist het hele verhaal terugziet.`},{id:"respond",boardId:"monitoring",num:"05 / RESPONS",title:"Control Daemon zet om in actie",desc:"Waar Wazuh observeert, handelt de Control Daemon. Het consumeert de reactie-waardige signalen, scoort ze (zie CASB) en triggert bij overschrijding van de drempel een geautomatiseerde respons zoals quarantaine via NetBird.",activeNodes:["nats","control"],activeEdges:["nats-control"],packet:{path:"nats-control",color:"var(--amber)",label:"security.alert.>"},meta:[["respons","Control Daemon"],["input","security.alert.> (durable consumer, parallel aan Wazuh)"],["beslissing","sliding-window score"],["actie","quarantaine via NetBird API"]],log:[["00:00.18","info","control: consume security.alert.> (durable)"],["00:00.19","info","control: score bijgewerkt per peer"],["00:00.20","ok","control: bij drempel -> respons getriggerd"]],fullText:"De **Control Daemon** is de schakel tussen weten en doen. Hij is een tweede durable consumer op `security.alert.>` — parallel aan Wazuh, niet via Wazuh. Hij hergebruikt exact dezelfde scoring-logica als in de CASB-keten: een sliding window per peer, met gewichten en een drempel van 80.\n\nDat monitoring en CASB dezelfde beslisser delen is geen toeval, het is één respons-mechanisme dat door verschillende detectiebronnen gevoed wordt. Of een signaal nu van Suricata, ClamAV of de DLP komt, het loopt door dezelfde poort naar dezelfde geautomatiseerde actie."},{id:"recap",boardId:"monitoring",num:"06 / RECAP",title:"Observe, correlate, act",desc:"Monitoring-keten afgerond: Suricata en sensoren tappen en alarmeren, NATS draagt de events op gescheiden subjects, Wazuh correleert en bewaart, en de Control Daemon zet bevindingen om in geautomatiseerde respons.",activeNodes:["suricata","nats","wazuh","control"],activeEdges:["suricata-nats","nats-wazuh","nats-control"],packet:null,meta:[["observe","Suricata IDS. eve.json"],["transport","NATS security.alert.*"],["correlate","Wazuh SIEM / XDR (durable consumer)"],["act","Control Daemon -> NetBird (durable consumer, parallel)"]],log:[["00:00.30","ok","monitoring: observe-correlate-act keten gesloten"],["00:00.30","ok","monitoring: detectie gescheiden van preventie"],["00:00.30","ok","monitoring: één bus, gedeelde respons-beslisser"]],fullText:`De rode draad: **detectie centraliseren, scheiden van preventie, en koppelen aan één geautomatiseerde respons**.

Dit domein bindt het platform samen. De SWG levert web-detecties, ZTNA levert de identiteit achter een IP, CASB deelt de respons-logica, en SD-WAN/endpoint leveren context over apparaten. Monitoring is waar al die signalen een gedeeld beeld en een gedeelde reactie krijgen.`}],mk=[{id:"intro",boardId:"sdwan",num:"01 / BRANCH",title:"Een bijkantoor zonder site-tunnel",desc:"Klassiek SD-WAN bouwt een IPsec-tunnel tussen kantoren waarna alles op het andere subnet bereikbaar is. Hier niet: elk apparaat op site01 krijgt zelf toegang via het overlay, en VyOS regelt alleen het lokale netwerk en QoS.",activeNodes:["device"],activeEdges:[],packet:null,meta:[["site","site01 (branch)"],["model","ZT-Branch (geen site-tunnel)"],["router","VyOS"],["overlay","NetBird per apparaat"]],log:[["00:00.01","info","site01: branch device boot. LAN up"],["00:00.02","info","site01: geen IPsec site-to-site actief"]],fullText:`Dit domein is bewust **gedescopet tot ZT-Branch**: de oorspronkelijke IPsec site-to-site stukken zijn geschrapt. In plaats van twee netwerken aan elkaar te knopen, behandelt het ontwerp een bijkantoor als een verzameling losse, individueel geverifieerde apparaten.

De winst: een ingebroken apparaat op site01 krijgt geen vrij zicht op het hele bedrijfsnetwerk, want er is geen impliciet vertrouwd subnet. VyOS blijft als lokale router relevant voor adressering en verkeersprioritering, maar is niet langer de vertrouwde poort.`},{id:"branch-netbird",boardId:"sdwan",num:"02 / AUTH",title:"Elk apparaat authenticeert apart",desc:"Het branch-apparaat doorloopt dezelfde identity-aware login als elke andere client en wordt een individuele peer op het NetBird-overlay. Er is geen IPsec en geen impliciet subnet: alleen dit apparaat, met zijn eigen groepen, krijgt toegang.",activeNodes:["device","vyos"],activeEdges:["device-vyos"],packet:{path:"device-vyos",color:"var(--cyan)",label:"LAN"},meta:[["auth","per apparaat (zie ZTNA)"],["peer","individuele NetBird-peer"],["geen","IPsec / impliciet subnet"],["groepen","bepalen toegang"]],log:[["00:00.05","info","device: OIDC login (Entra -> Zitadel -> NetBird)"],["00:00.06","ok","netbird: branch device als losse peer toegevoegd"],["00:00.07","info","site01: geen subnet-route gedeeld met core"]],fullText:`De kern van ZT-Branch: het bijkantoor erft de **ZTNA-keten** een-op-een. Het apparaat logt in via Entra ID, Zitadel normaliseert de groepen, en NetBird maakt er een individuele peer van.

Daardoor geldt op de branch precies hetzelfde beleid als overal: toegang is groep-gebonden en deny-by-default. Een laptop op site01 en een laptop thuis worden identiek behandeld, omdat de locatie geen vertrouwen meer geeft.`},{id:"vyos-qos",boardId:"sdwan",num:"03 / QoS",title:"VyOS markeert verkeer (DSCP)",desc:"VyOS op site01 verzorgt QoS via DSCP-markeringen: EF voor Teams-audio (realtime spraak), AF41 voor Teams-video, AF21 voor Teams-schermdelen. Zo krijgt latency-gevoelig verkeer voorrang op de uplink van het bijkantoor.",activeNodes:["vyos"],activeEdges:[],subActive:["qos-ef","qos-af41","qos-af21"],nodeStates:{vyos:"hit"},packet:null,meta:[["router","VyOS (site01)"],["EF","Teams audio (realtime)"],["AF41","Teams video"],["AF21","Teams schermdelen"]],log:[["00:00.10","info","vyos: classify flow -> Teams"],["00:00.11","ok","vyos: DSCP EF gemarkeerd. prioriteit op uplink"],["00:00.12","info","vyos: Teams-video -> AF41. Teams-schermdelen -> AF21"]],fullText:"Zero trust gaat over toegang, maar een bijkantoor heeft ook een **beperkte uplink** die verstandig verdeeld moet worden. Daar blijft VyOS voor zorgen met QoS.\n\nDSCP is een markering in de IP-header die routers vertelt hoe belangrijk een pakket is. `EF` (Expedited Forwarding) is voor Teams-audio — realtime spraak die niet mag haperen; `AF41` geeft Teams-video een gegarandeerde maar lagere prioriteit; `AF21` is voor Teams-schermdelen dat iets meer vertraging kan verdragen. Alle drie klassen worden door Intune NetworkQoSPolicy op het eindpunt gemarkeerd en door VyOS op eth0 gevormd."},{id:"reach-core",boardId:"sdwan",num:"04 / CORE",title:"Overlay naar de kerndiensten",desc:"Het gemarkeerde verkeer gaat via de WireGuard-overlay van NetBird naar de kerndiensten. De per-peer ACL bepaalt wat dit specifieke apparaat mag bereiken; al het overige blijft dicht (deny-by-default).",activeNodes:["vyos","netbird","core"],activeEdges:["vyos-netbird","netbird-core"],subActive:["peer"],packet:{path:"netbird-core",color:"var(--cyan)",label:"overlay"},meta:[["transport","NetBird. WireGuard"],["policy","per-peer ACL"],["core","ZTNA-beschermde diensten"],["default","deny-by-default"]],log:[["00:00.14","info","netbird: peer verzendt naar core via wt0"],["00:00.15","ok","netbird: ACL staat toegestane dienst toe"],["00:00.16","info","core: verbinding alleen voor wat de groep toelaat"]],fullText:`De reis eindigt op het overlay dat we uit ZTNA kennen. Omdat het branch-apparaat een gewone peer is, gelden dezelfde **per-peer ACL's**: het bereikt alleen de diensten die zijn groepen toestaan.

Er is geen tunnel die 'site01' als geheel met 'core' verbindt. Dat is precies de bedoeling, want het verkleint de aanvalsoppervlakte: er valt niets lateraal te ontdekken vanaf de branch dat niet expliciet is toegestaan voor dit ene apparaat.`},{id:"recap",boardId:"sdwan",num:"05 / RECAP",title:"Branch als losse peers",desc:"ZT-Branch afgerond: geen IPsec site-tunnel, elk apparaat authenticeert individueel op het NetBird-overlay met groep-gebonden ACL's, en VyOS verzorgt lokaal QoS via DSCP zodat realtime verkeer voorrang houdt.",activeNodes:["device","vyos","netbird","core"],activeEdges:["device-vyos","vyos-netbird","netbird-core"],packet:null,meta:[["toegang","per apparaat (ZTNA)"],["geen","IPsec / impliciet subnet"],["qos","VyOS DSCP. EF/AF41/AF21"],["overlay","NetBird per-peer ACL"]],log:[["00:00.20","ok","ztbranch: geen vertrouwd subnet op site01"],["00:00.20","ok","ztbranch: toegang identiteitsgebonden"],["00:00.20","ok","ztbranch: QoS borgt realtime verkeer"]],fullText:`De rode draad: **locatie geeft geen vertrouwen meer; identiteit wel**. Een bijkantoor is niet langer een vertrouwde zone maar een plek waar dezelfde zero-trust-regels gelden als overal.

Dit domein leunt volledig op ZTNA voor toegang en raakt monitoring/CASB voor detectie en respons. De enige branch-specifieke toevoeging is QoS via VyOS, omdat een fysieke locatie nu eenmaal een gedeelde uplink heeft die beheerd moet worden.`}],gk=[{id:"intro",boardId:"endpoint",num:"01 / ENDPOINT",title:"Een apparaat klaarmaken",desc:"Voordat een apparaat veilig mag deelnemen, moet het bekend en correct geconfigureerd zijn. Endpoint Enforcement zorgt dat elk corporate apparaat een identiteit krijgt en automatisch de juiste beveiligingsinstellingen ontvangt.",activeNodes:["device"],activeEdges:[],packet:null,meta:[["device","Windows endpoint"],["idp","Entra ID"],["mdm","Microsoft Intune"],["doel","identiteit + posture"]],log:[["00:00.01","info","endpoint: nieuw corp device, nog niet enrolled"],["00:00.02","info","endpoint: start Entra ID enrollment"]],fullText:`Endpoint Enforcement is het fundament onder de rest. Een ZTNA-overlay en SWG-inspectie hebben weinig waarde als de apparaten er zelf rommelig bij staan.

De twee stappen: het apparaat krijgt eerst een **identiteit** bij Entra ID (zodat het herkenbaar is in elke andere keten), en daarna een **posture** via Intune (de configuratie die het apparaat veilig en compatibel maakt met de rest van het platform).`},{id:"entra-join",boardId:"endpoint",num:"02 / JOIN",title:"Entra ID Join / Register",desc:"Het Windows-apparaat doet een Entra ID Join (of Register). Daarmee krijgt het een device-identiteit in de directory, los van de gebruiker. Die identiteit is wat later in de ZTNA-login en in policies aan dit specifieke apparaat gekoppeld wordt.",activeNodes:["device","entra"],activeEdges:["device-entra"],packet:{path:"device-entra",color:"var(--cyan)",label:"Join / Register"},meta:[["actie","Entra ID Join / Register"],["resultaat","device-identiteit in directory"],["scope","apparaat (los van gebruiker)"],["gebruik","ZTNA-login + policies"]],log:[["00:00.05","info","device: Entra ID Join gestart"],["00:00.06","ok","entra: device geregistreerd. object aangemaakt"],["00:00.07","info","entra: device geldt nu als bekend in directory"]],fullText:`Het verschil tussen **Join** en **Register**: een Entra ID Join maakt het apparaat volledig bedrijfseigendom in de directory, terwijl Register lichter is (bring-your-own). In beide gevallen ontstaat een **device-object** dat losstaat van de gebruiker.

Dat aparte apparaat-identiteit is belangrijk: policies kunnen zo eisen stellen aan het apparaat zelf, niet alleen aan wie inlogt. Een geldige gebruiker op een onbekend apparaat is iets anders dan diezelfde gebruiker op een enrolled, compliant apparaat.`},{id:"intune-push",boardId:"endpoint",num:"03 / PUSH",title:"Intune duwt 5 profielen",desc:"Zodra het apparaat bekend is, levert Intune automatisch 5 configuratieprofielen: de proxy via OMA-URI, het CA-certificaat, een firewall-profiel, QoS DSCP-markeringen en split-tunnel routes. Geen handmatige setup, alles via MDM.",activeNodes:["entra","intune"],activeEdges:["entra-intune"],packet:{path:"entra-intune",color:"var(--cyan)",label:"device identity"},meta:[["mdm","Microsoft Intune"],["trigger","device enrolled"],["profielen","5 (auto-push)"],["methode","OMA-URI + configprofielen"]],log:[["00:00.10","info","intune: device compliant -> profielen toewijzen"],["00:00.11","info","intune: 5 configuratieprofielen in de wachtrij"],["00:00.12","ok","intune: push gestart naar endpoint"]],fullText:`Intune is het **MDM** dat het apparaat zonder handwerk in de juiste staat brengt. Configuratie via een centrale push is reproduceerbaar en controleerbaar: elk apparaat krijgt exact dezelfde basis.

De vijf profielen samen vormen de brug naar de andere domeinen: ze zorgen dat het apparaat de proxy gebruikt, de inspectie vertrouwt, en zich netjes op het netwerk gedraagt. Zonder deze push zou een gebruiker handmatig dingen moeten instellen, met alle fouten en gaten van dien.`},{id:"profiles-active",boardId:"endpoint",num:"04 / POSTURE",title:"Profielen actief op het apparaat",desc:"De profielen landen op het apparaat en maken het pas echt onderdeel van het platform: het stuurt verkeer naar Squid (proxy), vertrouwt de SSL-Bump CA, heeft firewall-regels, markeert verkeer met DSCP en kent de split-tunnel routes naar het overlay.",activeNodes:["intune","device"],activeEdges:["intune-device"],subActive:["proxy","cacert","fw","qos","split"],nodeStates:{device:"active"},packet:{path:"intune-device",color:"var(--cyan)",label:"5 profielen",dur:5.5},meta:[["proxy","OMA-URI -> Squid 3128"],["ca-cert","vertrouw SASE-PoC-CA (SSL Bump)"],["firewall","host-regels actief"],["qos + split","DSCP + routes naar overlay"]],log:[["00:00.14","ok","device: proxy ingesteld -> 100.70.154.79:3128"],["00:00.15","ok","device: SASE-PoC-CA vertrouwd (SSL Bump werkt)"],["00:00.16","ok","device: firewall + QoS + split-tunnel toegepast"]],fullText:`Nu valt alles op zijn plek. Elk profiel haakt in op een ander domein:

- **proxy (OMA-URI)** stuurt al het webverkeer naar Squid, zodat de SWG-inspectie niet te omzeilen is.
- **CA-cert** laat het apparaat het dynamische certificaat van SSL Bump vertrouwen, anders zou elke bumped site een certificaatfout geven.
- **firewall** geeft host-niveau bescherming.
- **QoS DSCP** zorgt dat verkeer al bij de bron correct gemarkeerd is (sluit aan op VyOS in ZT-Branch).
- **split-tunnel routes** bepalen wat via het NetBird-overlay gaat en wat direct.

Het CA-cert profiel is de stilzwijgende voorwaarde voor de hele SWG: zonder dat vertrouwen werkt de TLS-interceptie niet schoon.`},{id:"recap",boardId:"endpoint",num:"05 / RECAP",title:"Bekend, compliant, klaar",desc:"Endpoint-keten afgerond: Entra ID geeft het apparaat een identiteit, Intune duwt automatisch 5 profielen (proxy, CA-cert, firewall, QoS, split-tunnel), en daarmee is het apparaat klaar om vertrouwd deel te nemen aan ZTNA en de SWG-inspectie.",activeNodes:["device","entra","intune"],activeEdges:["device-entra","entra-intune","intune-device"],packet:null,meta:[["identiteit","Entra ID Join / Register"],["posture","Intune. 5 profielen"],["enabler swg","proxy + CA-cert"],["enabler ztna","split-tunnel routes"]],log:[["00:00.20","ok","endpoint: device bekend en compliant"],["00:00.20","ok","endpoint: posture afgedwongen via MDM"],["00:00.20","ok","endpoint: klaar voor ZTNA + SWG"]],fullText:`De rode draad: **een apparaat verdient geen vertrouwen omdat het bestaat, maar omdat het bekend en correct geconfigureerd is**.

Dit domein is de basis waarop de rest rust. De proxy- en CA-cert-profielen maken de SWG mogelijk; de split-tunnel routes maken het ZTNA-overlay mogelijk; de QoS-markering sluit aan op ZT-Branch. Endpoint Enforcement levert dus niet alleen veilige apparaten, het levert de voorwaarden waaronder alle andere domeinen kunnen werken.`}],Fs={overview:Kg,swg:ak,ztna:ik,casb:lk,monitoring:rk,sdwan:ok,endpoint:uk},hk=[{id:"overview",label:"Overzicht — 6 domeinen",kind:"overview",scenes:sk},{id:"endpoint",label:"Endpoint — device enrollment",kind:"domain",scenes:gk},{id:"ztna",label:"ZTNA — Zero Trust Access",kind:"domain",scenes:dk},{id:"swg",label:"SWG — Secure Web Gateway",kind:"domain",scenes:ck},{id:"sdwan",label:"SD-WAN — ZT-Branch",kind:"domain",scenes:mk},{id:"casb",label:"CASB — Detectie & Quarantaine",kind:"domain",scenes:fk},{id:"monitoring",label:"Monitoring & Respons",kind:"domain",scenes:pk}],Fg=Object.keys(Kg.nodes);function vk(a){return a.replace(/^\s*\d+\.\s*/,"").trim()}function bk(a){const l=a.replace(/\s+/g," ").trim(),o=l.match(/^(.{0,200}?[.!?])(\s|$)/);return o?o[1]:l.length>200?l.slice(0,197)+"...":l}function yk(a){if(!a.startsWith("domain:"))return null;const l=a.slice(7);return Fg.includes(l)?l:null}function Sk(a){return a.startsWith("article:components/")?"component":a.startsWith("article:concepts/")?"concept":a.startsWith("article:decisions/")?"decision":a.startsWith("article:testing/")?"bewijs":null}function kk(a,l){const o=[...a.steps].sort((u,c)=>u.order-c.order);return o.map((u,c)=>{const d=Array.from(new Set(u.nodeIds.map(yk).filter(v=>v!==null))),f=d.length===1&&Fs[d[0]]?d[0]:"overview",g=f==="overview"?d.length>0?d:Fg:Object.keys(Fs[f].nodes),h=[];for(const v of u.nodeIds){const y=Sk(v),w=l.get(v);y&&w&&h.push([y,w.name])}let m=u.description;return u.languageLesson&&(m+=`

**Taalles.** ${u.languageLesson}`),{id:`${a.id}-${u.order}`,boardId:f,num:`${String(c+1).padStart(2,"0")} / TOUR`,title:vk(u.title),desc:bk(u.description),fullText:m,activeNodes:g,activeEdges:[],packet:null,meta:h.length>0?h.slice(0,8):[["tour",a.name]],log:[["","info",`stap ${c+1} / ${o.length} — ${a.name}`]]}})}function wk(a){if(!a?.tours||a.tours.length===0)return[];const l=new Map(a.nodes.map(o=>[o.id,o]));return a.tours.map(o=>({id:`tour:${o.id}`,label:`Tour — ${o.name}`,kind:"tour",scenes:kk(o,l)}))}const xk=JSON.parse('[{"id":"orientation","name":"Oriëntatie","description":"Van nul naar volledig systeemoverzicht in 13 stappen. Bouw een mentaal model op van het hele SASE-systeem.","steps":[{"order":1,"title":"1. Het probleem: waarom traditionele beveiliging faalt","description":"**Je kent dit al:** een schoolnetwerk met 4000 leerlingen en docenten. Iedereen logt in op WiFi en krijgt toegang.\\n\\n**Het probleem:** het oude model (\\"kasteel met slotgracht\\") vertrouwt iedereen *binnen* het netwerk. Maar leerlingen gebruiken cloud-apps, werken thuis, en brengen hun eigen apparaten mee. De slotgracht bestaat niet meer.\\n\\n**Wat je hier leert:** het SASE-raamwerk (Secure Access Service Edge: beveiliging als clouddienst aan de rand van het netwerk) verplaatst beveiliging van het netwerk naar de *identiteit* van de gebruiker. Niet waar je bent telt, maar *wie je bent*.","nodeIds":["article:overview/architecture.nl","article:concepts/sase.nl","domain:ztna","domain:swg","domain:casb","domain:sdwan","domain:monitoring","domain:endpoint"],"languageLesson":"**SASE (Secure Access Service Edge):** een model dat netwerk en beveiliging samenbrengt als één clouddienst aan de rand van het netwerk. Niet langer een vaste perimeter rond het kantoor, maar beveiliging die met de gebruiker meereist, waar die ook werkt."},{"order":2,"title":"2. Drie poorten, niet één","description":"**Analogie:** luchthavenveiligheid. Je paspoort wordt gecontroleerd (identiteit), je bagage wordt gescand (apparaat), en je wordt gefouilleerd (inhoud). Alle drie, elke keer.\\n\\n**De drie gates:**\\n- **Poort 1, identiteit:** Wie ben je? MFA (meervoudige authenticatie, bijvoorbeeld wachtwoord plus een code op je telefoon), login-risico, geolocatie\\n- **Poort 2, apparaat:** Is je laptop veilig? OS-versie, antivirus, firewall\\n- **Poort 3, inhoud:** Wat verstuur je? Malware, gevoelige data, geblokkeerde sites\\n\\nGeen van de drie vervangt de andere. Zelfs als je identiteit klopt en je laptop veilig is, wordt malware nog steeds geblokt.","nodeIds":["article:concepts/zero-trust.nl","domain:ztna","domain:swg"],"languageLesson":"**MFA (meervoudige authenticatie):** inloggen met meer dan één bewijs, bijvoorbeeld iets wat je weet (wachtwoord) plus iets wat je hebt (een code op je telefoon). Een gestolen wachtwoord alleen is dan niet genoeg om binnen te komen."},{"order":3,"title":"3. De veilige tunnel: NetBird ZTNA","description":"**Bouwt voort op:** de drie poorten. Voordat je verkeer kunt inspecteren, heb je een veilig pad nodig.\\n\\n**Wat NetBird doet:** het maakt een versleutelde WireGuard-tunnel (moderne, snelle VPN-techniek) per apparaat. Het is geen klassieke VPN waar iedereen hetzelfde subnet deelt. Elk apparaat krijgt een unieke overlay-IP en kan alleen bereiken wat zijn *identiteitsgroep* toestaat.\\n\\n**Kernmoment:** ZTNA (Zero Trust Network Access) is de netwerktoepassing van het Zero Trust-idee uit stap 2. Bij een VPN vertrouw je iedereen na het inloggen. Bij ZTNA vertrouw je *niemand*: elke toegang wordt opnieuw gecontroleerd.","nodeIds":["article:components/netbird.nl","domain:ztna","flow:user-login"]},{"order":4,"title":"4. Wie ben je? De identiteitsketen","description":"**Bouwt voort op:** NetBird (tunnel). Nu moet de tunnel weten *wie* er doorheen gaat.\\n\\n**De estafette:** je identiteit gaat door vier stations:\\n1. **Entra ID:** Microsoft controleert je wachtwoord + MFA\\n2. **Zitadel:** vertaalt Microsoft-groepen naar schone namen\\n3. **NetBird:** kent je groep, geeft je toegang tot het juiste netwerksegment\\n4. **Identity Bridge:** vertaalt je overlay-IP terug naar je groep, zodat de proxy weet wie je bent\\n\\nElk station geeft het stokje door. Als één station uitvalt, val je terug op de strengste standaardregels (fail-safe).","nodeIds":["article:components/zitadel.nl","article:concepts/identity-flow.nl","article:components/identity-bridge.nl","domain:ztna","flow:user-login","step:login-mfa","step:zitadel-broker","step:netbird-tunnel","step:identity-bridge-map"]},{"order":5,"title":"5. Hoe vindt je browser de proxy?","description":"**Bouwt voort op:** identiteit (je bent ingelogd). Nu moet je browser weten *waar* het verkeer naartoe moet.\\n\\n**WPAD/PAC in het kort:** je browser vraagt automatisch aan `wpad.sandbox.local`: \\"waar is de proxy?\\" Caddy antwoordt met een klein JavaScript-bestandje (PAC) dat zegt: \\"stuur al het internetverkeer naar Squid op pop01.\\"\\n\\n**Waarom niet transparant?** Een transparante proxy werkt niet over WireGuard-tunnels. Daarom kiest dit project voor een expliciete proxy, dezelfde aanpak als commerciële SASE-oplossingen zoals Zscaler.","nodeIds":["article:concepts/wpad-pac.nl","article:components/caddy.nl","article:decisions/wpad-vs-transparent-proxy.nl","domain:swg","flow:web-request","step:pac-discovery"]},{"order":6,"title":"6. De glazen deur: HTTPS-verkeer zichtbaar maken","description":"**Bouwt voort op:** de proxy (Squid ontvangt nu al het verkeer). Maar 95% is HTTPS, dus versleuteld.\\n\\n**SSL Bump:** Squid opent de versleutelde envelop, leest de inhoud, sluit hem weer, en stuurt hem door. De client vertrouwt dit omdat het PoC-CA-certificaat via Intune op elk apparaat is geïnstalleerd.\\n\\n**Zonder SSL Bump** ziet de proxy alleen \\"er gaat een pakket naar google.com\\" maar niet *wat* erin zit. Malwarescanning en DLP zijn dan blind.\\n\\n**Uitzondering:** Microsoft-inlogpagina\'s worden NIET ontsleuteld (certificate pinning zou breken).","nodeIds":["article:concepts/ssl-bump.nl","article:components/squid.nl","domain:swg","flow:web-request","step:squid-receive","step:ssl-bump-decrypt"]},{"order":7,"title":"7. Scannen wat er doorheen gaat: DLP en malware","description":"**Bouwt voort op:** SSL Bump (verkeer is nu leesbaar). Nu kan het geïnspecteerd worden.\\n\\n**Twee lagen, twee richtingen:**\\n- **Laag 1 (downloads):** ClamAV scant alles wat je *binnenhaalt*: malware, creditcardnummers in documenten, YARA-patronen\\n- **Laag 2 (uploads):** Python DLP scant alles wat je *verstuurt*: formulieren met BSN, IBAN, creditcards\\n\\n**Waarom twee?** ClamAV kan geen multipart-formulieren parsen. Python DLP wel, met wiskundige validatie (Luhn, mod-97, 11-proef).\\n\\n**ICAP** is het protocol waarmee Squid beide scanners aanroept, als een telefoontje: \\"Is dit bestand veilig?\\"","nodeIds":["article:concepts/icap.nl","article:concepts/dlp.nl","article:components/clamav-cicap.nl","article:components/python-dlp.nl","article:decisions/two-layer-dlp.nl","domain:swg","flow:web-request","step:url-filter","step:icap-clamav","step:icap-dlp"]},{"order":8,"title":"8. DNS als eerste verdedigingslijn","description":"**Bouwt voort op:** contentinspectie (Poort 3). Maar er is een *snellere* blokkade mogelijk.\\n\\n**RPZ (Response Policy Zones):** voordat een TCP-verbinding überhaupt opstart, moet je browser de domeinnaam opzoeken via DNS. Als dat domein op een zwarte lijst staat (71.767 bekende malware-domeinen van Abuse.ch), antwoordt de DNS-server: \\"bestaat niet.\\"\\n\\n**De keten:** URLhaus/ThreatFox → ioc2rpz (aggregator) → BIND (TSIG-beveiligde transfer) → Unbound (blokkering).\\n\\n**Snelste blokkade in het systeem:** geen TCP-verbinding, geen data-uitwisseling, geen risico.\\n\\n**Let op het model:** DNS-RPZ en de Suricata IDS (volgende stap) zijn extra verdedigingslagen rond de drie poorten (defence-in-depth), niet een vierde poort. De drie poorten blijven het kernmodel; deze lagen vangen op wat erlangs glipt.","nodeIds":["article:concepts/rpz.nl","article:components/ioc2rpz.nl","article:decisions/bind-tsig-intermediary.nl","domain:swg","flow:dns-lookup","step:dns-query","step:rpz-check"]},{"order":9,"title":"9. De netwerksensor: Suricata IDS","description":"**Bouwt voort op:** DNS-blokkering + contentinspectie. Maar wat als een aanvaller die lagen omzeilt (bijv. via een hard-coded IP)?\\n\\n**Suricata** luistert mee op het netwerk (WAN + LAN) met 79.620 regels. Het detecteert:\\n- Command & Control-verkeer\\n- Exploit-pogingen\\n- Verdachte User-Agents\\n- Beleidsschendingen\\n\\n**IDS, niet IPS:** in de virtuele omgeving (GNS3/KVM) kan Suricata verkeer niet inline blokkeren (virtio-NIC\'s missen netmap-support). Het detecteert en rapporteert, andere lagen blokkeren.\\n\\n**Diepte-in-verdediging:** als DNS-blokkering en de proxy iets missen, vangt Suricata het op het draadniveau op.","nodeIds":["article:components/suricata.nl","article:decisions/ids-vs-ips.nl","domain:monitoring"]},{"order":10,"title":"10. De event bus: alles aan elkaar knopen","description":"**Bouwt voort op:** alle detectielagen (proxy, DLP, DNS, IDS). Elk systeem detecteert bedreigingen apart. Hoe komen die signalen samen?\\n\\n**NATS JetStream** is de centrale event bus, een nieuwsdraad waar elk systeem op publiceert:\\n- ClamAV vindt malware → `security.alert.malware`\\n- Python DLP vindt creditcard → `security.alert.dlp`\\n- Suricata ziet C2-verkeer → `security.alert.ids`\\n\\n**Twee consumenten:**\\n- **Control Daemon** (realtime) → scoort en reageert onmiddellijk\\n- **Wazuh SIEM** (forensisch) → logt alles voor analyse achteraf\\n\\nHet bus-patroon ontkoppelt detectie van respons: als Wazuh offline is, gaan events niet verloren.","nodeIds":["article:components/nats-jetstream.nl","domain:monitoring","domain:casb","flow:threat-response","step:alert-publish"]},{"order":11,"title":"11. Automatische quarantaine: van detectie tot actie","description":"**Bouwt voort op:** de event bus (signalen komen binnen). Nu de reactie.\\n\\n**Control Daemon** berekent een dreigingsscore per gebruiker:\\n- Malware gedetecteerd = 80 punten\\n- DLP-match = 30 punten\\n- Score ≥ 80 → **automatische quarantaine**\\n\\n**Hoe quarantaine werkt:**\\n1. Control Daemon roept de NetBird API aan\\n2. De gebruiker wordt uit zijn groep verwijderd\\n3. Geen groep = deny-by-default = geen toegang meer\\n4. Binnen milliseconden, zonder menselijke tussenkomst\\n\\n**Wazuh** logt ondertussen alles in een forensisch dashboard. Een beheerder kan achteraf analyseren wat er precies gebeurd is.","nodeIds":["article:components/control-daemon.nl","article:components/wazuh.nl","domain:casb","flow:threat-response","step:score-calculate","step:quarantine-execute","step:wazuh-log"]},{"order":12,"title":"12. De branch en het endpoint","description":"**Bouwt voort op:** het hele systeem. Hoe bereikt dit de apparaten en vestigingen?\\n\\n**Intune (endpoint):** duwt via MDM (Mobile Device Management: centraal beheer van apparaten) alle configuratie naar Windows-apparaten: proxy-instelling, CA-certificaat, firewallregels, QoS-markeringen. De gebruiker kan het niet uitschakelen.\\n\\n**VyOS (branch):** in het oude SD-WAN-model (slim sturen van netwerkverkeer over meerdere verbindingen) was de branch-gateway slim (IPsec, lokale regels). In Zero Trust SD-WAN is hij *dom*: alleen NAT en linkmonitoring. Alle intelligentie zit op de gateway (pop01).\\n\\n**Kernmoment:** ook de branch wordt niet vertrouwd. Elk apparaat authenticeert individueel via NetBird, precies zoals een thuiswerker.","nodeIds":["article:components/intune-endpoint-enforcement.nl","article:components/vyos.nl","article:decisions/zt-sdwan-branch.nl","domain:endpoint","domain:sdwan","flow:endpoint-enrollment","flow:branch-access"]},{"order":13,"title":"13. Cosmos: de tweede ZTNA-laag (application gateway)","description":"**Bouwt voort op:** NetBird (stap 3). NetBird levert de netwerklaag-tunnel en beslist welk device het DC-netwerk mag betreden. Maar network admission is device-scoped: zit een device eenmaal op de overlay, dan kan iedereen die het gebruikt elke interne service proberen die de ACL\'s toestaan.\\n\\n**Wat Cosmos doet:** Cosmos is een identity-aware application gateway op dc01, een reverse proxy die voor elke interne DC-service (Uptime Kuma, Gitea) een per-applicatie login + MFA-gate zet. De backend-poorten (`3001`, `3000`) staan nooit extern gebonden, dus het enige pad naar binnen is de proxy. Cosmos beantwoordt de vraag die de lagen eronder niet beantwoorden: *welke gebruiker mag deze specifieke applicatie openen?*\\n\\n**Kernmoment:** dit is two-layer Zero Trust. Gate 1 is NetBird (device-level, network admission), Gate 2 is Cosmos (user-level, application admission met MFA via TOTP). Een device dat op de NetBird-overlay zit maar waarvan de Cosmos-sessie verlopen is, kan geen enkele MFA-gated DC-applicatie openen zonder opnieuw met MFA te authenticeren. Sessieverloop wordt zo zelf een access-control-event.\\n\\n**Enforcement voor wie de proxy negeert:** voor niet-beheerde (BYOD) devices is er een transparante proxy (TPROXY op linuxpop01) als defense-in-depth. Die intercepteert al het HTTP/HTTPS-verkeer dat via de NetBird-overlay binnenkomt, ongeacht de clientconfiguratie, en behoudt het echte client-overlay-IP voor de Identity Bridge. De architectuur is gevalideerd op de parallelle stack; de implementatie is gedeprioriteerd omdat managed-device enforcement via Intune het primaire pad dekt.\\n\\n**Eerlijke scope:** Cosmos en deze enforcement-laag zijn gebouwd en gevalideerd op de parallelle `SASE_POC`-stack (dc01 `10.0.0.100`), nog niet in het sandbox-geheel geïntegreerd. Ze zijn additief op de bestaande NetBird ZTNA, geen vervanging.","nodeIds":["article:components/cosmos.nl","article:concepts/application-gateway.nl","article:components/transparent-proxy.nl","article:decisions/cosmos-two-layer-ztna.nl","domain:ztna","article:runbooks/13-cosmos.nl"]},{"order":14,"title":"14. Parallelle detectie: Zeek, RITA en de telemetry stack","description":"**Bouwt voort op:** Suricata (stap 9). Suricata is de signature-IDS: het matcht elk packet of elke flow tegen tienduizenden regels en vraagt \'heb ik dit exacte slechte ding al eerder gezien?\'. Het is snel en precies, maar blind voor wat nog niet in een ruleset zit: een vers C2-domein, een custom implant, een onbekende beacon.\\n\\n**Wat Zeek doet:** Zeek staat passief naast Suricata, op dezelfde wire maar met een andere vraag. Het reconstrueert TCP-streams en schrijft elke flow als gestructureerde protocollog (`conn`, `dns`, `ssl`, `http`, `ntp`). Het velt geen oordeel en blokkeert niets: Zeek ziet, RITA beslist.\\n\\n**Wat RITA doet:** RITA analyseert die Zeek-logs op gedrag over tijd in plaats van op inhoud per packet. De kernvraag: praat deze interne host met een bestemming op een manier die geautomatiseerd lijkt in plaats van menselijk? Een mens die surft is onregelmatig; malware die incheckt bij zijn C2 is metronomisch. RITA scoort elk `source -> destination` paar op regelmaat en geeft een beacon score van 0 tot 1. Het detecteert beaconing, C2-over-DNS, lange verbindingen en threat-intel matches.\\n\\n**Wat de telemetry stack doet:** Grafana + Prometheus + Loki vormen de observability-laag die metrics, logs en SASE security telemetry in een single pane of glass samenbrengt. Grafana visualiseert, Prometheus levert de metrics (GNS3 node status, host metrics) en Loki bewaart de logs (NetBird-events, Zeek conn/dns/http, Wazuh-alerts).\\n\\n**Eerlijke scope:** deze drie componenten draaien op de parallelle `SASE_POC`-stack (mgmt01 `192.168.122.20`), nog niet in het sandbox-geheel geïntegreerd. Behavioral analyse is additief aan Suricata, geen vervanging; de observability van de sandbox zelf blijft Wazuh SIEM. Waar ze overlappen, is de sandbox de bron van waarheid.","nodeIds":["article:components/zeek.nl","article:components/rita.nl","article:components/telemetry-stack.nl","article:concepts/behavioral-analysis.nl","domain:monitoring","article:runbooks/14-zeek-rita.nl","article:runbooks/16-telemetry.nl"]},{"order":15,"title":"15. Alles samen: volg één verzoek door het systeem","description":"**Je hebt nu alle bouwstenen geleerd.** Volg een complete flow:\\n\\n1. Student opent browser → WPAD levert PAC-bestand → verkeer gaat naar Squid\\n2. Squid vraagt Identity Bridge: \\"wie is 100.70.x.x?\\" → \\"Studenten-groep\\"\\n3. URL-filter: deepai.org geblokkeerd voor studenten → **403**\\n4. Toegestane site: SSL Bump ontsleutelt HTTPS\\n5. ClamAV scant de download → malware? → event naar NATS → quarantaine\\n6. Student uploadt formulier → Python DLP vindt creditcardnummer → **geblokt**\\n7. DNS-lookup voor malware-domein → RPZ: **NXDOMAIN**\\n8. Suricata detecteert verdachte UA → alert naar Wazuh\\n\\n**Bekijk de aanvalsscenario\'s en acceptatietests om dit in actie te zien.**","nodeIds":["article:testing/acceptance-tests.nl","article:testing/attack-scenarios.nl","article:testing/demo-script.nl","domain:ztna","domain:swg","domain:casb","domain:monitoring","domain:endpoint","domain:sdwan","flow:web-request"]}]},{"id":"decisions","name":"Ontwerpkeuzes","description":"Verdedig elke architectuurbeslissing. Per pilaar: welke alternatieven zijn overwogen en waarom is hier voor gekozen?","steps":[{"order":1,"title":"1. Hoe lees je een ontwerpbeslissing","description":"**Bouwt voort op:** Tour 1 (je kent het systeem).\\n\\nEen expert vraagt niet \\"wat doet het?\\", maar **\\"waarom heb je hiervoor gekozen?\\"**. Het patroon is altijd:\\n\\n1. **Context:** welk probleem moest opgelost worden?\\n2. **Alternatieven:** wat waren de opties?\\n3. **Beslissing:** wat is gekozen en wat was de doorslaggevende factor?\\n4. **Consequenties:** wat sluit deze keuze uit?\\n\\nOefen dit patroon bij elke volgende stap. Als je het antwoord niet uit je hoofd kunt geven, lees de gelinkte beslissingspagina.","nodeIds":["article:overview/architecture.nl","domain:ztna","domain:swg","domain:casb","domain:sdwan","domain:monitoring","domain:endpoint"]},{"order":2,"title":"2. ZTNA: waarom Zitadel als broker?","description":"**Expertvraag:** \\"Waarom niet direct Entra ID koppelen aan NetBird?\\"\\n\\n**Alternatieven:**\\n- Direct Entra ID in NetBird Dashboard\\n- Zitadel als OIDC-broker met Entra ID als externe IdP\\n\\n**Beslissing:** Zitadel. De NetBird quickstart installeert Zitadel standaard. Zitadel biedt een gebruikersbeheerlaag onafhankelijk van Microsoft, en een Zitadel Action strip de `2ITCSC1A-` groepsprefix naar schone namen (`Studenten`, `Docenten`).\\n\\n**Consequentie:** extra component in de stack, maar alle downstream-systemen werken met leesbare groepsnamen.\\n\\n**Bonusvraag:** \\"Waarom een service-user PAT (Personal Access Token: een soort wachtwoord voor automatische systemen) voor Identity Bridge?\\" Omdat een bekende NetBird-bug (issue #3127) ervoor zorgt dat een reguliere-user PAT de JWT auto-groups wist bij elke API-poll.","nodeIds":["article:decisions/zitadel-idp-broker.nl","article:decisions/groupsync-pad-b.nl","article:decisions/netbird-service-pat.nl","article:components/zitadel.nl","domain:ztna","flow:user-login","step:zitadel-broker","article:findings/netbird-jwt-allow-groups-lockout.nl","article:findings/netbird-issue-3127.nl"]},{"order":3,"title":"3. SWG: waarom WPAD en niet transparante proxy?","description":"**Expertvraag:** \\"Waarom een PAC-bestand in plaats van transparant proxyen?\\"\\n\\n**Alternatieven:**\\n- Transparante proxy via `pf rdr` op de gateway\\n- Expliciete proxy via WPAD/PAC auto-discovery\\n\\n**Beslissing:** WPAD/PAC. Technisch onmogelijk anders: `pf rdr` werkt niet op WireGuard (laag-3 VPN) interfaces. Maar het is ook het SASE-standaardpatroon: Zscaler en Netskope werken identiek.\\n\\n**Consequentie:** elk apparaat moet het PAC-bestand ophalen. Dat wordt afgedwongen via Intune MDM, dus de gebruiker kan het niet uitschakelen.","nodeIds":["article:decisions/wpad-vs-transparent-proxy.nl","article:concepts/wpad-pac.nl","article:components/caddy.nl","domain:swg","flow:web-request","step:pac-discovery"]},{"order":4,"title":"4. SWG: waarom twee DLP-lagen?","description":"**Expertvraag:** \\"Waarom niet één scanner voor alles?\\"\\n\\n**Alternatieven:**\\n- Alleen ClamAV (kan geen multipart/form-data parsen)\\n- Alleen Python DLP (kan geen malware-signatures scannen)\\n- Twee lagen: ClamAV RESPMOD (downloads) + Python DLP REQMOD (uploads)\\n\\n**Beslissing:** twee lagen. ClamAV\'s `virus_scan`-module kan geen formuliervelden ontleden: het ziet het hele multipart-blok als één binary. Python DLP parseert de velden individueel en valideert met wiskundige checks (Luhn, mod-97, 11-proef).\\n\\n**Consequentie:** twee ICAP-services in de keten. Squid roept ze sequentieel aan: RESPMOD (de download-kant) plus REQMOD (de upload-kant).","nodeIds":["article:decisions/two-layer-dlp.nl","article:concepts/dlp.nl","article:components/clamav-cicap.nl","article:components/python-dlp.nl","domain:swg","flow:web-request","step:icap-clamav","step:icap-dlp"]},{"order":5,"title":"5. DNS: waarom BIND als tussenstap?","description":"**Expertvraag:** \\"Waarom drie DNS-componenten (ioc2rpz, BIND, Unbound) in plaats van twee?\\"\\n\\n**Alternatieven:**\\n- Unbound direct RPZ-zones laden via cron-jobs\\n- ioc2rpz rechtstreeks naar Unbound (TSIG vereist)\\n- BIND als TSIG-intermediair\\n\\n**Beslissing:** BIND als tussenstap. Unbound 1.24.2 ondersteunt géén TSIG voor zone-transfers (open issue sinds 2020). ioc2rpz véreist TSIG. Dus BIND ontvangt de zone via TSIG en Unbound haalt hem op via onbeveiligde transfer op localhost.\\n\\n**Waarom ioc2rpz?** Het automatiseert de hele feed-lifecycle (URLhaus, ThreatFox). Zonder ioc2rpz heb je cron-jobs nodig om feeds te downloaden, converteren en laden. ioc2rpz doet dat in één container.","nodeIds":["article:decisions/bind-tsig-intermediary.nl","article:decisions/ioc2rpz-vs-unbound-native.nl","article:components/ioc2rpz.nl","article:concepts/rpz.nl","domain:swg","flow:dns-lookup","step:rpz-check"]},{"order":6,"title":"6. IDS: waarom detectie zonder blokkering?","description":"**Expertvraag:** \\"Waarom een IDS die alleen detecteert en niet blokkeert?\\"\\n\\n**Alternatieven:**\\n- IPS via Netmap (inline blokkering)\\n- IPS via pf Divert\\n- IDS-only (PCAP-modus)\\n\\n**Beslissing:** IDS-only. Netmap werkt niet op QEMU virtio-NIC\'s in de GNS3-labomgeving. De beleidstabel is wél al geconfigureerd voor IPS: op fysieke hardware is het één configuratiewijziging.\\n\\n**Interfaces:** WAN (vtnet0) + LAN (vtnet1), niet de WireGuard-interface (wt0). Reden: BPF op wt0 vangt 0 TCP-pakketten, want WireGuard is laag 3, geen frames.\\n\\n**Diepte-in-verdediging:** als DNS-blokkering en de proxy iets missen, vangt Suricata het op draadniveau op.","nodeIds":["article:decisions/ids-vs-ips.nl","article:decisions/suricata-wan-lan.nl","article:components/suricata.nl","domain:monitoring"]},{"order":7,"title":"7. CASB: drie lagen, drie tijdhorizonten","description":"**Expertvraag:** \\"Hoe implementeer je CASB met open-source tools?\\"\\n\\n**Alternatieven:**\\n- Eén laag (kan niet alle tijdhorizonten dekken)\\n- Drie lagen met verschillende enforcement-momenten\\n\\n**De drie lagen:**\\n- **Laag 1, inline (milliseconden):** Squid URL-filtering op basis van persona + ICAP-scanning\\n- **Laag 2, API-modus (minuten):** O365 audit logs via Wazuh, remediatie achteraf\\n- **Laag 3, realtime event-driven (seconden):** NATS JetStream threat scoring + automatische quarantaine via Control Daemon\\n\\n**Waarom niet één laag?** Inline mist API-acties. API-modus is te traag voor malware. Event-driven vereist een event bus. Elke laag dekt wat de andere mist.\\n\\n**Control Daemon scope:** de IDS-correlatiebranch is verwijderd, want die dupliceerde de malware-branch met slechtere attributie. C2-detectie wordt uitgesteld naar Zeek/RITA.","nodeIds":["article:decisions/casb-three-layers.nl","article:decisions/control-daemon-scope.nl","article:components/control-daemon.nl","article:components/nats-jetstream.nl","domain:casb","flow:threat-response","step:score-calculate","step:quarantine-execute"]},{"order":8,"title":"8. SD-WAN: waarom geen IPsec-tunnels?","description":"**Expertvraag:** \\"SD-WAN zonder IPsec, is dat niet gewoon géén SD-WAN?\\"\\n\\n**Alternatieven:**\\n- Klassiek IPsec site-to-site + uCPE\\n- NetBird overlay + VyOS QoS (Zero Trust Branch)\\n\\n**Beslissing:** ZT-Branch. IPsec repliceert netwerkcentrisch vertrouwen dat SASE juist vervangt. Een IPsec-tunnel geeft impliciet subnettoegang: dat is het oude kasteelmodel. In het ZT-model authenticeert elk apparaat op de branch individueel via NetBird.\\n\\n**Wat is wél gebouwd:** VyOS met QoS-shaping (DSCP-klassen EF/AF41/AF21 voor Teams-audio, Teams-video en Teams-screen-sharing), split-tunnel egress, failover < 30s. Functie F12/F13/F14 (klassieke IPsec) zijn expliciet geschrapt.\\n\\n**Zscaler-parallel:** hun \\"Branch Connector\\" werkt identiek, met per-device tunnels en geen site-to-site.","nodeIds":["article:decisions/zt-sdwan-branch.nl","article:decisions/sdwan-descoped.nl","article:components/vyos.nl","domain:sdwan","flow:branch-access"]},{"order":9,"title":"9. Endpoint: waarom alleen managed devices?","description":"**Expertvraag:** \\"Waarom geen BYOD-ondersteuning?\\"\\n\\n**Alternatieven:**\\n- BYOD (bredere dekking, zwakkere apparaatcontrole)\\n- Managed Windows-devices via Intune (Lectormandaat R11)\\n\\n**Beslissing:** alleen managed devices. R11 schrijft dit voor. Met Intune MDM kun je:\\n- Gate 2 (apparaatcontrole) afdwingen via compliance-attestatie\\n- Proxy-configuratie + CA-certificaat + firewall + DSCP-markering pushen\\n- De gebruiker kan niets uitschakelen\\n\\n**Drie-gate model:**\\n- **Gate 1:** Entra ID Conditional Access (sign-in risico, MFA, geolocatie)\\n- **Gate 2:** Intune compliance (vervangt NetBird posture checks, want die zijn spoofbaar)\\n- **Gate 3:** SWG pipeline (URL-filter, DLP, malware)\\n\\nDe oorspronkelijke posture checks (\\"is antivirus aan?\\") zijn vervangen door Intune compliance-attestatie. Reden: een client die zijn eigen gezondheid rapporteert kan liegen.","nodeIds":["article:decisions/managed-devices-scope.nl","article:decisions/ca-posture-hybrid.nl","article:components/intune-endpoint-enforcement.nl","domain:endpoint","flow:endpoint-enrollment","article:runbooks/12-intune-endpoint.nl"]},{"order":10,"title":"10. ZTNA: waarom twee lagen Zero Trust (NetBird + Cosmos)?","description":"**Expertvraag:** \\"NetBird is toch al Zero Trust? Waarom een tweede gate erbovenop?\\"\\n\\n**Alternatieven:**\\n- Enkel NetBird (device admission): een laag om te beheren, maar geen user-level per-applicatie-gate; een gedeeld of onvergrendeld device op de overlay bereikt elke service, en er is geen MFA op de applicatie.\\n- Cosmos Constellation VPN (ingebouwd): een vendor voor netwerk + app, maar een betaalde functie in v0.22.10 die NetBird\'s overlay zou dupliceren (twee overlays).\\n- Enkel app-native auth (bv. Gitea\'s eigen 2FA): geen proxy-laag, maar inconsistent over services heen, geen centrale sessie-/MFA-gate, geen container-isolatie.\\n\\n**Beslissing:** twee orthogonale lagen. NetBird voor network admission (Gate 1, device-level) en Cosmos als application gateway voor application admission (Gate 2, user-level met MFA via TOTP). De doorslaggevende factor: network admission is device-scoped en kan geen per-applicatie gebruikersidentiteit afdwingen, terwijl een application gateway dat wel doet, met granulariteit per service. Cosmos zet de posture per service: Uptime Kuma met de MFA-gate aan (operationeel gevoelig dashboard), Gitea bewust met de MFA-gate uit (het heeft volwassen native auth, een tweede MFA zou redundant zijn).\\n\\n**Consequentie:** een extra component op dc01, plus de hostname-op-IP-beperking (grijze `AuthEnabled` op `*.dc.local`, geen cross-domain OAuth/SSO). Cosmos migreren naar `cosmos.dc.local` zou die beperking opheffen, maar is uitgesteld. De gates zijn wederzijds afhankelijk: Gate 2 kan niet bestaan zonder het netwerkpad dat Gate 1 levert, en geen van beide vervangt de andere.","nodeIds":["article:decisions/cosmos-two-layer-ztna.nl","article:components/cosmos.nl","article:concepts/application-gateway.nl","domain:ztna"]},{"order":11,"title":"11. DNS: waarom RITA-beacons als derde dynamische RPZ-feed?","description":"**Expertvraag:** \\"Je RPZ-blokkering leunt op URLhaus en ThreatFox. Wat doe je tegen een C2-domein dat nog op niemands lijst staat?\\"\\n\\n**Alternatieven:**\\n- Handmatige analist-review: menselijk oordeel op elke hit, maar traag; een beacon blijft bereikbaar tot iemand kijkt, wat het punt van geautomatiseerde detectie ondermijnt.\\n- RITA -> directe Unbound-zoneschrijf: een hop minder, maar het omzeilt de feed-merging en het serial-beheer van ioc2rpz en verliest een audit-punt voor alle feeds.\\n- RITA -> file-feed -> ioc2rpz (gekozen): hergebruikt de bestaande ioc2rpz-aggregatie, TSIG-transfer en Unbound-enforcement.\\n\\n**Beslissing:** koppel RITA als derde dynamische bron naast URLhaus en ThreatFox, via een `file:`-source die ioc2rpz al ondersteunt. Een cron job (elke 15 minuten) draait `rita view --beacon`, houdt rijen met beacon score >= 0.8, strips een whitelist van bekend-goede domeinen, en schrijft de overblijvers naar een feed-bestand dat ioc2rpz in de `threat-intel.rpz.sase` zone merget. De doorslaggevende factor: een hoge beacon score is gedragsmatig bewijs van C2, los van enige reputatielijst, en dit dicht het gat dat een statische feed laat. Filteren op score, niet op RITA\'s conservatieve severity-label, was bewust (`httpbin.org` met 333 connecties en score 0.629 kreeg slechts \\"Medium\\").\\n\\n**Consequentie:** het blokkeerpad is volledig geautomatiseerd (Zeek capteert -> RITA scoort -> cron extraheert -> ioc2rpz merget -> BIND transfereert -> Unbound enforcet). Een whitelist is verplicht en is het eerste false-positive-controlepunt: zonder zou de RPZ NetBird (100% beacon score) en Ubuntu NTP (99%) NXDOMAIN geven. RITA-scoring hangt af van het analysevenster. Dit is cross-cutting: de detectie gebeurt in monitoring (RITA), de enforcement in de SWG-DNS-keten (RPZ).","nodeIds":["article:decisions/rita-rpz-automation.nl","article:components/rita.nl","article:concepts/rpz.nl","domain:monitoring","domain:swg","article:runbooks/15-rita-rpz-integration.nl"]},{"order":12,"title":"12. Zichtbaarheid: waarom GNS3 hub i.p.v. switch?","description":"**Expertvraag:** \\"Een hub is toch geen realistisch netwerk? Waarom geen switch op het core-segment?\\"\\n\\n**Alternatieven:**\\n- GNS3 Ethernet Switch (`ubridge`): realistisch L2-gedrag, de standaardnode, maar geen SPAN of port mirror; na MAC-learning ziet een monitor-poort geen inter-node unicast meer, dus Zeek is blind voor alles behalve broadcast.\\n- Open vSwitch (OVS) VM: echte L2-switching plus native SPAN, maar een extra VM om te deployen en te onderhouden; overkill op deze schaal.\\n- GNS3 Hub: floodt elk frame naar elke poort by design, dus de monitor-poort ontvangt al het verkeer; nul config.\\n\\n**Beslissing:** vervang de core Ethernet Switch door een GNS3 Hub. De doorslaggevende factor: Zeek moet elk frame op het segment zien om behavioral analysis te doen, en `ubridge` heeft geen CLI, geen management plane en geen port-mirror-functie in de codebase. Een Hub die elk frame naar elke poort floodt is het functionele equivalent van een SPAN-poort op deze schaal, en bij het verkeersvolume van het lab is de flooding-overhead niet meetbaar.\\n\\n**Consequentie:** het core-segment is geen getrouwe L2-switch meer, wat voor een behavioral-analysis PoC juist de bedoeling is (volledige zichtbaarheid weegt zwaarder dan realistisch forwarden). Dit lost alleen het core-segment op; remote segmenten hebben een kernel mirror in een GRE-tunnel nodig, en het DC-segment loopt daar tegen een harde limiet aan (FreeBSD kan niet kernel-mirroren). Een productie-deployment zou de Hub vervangen door OVS of een ERSPAN-capable switch; de Zeek-kant verandert dan niet.","nodeIds":["article:decisions/hub-vs-switch-visibility.nl","article:components/zeek.nl","domain:monitoring"]},{"order":13,"title":"13. Observability: waarom Grafana boven een custom React UI?","description":"**Expertvraag:** \\"Waarom een kant-en-klare tool en geen eigen dashboard dat precies past?\\"\\n\\n**Alternatieven:**\\n- Custom React/Next.js UI: volledige controle over de layout en node start/stop-controls in een scherm, maar weken werk dat eindigt als een zwakkere versie van wat Grafana al biedt (log tailing, metric grafieken, alerting), met meer code, meer containers en meer onderhoud; de enige unieke feature (node start/stop) zit al in de GNS3 webinterface.\\n- Grafana: industriestandaard en gratis, met log tailing (Loki), metric grafieken (Prometheus) en alerting ingebouwd, plus dashboards-als-JSON die container rebuilds overleven en versiebeheerbaar zijn.\\n\\n**Beslissing:** Grafana, zonder eigen frontend. De doorslaggevende factor: Grafana biedt al alles wat de telemetry stack nodig heeft, en de enige feature die een custom UI zou toevoegen (GNS3 nodes starten/stoppen) heeft GNS3 al in zijn eigen webinterface. Een eigen React-app zou een zwakkere versie van Grafana opleveren plus extra onderhoudslast.\\n\\n**Consequentie:** dashboards worden als JSON geprovisioned en overleven rebuilds, maar zijn daardoor read-only in de UI; aanpassingen gaan via de bestanden plus een container restart. Node start/stop zit niet in de telemetrie-UI: operators gebruiken de GNS3 webinterface voor nodebeheer en Grafana enkel voor observability. De keuze beperkte de stack tot bewezen, onderhouden tools, wat de latere migratie van poc-1a naar mgmt01 eenvoudiger maakte: enkel forwarders en datasources moesten mee, geen zelfgeschreven applicatie.","nodeIds":["article:decisions/grafana-vs-custom-ui.nl","article:components/telemetry-stack.nl","domain:monitoring"]},{"order":14,"title":"14. Patroon: van vraag naar antwoord","description":"**Oefen dit patroon voor elke
