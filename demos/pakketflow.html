passieve capture. Zeek spreekt geen verdict uit (`components/zeek.md` §How it works in this stack).","De mirror doorloopt de verbinding tussen de remote site gateway (`site01-p`) en het managementknooppunt (`mgmt01-p`) als een GRE overlay; de mirror is additionele observatie, geen wijziging van het Site1-datapad (`findings/vyos-gre-two-step-commit.md` §What happened)."],variants:["`PS-06`: dezelfde sensor, core-segment vastgelegd via `hub1` flood in plaats van een mirror.","`PS-08`: het DC-segment probeert hetzelfde GRE-patroon maar FreeBSD/OPNsense kan niet spiegelen, waardoor het degradeert naar tunnel-actief-maar-leeg.","`PS-09`: Site1 `conn/dns/...`-logs voeden de beacon-pipeline van RITA naast core/DC."],gaps:[{category:"Gaps — not specified in the wiki",text:"**Two names for the same tunnel.** The VyOS source side names the tunnel `tun0` with `source-address`/`remote` (`findings/vyos-gre-two-step-commit.md` §Resolution; `runbooks/14-zeek-rita.md` §Step 3), while the `mgmt01-p` receiver side is `gre-site1` with `local`/`remote` (`components/zeek.md` §GRE receivers). These are the two endpoints of one tunnel, not a contradiction, but the wiki uses different interface names per end. `_conventions.md` records `site01-p` ifaces as `eth0`/`eth1` and the `mgmt01-p/Zeek` iface as `gre-site1`."},{category:"Gaps — not specified in the wiki",text:"**GRE tunnel fragmentation behaviour.** The `mtu 1476` on `tun0` is now in hop 2; what the wiki still does not state is whether full-size mirrored frames are clipped or fragmented across the GRE tunnel. (`findings/vyos-gre-two-step-commit.md` §Resolution shows the MTU value only.)"},{category:"Gaps — not specified in the wiki",text:'**VyOS tunnel parameter syntax is version-dependent.** The wiki confirms the param requirement (`source-address`/`remote`, not `local-ip`/`remote-ip`; "confirm with `set interfaces tunnel tun0 ?`", `findings/vyos-gre-two-step-commit.md` §Resolution) but does **not** pin the rolling-release string; the exact **VyOS rolling 2026.02.16** is a raw-only fact (`teamdocs/rayan_GNS3_Telemetry_Documentatie.md` §5.4 — not in wiki).'},{category:"Gaps — not specified in the wiki",text:"**Whether mirrored frames carry their original VLAN/L2 headers intact post-GRE** is not stated. (checked raw — not found)"}]},{id:"PS-08",name:"Zeek DC-segment capture (GRE actief, geen inner mirror, FreeBSD-beperking)",stack:"parallel",plane:"monitoring",outcome:"degraded",status:"poc-pending",cluster:"parallel-stack",sources:["components/zeek.md §Known issues / gotchas","findings/dc-segment-mirror-limit.md §What happened","findings/dc-segment-mirror-limit.md §Root cause","runbooks/14-zeek-rita.md §Step 4","runbooks/14-zeek-rita.md §Coverage summary"],related:["PS-07","PS-06","PS-13"],nodesInvolved:["dc01","mgmt01-p/Zeek"],hops:[{n:"1",raw:"`dc01`",from:null,to:"dc01",ifacePort:"DC-LAN 10.0.0.100 ↔ 10.0.0.1 (intra-DC)",protocol:"Ethernet",protocols:["Ethernet"],ports:[],direction:"(would-be source)",action:"Intra-DC-frames bestaan op het DC-segment, maar FreeBSD/OPNsense heeft geen commando om ze in de GRE-tunnel te kopiëren, dus er wordt niets afgetapt",state:"niet vastgelegd",wikiRef:"findings/dc-segment-mirror-limit.md §Root cause; §Resolution"},{n:"2",raw:"(OPNsense/FreeBSD DC gateway)",from:"dc01",to:"dc01",ifacePort:"gre0 tunnel 192.168.122.11 → 192.168.122.20 (ifconfig gre0 create / ifconfig gre0 tunnel 192.168.122.11 192.168.122.20 / ifconfig gre0 up)",protocol:"GRE",protocols:["GRE"],ports:[],direction:"→",action:"Tunnel-eindpunt aangemaakt en actief, maar geen mirror voedt het; het FreeBSD GRE-device verwacht GRE-geëncapsuleerde pakketten en tcpdump daarin pipen werkt niet",state:"tunnel actief, leeg",wikiRef:"runbooks/14-zeek-rita.md §Step 4 (the three ifconfig gre0 commands; full mtu 1476 verify line raw-only); findings/dc-segment-mirror-limit.md §Root cause"},{n:"3",raw:"`mgmt01-p/Zeek`",from:"dc01",to:"mgmt01-p/Zeek",ifacePort:"gre-dc, local 192.168.122.20 remote 192.168.122.11, ttl 255, promisc",protocol:"GRE",protocols:["GRE"],ports:[],direction:"←",action:"Receiver-interface actief en promiscuous; module ip_gre geladen: klaar om frames te decapsuleren die nooit aankomen",state:"decap-klaar",wikiRef:"components/zeek.md §GRE receivers; runbooks/14-zeek-rita.md §Step 5 (DC receiver)"},{n:"4",raw:"`mgmt01-p/Zeek`",from:"mgmt01-p/Zeek",to:"mgmt01-p/Zeek",ifacePort:"tunnel.log",protocol:"Zeek tunnel tracking",protocols:["Zeek tunnel tracking"],ports:[],direction:"(internal)",action:"Logt 192.168.122.20 → 192.168.122.11 Tunnel::GRE Tunnel::DISCOVER: een DISCOVER-regel bevestigt de tunnel, **niet** dat er verkeer doorheen stroomt",state:"ontdekt, geen payload",wikiRef:"findings/dc-segment-mirror-limit.md §What happened; runbooks/14-zeek-rita.md §Step 7"},{n:"5",raw:"`mgmt01-p/Zeek`",from:"mgmt01-p/Zeek",to:"mgmt01-p/Zeek",ifacePort:"worker-dc (cluster)",protocol:null,protocols:[],ports:[],direction:"(internal)",action:"Worker draait maar produceert geen DC-inner-logs; het 10.0.0.x ↔ 10.0.0.x-perspectief en de DC-bron-IPs vóór routing gaan verloren",state:"lege worker",wikiRef:"components/zeek.md §Known issues (DC inner-segment not captured); runbooks/14-zeek-rita.md §Coverage summary"}],trustBoundaries:["Geen enforcement-grens: passieve (geprobeerde) capture. De degradatie is een **zichtbaarheidsblinde plek**, geen enforcement-fout (`findings/dc-segment-mirror-limit.md` §Resolution).","De blinde plek is topologisch begrensd: het DC-segment bevat feitelijk één workload-host (`dc01` `10.0.0.100`) en de gateway (`10.0.0.1`), zodat elke extern gerichte DC-verbinding toch zichtbaar wordt bij de kern. Er is geen tweede DC-host en dus geen lateral movement die gemist wordt. Geschatte totale dekking ~90%; de ontbrekende ~10% is precies dit inner-DC-verkeer (`findings/dc-segment-mirror-limit.md` §Resolution; `runbooks/14-zeek-rita.md` §Coverage summary)."],variants:["`PS-07`: het segment dat **wel** werkt: VyOS (Linux) kernel-mirror via GRE.","`PS-06`: DC-naar-internet-verkeer wordt alsnog vastgelegd bij de kern wanneer het via het WAN gaat.","`PS-13`: het *metrics*-tegenstuk van DC-onbereikbaarheid: `dc01` node_exporter is ook DOWN (OPNsense blokkeert de scrape), een gerelateerde maar afzonderlijke DC-zichtbaarheidsblinde plek."],gaps:[{category:"Gaps — not specified in the wiki",text:"**Canonical node id for the parallel DC gateway endpoint.** Runbook 14 §Step 4 and `findings/dc-segment-mirror-limit.md` name it `OPNsense-1` at `192.168.122.11`; `_conventions.md` records the parallel OPNsense as `pop01-p` (`192.168.122.11`). The GRE source endpoint is therefore that host, but it is not in this flow's assigned node-id set — hop 2 names it descriptively and cites the `192.168.122.11` tunnel endpoint."},{category:"Gaps — not specified in the wiki",text:"**DC tunnel uses `gre0` on the OPNsense side vs `gre-dc` on mgmt01-p.** Source side (`ifconfig gre0 tunnel 192.168.122.11 192.168.122.20`, `runbooks/14-zeek-rita.md` §Step 4) and receiver side (`gre-dc`, §Step 5) — two endpoints of one tunnel, named differently per end."},{category:"Gaps — not specified in the wiki",text:"**OPNsense GRE config is not persistent** — the `ifconfig gre0 ...` lines must be re-run after reboot or added to `/etc/rc.local` (`runbooks/14-zeek-rita.md` §Step 4); the wiki does not state whether `/etc/rc.local` was actually used."},{category:"Gaps — not specified in the wiki",text:"**Whether `dc01` is the same node as sandbox `dc01` or a parallel `dc01-p`** is not disambiguated in `_conventions.md` (only `dc01` `10.0.0.100` is listed); used `dc01` verbatim per the canonical id list. Production fix (ERSPAN switch or Linux DC gateway) is noted but out of scope for this flow."}]},{id:"PS-09",name:"RITA beacon-detectie → RPZ NXDOMAIN-pipeline",stack:"parallel",plane:"monitoring",outcome:"allow",status:"poc-pending",cluster:"parallel-stack",sources:["components/rita.md §How it works in this stack","components/rita.md §The grafana.com example — detection to block","decisions/rita-rpz-automation.md §Decision","runbooks/15-rita-rpz-integration.md §What this builds","runbooks/15-rita-rpz-integration.md §Step 3","runbooks/15-rita-rpz-integration.md §Step 4"],related:["PS-06","PS-07","PS-10"],nodesInvolved:["mgmt01-p/RITA","mgmt01/ioc2rpz","pop01/BIND","pop01/Unbound"],hops:[{n:"1",raw:"`mgmt01-p/RITA`",from:null,to:"mgmt01-p/RITA",ifacePort:"reads /opt/zeek/logs/ → ClickHouse",protocol:"rita import -l /opt/zeek/logs/ --database sase_poc --rolling` (file read)",protocols:["rita import -l /opt/zeek/logs/ --database sase_poc --rolling` (file read)"],ports:[],direction:"(internal)",action:"Importeert Zeek conn/dns/ssl/http/ntp in de sase_poc-database (rolling window: first-seen-scoring + prevalentie + temporele analyse); databasenaam heeft geen koppeltekens in RITA v5",state:"geïmporteerd",wikiRef:"components/rita.md §Import model (exact rita import command + rolling model); runbooks/15-rita-rpz-integration.md §Prereqs"},{n:"2",raw:"`mgmt01-p/RITA`",from:"mgmt01-p/RITA",to:"mgmt01-p/RITA",ifacePort:"ClickHouse store (rita-clickhouse healthy)",protocol:"beacon scoring",protocols:["beacon scoring"],ports:[],direction:"(internal)",action:"Scoort elk src → dst(FQDN/SNI)-paar 0..1 op interval + payload-regelmaat; metronoomachtig = hoog. De bepalende trigger is **de ≥ 0.8-drempel halen als Critical beacon**, live gevalideerd op grafana.com (piek-score ≈ 0.998; dit getal is illustratief, niet load-bearing: het zakte lager bij de demo naarmate de stack minder vaak pollde)",state:"gescoord",wikiRef:"components/rita.md §How it works; §The grafana.com example (Critical, ≈ 0.998)"},{n:"3",raw:"`mgmt01-p/RITA`",from:"mgmt01-p/RITA",to:"mgmt01-p/RITA",ifacePort:"rita view -o sase_poc --beacon CSV",protocol:"extraction (cron 15 min)",protocols:["extraction (cron 15 min)"],ports:[],direction:"→",action:"rita_beacon_feed.sh slaat 2 bannerregels over (tail -n +3), houdt **col 5 (Beacon Score) ≥ 0.8** en niet-lege **col 4 (FQDN)** bij, past whitelist toe (PS-10), sort -u",state:"gefilterd",wikiRef:"runbooks/15-rita-rpz-integration.md §Step 1, §Step 3 (cols); decisions/rita-rpz-automation.md §Decision"},{n:"4",raw:"`mgmt01-p/RITA`",from:"mgmt01-p/RITA",to:"mgmt01-p/RITA",ifacePort:"→ /opt/ioc2rpz/cfg/rita_beacons.txt",protocol:"file write",protocols:["file write"],ports:[],direction:"→",action:"Overgebleven domeinen worden naar het feed-bestand geschreven (bijv. grafana.com); leeg bestand als niets de drempel haalt",state:"feed geschreven",wikiRef:"runbooks/15-rita-rpz-integration.md §Step 3; components/rita.md §Integration points"},{n:"5",raw:"`mgmt01/ioc2rpz`",from:"mgmt01-p/RITA",to:"mgmt01/ioc2rpz",ifacePort:"reads rita_beacons.txt (file: source rita_beacons)",protocol:"ioc2rpz source ingest",protocols:["ioc2rpz source ingest"],ports:[],direction:"←",action:"Leest het bestand als 3e bron naast urlhaus_rpz + threatfox_rpz; samenvoegen in zone threat-intel.rpz.sase, serial verhoogd; SOA-refresh verlaagd naar **300 s**",state:"samengevoegd, nieuw serial",wikiRef:"runbooks/15-rita-rpz-integration.md §Step 4; decisions/rita-rpz-automation.md §Decision"},{n:"6",raw:"`pop01/BIND`",from:"mgmt01/ioc2rpz",to:"pop01/BIND",ifacePort:"BIND 9.20 secondary on 127.0.0.1:53530; TSIG AXFR, NOTIFY target 192.168.122.11",protocol:"DNS AXFR, DNS, TSIG",protocols:["DNS AXFR","DNS","TSIG"],ports:["53530"],direction:"←",action:"BIND secondary haalt de bijgewerkte zone op via SOA-poll/NOTIFY, geauthenticeerd met TSIG-sleutel **tkey_rpz_transfer (hmac-sha256)** (sleutelwaarde geredacteerd). Parallel-stack primary = 192.168.122.20, NOTIFY/Allow Notify → 192.168.122.11",state:"zone overgedragen",wikiRef:"runbooks/15-rita-rpz-integration.md §Step 4 (NOTIFY 192.168.122.11, parallel primary .20); components/ioc2rpz.md / decisions/bind-tsig-intermediary.md (BIND 127.0.0.1:53530, tkey_rpz_transfer hmac-sha256 — documented with sandbox IPs)"},{n:"7",raw:"`pop01/Unbound`",from:"pop01/BIND",to:"pop01/Unbound",ifacePort:":53, zone /var/unbound/threat-intel.rpz.sase.zone (loopback AXFR from 127.0.0.1@53530 via respip)",protocol:"DNS",protocols:["DNS"],ports:["53"],direction:"(internal)",action:"Unbound past de RPZ toe; een query voor een gemarkeerd FQDN wordt herschreven naar NXDOMAIN met de aa-vlag",state:"RPZ geraakt",wikiRef:"runbooks/15-rita-rpz-integration.md §Step 6 (NXDOMAIN+aa); overview/architecture.md §RPZ flow (respip, loopback AXFR 127.0.0.1@53530); decisions/rita-rpz-automation.md §Decision"},{n:"8",raw:"`pop01/Unbound`",from:"pop01/Unbound",to:"pop01/Unbound",ifacePort:"→ client (e.g. NetBird-connected Windows)",protocol:"DNS",protocols:["DNS"],ports:[],direction:"←",action:"Client die grafana.com resolvet krijgt Non-existent domain; gedragsdetectie op de parallel stack werd een DNS-blokkade voor clients",state:"NXDOMAIN teruggegeven",wikiRef:"components/rita.md §The grafana.com example (Critical beacon over the ≥ 0.8 threshold); runbooks/15-rita-rpz-integration.md §Step 6"}],trustBoundaries:["**Detectie naar enforcement-overgang.** Gedragsanalyse blokkeert zelf niets; de blokkade vindt pas plaats wanneer een FQDN met hoge score in RPZ wordt gevoed en Unbound NXDOMAIN teruggeeft (`concepts/behavioral-analysis.md` §Key distinctions: detection vs enforcement). Deze flow overspant die grens: RITA detecteert, de ioc2rpz-naar-BIND-naar-Unbound-keten handhaaft.","**TSIG-geauthenticeerde zone-overdracht** is de vertrouwensgrens tussen de zonebron (`mgmt01/ioc2rpz`) en de resolvende rand (`pop01/BIND` → `pop01/Unbound`); de AXFR is beveiligd met een sleutel (`runbooks/15-rita-rpz-integration.md` §Step 4). TSIG-sleutelwaarde geredacteerd.","Het RITA-naar-RPZ-pad is de **enige** manier waarop bevindingen van de parallel-stack RITA de enforcement-keten bereiken; RITA publiceert niets naar NATS en activeert geen enkele control-daemon (`components/rita.md` §Known issues: not on the event bus)."],variants:["`PS-10`: de beveiliging bij hop 3: de whitelist die legitieme high-beacon-infrastructuur (NetBird 100%, Ubuntu NTP 99%) verwijdert voordat deze pipeline automatisch blokkeert.","`PS-06` / `PS-07` / `PS-08`: de Zeek-captures die de `conn.log` produceren die RITA scoort."],gaps:[{category:"Gaps — not specified in the wiki",text:'**Beacon score is the trigger, not severity.** Confirmed: the extraction filters on score ≥ 0.8, not RITA\'s conservative severity label (`httpbin.org`, 333 conns, scored only "Medium" at 0.629) (`decisions/rita-rpz-automation.md` §Decision). The exact ClickHouse scoring formula is not in the wiki.'},{category:"Gaps — not specified in the wiki",text:'**RITA import scheduling is manual.** Only the *extraction* script is on cron (15 min); hourly `rita import` was noted as conceptual but not wired up at report time (`runbooks/15-rita-rpz-integration.md` §Step 5, §Known open points) — so "fresh" Zeek logs may lag.'},{category:"Gaps — not specified in the wiki",text:"**Auto-propagation within 5 min unconfirmed.** SOA refresh = 300 s, but whether Unbound re-pulls without a manual `rm zone + restart` on pop01 was still being validated (`runbooks/15-rita-rpz-integration.md` §Known open points). A manual force-refresh procedure exists."},{category:"Gaps — not specified in the wiki",text:"**Parallel ioc2rpz/BIND/Unbound bind to parallel IPs.** This flow uses the canonical ids `mgmt01/ioc2rpz`, `pop01/BIND`, `pop01/Unbound` verbatim per assignment, but on the parallel stack ioc2rpz binds `192.168.122.20:53` and pop01 is `192.168.122.11` (`runbooks/15-rita-rpz-integration.md` §Scope) — the sandbox uses `.23`/`.13`. The exact ioc2rpz listener ports (`:853` DoT, `:8443/:8444` GUI) and the TSIG AXFR port on the parallel stack are not re-stated in these source pages; only `:53` and the NOTIFY target `192.168.122.11` are grounded here."},{category:"Gaps — not specified in the wiki",text:"**CDN dilution caveat.** A CDN-fronted destination splits across many src→dst pairs and can score below 0.8 (one test at 0.629 with 333 conns); `curl --resolve` to a stable IP restores a clean score (`components/rita.md` §Known issues). Not part of the validated grafana.com path but affects detection completeness."}]},{id:"PS-10",name:"RITA whitelist-beveiliging (false-positive controle vóór automatisch blokkeren)",stack:"parallel",plane:"monitoring",outcome:"allow",status:"poc-pending",cluster:"parallel-stack",sources:["components/rita.md §Validation — legitimate beacons prove the pipeline","components/rita.md §Known issues / gotchas","decisions/rita-rpz-automation.md §Consequences","runbooks/15-rita-rpz-integration.md §Step 2","concepts/behavioral-analysis.md §Key distinctions"],related:["PS-09"],nodesInvolved:["mgmt01-p/RITA","mgmt01/ioc2rpz"],hops:[{n:"1",raw:"`mgmt01-p/RITA`",from:null,to:"mgmt01-p/RITA",ifacePort:"rita view -o sase_poc --beacon",protocol:"beacon view (CSV)",protocols:["beacon view (CSV)"],ports:[],direction:"(internal)",action:"Beacon-overzicht bevat legitiem hoge scorers: pkgs.netbird.io 100%, Ubuntu NTP 185.125.190.56 99%, Google DNS 8.8.8.8 73,4%, OPNsense NTP 212.132.97.26 68,1%",state:"kandidaten",wikiRef:"components/rita.md §Validation; runbooks/14-zeek-rita.md §Step 9 (validation table)"},{n:"2",raw:"`mgmt01-p/RITA`",from:"mgmt01-p/RITA",to:"mgmt01-p/RITA",ifacePort:`rita_beacon_feed.sh: awk -F',' '$5 >= 0.8 && $4 != "" { print $4 }' → grep -ivf rita_whitelist.txt → sort -u`,protocol:"whitelist subtraction",protocols:["whitelist subtraction"],ports:[],direction:"(internal)",action:"Na selectie van col 5 (score) ≥ 0.8 en niet-lege col 4 (FQDN) verwijdert het script hoofdletteronafhankelijk (fixed-string, per regel) elke regel die overeenkomt met de whitelist (NetBird, NTP/updates, DNS-infrastructuur, OPNsense/FreeBSD, Zeek/RITA, cloud, Google DNS) vóór sort -u. Matching is op FQDN-substring terwijl RITA per src→dst-paar scoort",state:"uitgefilterd",wikiRef:"runbooks/15-rita-rpz-integration.md §Step 2, §Step 3 (exact awk/grep -ivf/sort -u pipeline)"},{n:"3",raw:"`mgmt01-p/RITA`",from:"mgmt01-p/RITA",to:"mgmt01-p/RITA",ifacePort:"→ /opt/ioc2rpz/cfg/rita_beacons.txt",protocol:"file write",protocols:["file write"],ports:[],direction:"→",action:"Alleen niet-gewhitelistede domeinen worden geschreven; gewhitelistede legitieme infrastructuur wordt dus nooit aan ioc2rpz aangeboden en blijft resolven",state:"beveiliging toegepast",wikiRef:"decisions/rita-rpz-automation.md §Consequences; runbooks/15-rita-rpz-integration.md §Step 3"},{n:"4",raw:"`mgmt01/ioc2rpz`",from:"mgmt01-p/RITA",to:"mgmt01/ioc2rpz",ifacePort:"reads rita_beacons.txt",protocol:"ioc2rpz `file:` source",protocols:["ioc2rpz `file:` source"],ports:[],direction:"←",action:"Voegt alleen de beveiligde lijst samen in threat-intel.rpz.sase; zonder de beveiliging zou het NetBird (100%) en Ubuntu NTP (99%) blokkeren, de eigen infrastructuur van de stack",state:"veilig samengevoegd",wikiRef:"decisions/rita-rpz-automation.md §Consequences (whitelist mandatory); components/rita.md §Known issues"}],trustBoundaries:['Deze flow is zelf een **veiligheidscontrole-grens**: hij bevindt zich tussen gedragsdetectie (PS-09 hops 1-2) en enforcement (PS-09 hops 5-8) en voorkomt dat het automatische blokkeerpad legitieme infrastructuur NXDOMAIN geeft (`decisions/rita-rpz-automation.md` §Consequences — "first control point for false positives").','Conceptueel handhaaft het de regel "**beaconing ≠ kwaadaardig op zichzelf**": het patroon is verdacht, niet het verdict; een analist of de whitelist beslist (`concepts/behavioral-analysis.md` §Key distinctions).'],variants:["`PS-09`: de volledige pipeline waarbinnen deze beveiliging zit; het score≥0.8-filter en het schrijven naar `rita_beacons.txt` zijn gedeelde stappen."],gaps:[{category:"Gaps — not specified in the wiki",text:"**Whitelist is by domain, scoring is by `src→dst` pair.** The whitelist matches FQDN substrings (`grep -ivf`), while RITA scores per source→destination pair; the wiki does not state how a whitelisted parent domain interacts with subdomain beacons or IP-only destinations (the validation table lists raw IPs `185.125.190.56`, `8.8.8.8`, `212.132.97.26` as beacons, but the example whitelist lists names like `ntp.ubuntu.com`, `dns.google`)."},{category:"Gaps — not specified in the wiki",text:'**The example whitelist is illustrative, not exhaustive.** `runbooks/15-rita-rpz-integration.md` §Step 2 shows a starter list (NetBird, Ubuntu/Canonical, abuse.ch/sase.local, OPNsense/FreeBSD, Zeek/RITA, github/microsoft, dns.google); the wiki says to add a domain "the moment a known-good service shows up as a beacon" — the live operational list is not pinned.'},{category:"Gaps — not specified in the wiki",text:"**No automated whitelist review.** The wiki does not describe any process for periodically re-validating or pruning the whitelist; it is a manually curated control. (checked raw — not found)"}]},{id:"PS-11",name:"Prometheus metrics-scrape (pull)",stack:"parallel",plane:"monitoring",outcome:"allow",status:"poc-pending",cluster:"parallel-stack",sources:["components/telemetry-stack.md §How it works in this stack","components/telemetry-stack.md §Integration points","runbooks/16-telemetry.md §Step 2","runbooks/16-telemetry.md §Step 7"],related:["PS-12","PS-13","PS-14"],nodesInvolved:["gns3exporter","mgmt01-p/Loki","mgmt01-p/Prometheus","nodeexporter"],hops:[{n:"1",raw:"`mgmt01-p/Prometheus`",from:null,to:"mgmt01-p/Prometheus",ifacePort:"localhost:9090",protocol:"HTTP",protocols:["HTTP"],ports:["9090"],direction:"→",action:"Self-monitoring-scrape (job prometheus). Globaal ritme scrape_interval: 15s / evaluation_interval: 15s / scrape_timeout: 10s geldt voor elk target hieronder",state:"scrape ok",wikiRef:"runbooks/16-telemetry.md §Step 2 (prometheus self); teamdocs/rayan_GNS3_Telemetry_Documentatie.md §5.5 (scrape_interval: 15s etc. — not in wiki; raw-grounded)"},{n:"2",raw:"`mgmt01-p/Prometheus` → `nodeexporter`",from:"mgmt01-p/Prometheus",to:"nodeexporter",ifacePort:"localhost:9100",protocol:"HTTP",protocols:["HTTP"],ports:["9100"],direction:"→",action:"Haalt host-metrics (CPU/RAM/schijf-I/O/netwerk) op voor mgmt01-p; node_exporter draait met --web.listen-address=0.0.0.0:9100 (geopend via ufw allow 9100/tcp), plain HTTP, geen scrape-authenticatie/TLS",state:"UP",wikiRef:"runbooks/16-telemetry.md §Step 2, §Step 6 (--web.listen-address=0.0.0.0:9100, ufw allow 9100/tcp); components/telemetry-stack.md §Integration points (node_exporter :9100)"},{n:"3",raw:"`nodeexporter`",from:"nodeexporter",to:"nodeexporter",ifacePort:":9100",protocol:"HTTP",protocols:["HTTP"],ports:["9100"],direction:"←",action:"Geeft Prometheus-expositieformaat terug; vult het VM Metrics-dashboard",state:"gescraped",wikiRef:"components/telemetry-stack.md §Dashboards (VM Metrics); runbooks/16-telemetry.md §Step 8"},{n:"4",raw:"`mgmt01-p/Prometheus` → `gns3exporter`",from:"mgmt01-p/Prometheus",to:"gns3exporter",ifacePort:"localhost:9456",protocol:"HTTP",protocols:["HTTP"],ports:["9456"],direction:"→",action:"Haalt gns3_node_status{project,node,type,status} op (1=gestart, 0=gestopt); host-network-Prometheus bereikt host-exporters via localhost",state:"UP",wikiRef:"runbooks/16-telemetry.md §Step 2, §Step 4; components/telemetry-stack.md §Integration points (gns3-exporter :9456)"},{n:"5",raw:"`gns3exporter`",from:"gns3exporter",to:"gns3exporter",ifacePort:"→ GNS3 API 192.168.122.1:3080",protocol:"HTTP",protocols:["HTTP"],ports:["3080"],direction:"→",action:"De exporter zelf pollt de GNS3 REST API om de node-status te bepalen en biedt het daarna aan op :9456",state:"upstream poll",wikiRef:"components/telemetry-stack.md §Integration points (polls 192.168.122.1:3080 every 15s); runbooks/16-telemetry.md §Step 4"},{n:"6",raw:"`mgmt01-p/Prometheus` → `mgmt01-p/Loki`",from:"mgmt01-p/Prometheus",to:"mgmt01-p/Loki",ifacePort:"172.x.0.2:3100",protocol:"HTTP",protocols:["HTTP"],ports:["3100"],direction:"→",action:"Haalt Loki's eigen metrics op (ingestie-rate etc.); **dit bridge-IP verschuift na een Loki-herstart** waardoor het target DOWN kan gaan met connection refused",state:"UP (IP-instabiel)",wikiRef:"runbooks/16-telemetry.md §Step 2 (loki target), §Step 7 (IP drift); components/telemetry-stack.md §Known issues"},{n:"7",raw:"`mgmt01-p/Prometheus`",from:"mgmt01-p/Loki",to:"mgmt01-p/Prometheus",ifacePort:"TSDB",protocol:"retention write",protocols:["retention write"],ports:[],direction:"(internal)",action:"Slaat reeksen op met --storage.tsdb.retention.time=7d --retention.size=5GB; Stack Health-dashboard toont target UP/DOWN",state:"opgeslagen",wikiRef:"runbooks/16-telemetry.md §Step 2 (retention); components/telemetry-stack.md §Dashboards (Stack Health)"}],trustBoundaries:["Geen allow/deny-enforcement-grens: alleen observability-pull. Prometheus initieert elke verbinding; targets reageren alleen (`components/telemetry-stack.md` §How it works: pull-based).","De host-vs-Docker-netwerkgrens is de operationele beperking hier: host-network-Prometheus heeft geen Docker-DNS, dus container-targets worden bereikt via het bridge-gateway/toegewezen IP, niet op naam (`runbooks/16-telemetry.md` §Step 2 gotcha; §Step 7)."],variants:["`PS-12`: de bijbehorende **push**-helft: logs komen via NATS-forwarders bij Loki (niet gescraped).","`PS-13`: het DOWN-target: `nodeexporter` op `dc01` (`10.0.0.100:9100`) is onbereikbaar (OPNsense blokkeert de scrape), zelfde scrape-mechanisme, `degraded`-resultaat.","`PS-14`: Grafana geeft deze Prometheus-reeksen weer via Caddy."],gaps:[{category:"Gaps — not specified in the wiki",text:"**Prometheus global `scrape_interval` is not in the wiki.** Now stated in hop 1 (`15s` / `evaluation_interval 15s` / `scrape_timeout 10s`) but **raw-grounded** only (`teamdocs/rayan_GNS3_Telemetry_Documentatie.md` §5.5, April `prometheus.yml` carried forward); no wiki page pins it (`runbooks/16-telemetry.md` §Step 2 sets only retention, and the 15s in `components/telemetry-stack.md` §Integration points is the GNS3 exporter's *own* upstream poll)."},{category:"Gaps — not specified in the wiki",text:"**Loki target IP is dynamic and unstable.** `runbooks/16-telemetry.md` §Step 2 shows `172.x.0.2:3100` as illustrative; the actual bridge IP changes on `mon-loki` restart and must be hand-updated in `prometheus.yml`. Durable fix (Prometheus on `monitor-net`, target by hostname) noted but not confirmed applied."},{category:"Gaps — not specified in the wiki",text:"**node_exporter / Loki `/metrics` paths and auth.** Standard `/metrics` is assumed from exposition format; the wiki does not document any scrape auth/TLS on the parallel stack (scrapes appear plain HTTP on host/bridge network)."},{category:"Gaps — not specified in the wiki",text:"**GNS3 API auth.** Whether the exporter authenticates to `192.168.122.1:3080` is not stated; credential redacted if any. (checked raw — not found)"}]},{id:"PS-12",name:"Telemetry-logs naar Loki pushen (NATS forwarders + pollers)",stack:"parallel",plane:"monitoring",outcome:"allow",status:"poc-pending",cluster:"parallel-stack",sources:["components/telemetry-stack.md §How it works in this stack","components/telemetry-stack.md §Log pipeline","components/telemetry-stack.md §Integration points","runbooks/16-telemetry.md §Step 4","runbooks/16-telemetry.md §Step 5"],related:["PS-11","PS-14"],nodesInvolved:["mgmt01-p/forwarders","mgmt01-p/Loki"],hops:[{n:"1",raw:"`mgmt01-p/forwarders`",from:null,to:"mgmt01-p/forwarders",ifacePort:"NATS JetStream logs.> (durable consumer)",protocol:"NATS",protocols:["NATS"],ports:[],direction:"←",action:"mon-nats-loki-forwarder is een durable consumer van logs.>; verwerkt OPNsense-syslog, Zeek, Caddy, NetBird-containerlogs, M365. Upstream van NATS bereikt OPNsense-syslog mgmt01 via **UDP 192.168.122.20:5514** → nats-syslog-bridge → NATS logs.pop01.{firewall|system|unbound|dhcp|clamav} (de huidige build heeft geen port-514-ontvanger: 514 is in gebruik door Wazuh)",state:"verwerkt",wikiRef:"components/telemetry-stack.md §Integration points (durable consumer logs.>); runbooks/16-telemetry.md §Step 4; teamdocs/SASE_Monitoring_Definitief_Verslag.md §9.1 (UDP :5514 ingress + nats-syslog-bridge — not in wiki; raw-grounded)"},{n:"2",raw:"`mgmt01-p/forwarders`",from:"mgmt01-p/forwarders",to:"mgmt01-p/forwarders",ifacePort:"subject → label map",protocol:"label derivation",protocols:["label derivation"],ports:[],direction:"(internal)",action:"Loki-labels afgeleid van het NATS-subject: logs.pop01.firewall → device=pop01, category=firewall; ingest-tijdstempel gebruikt time.time() (niet de brontijd) om CEST/UTC-stroomvergiftiging te vermijden",state:"gelabeld",wikiRef:"components/telemetry-stack.md §Log pipeline; runbooks/16-telemetry.md §Step 4"},{n:"3",raw:"`mgmt01-p/forwarders` → `mgmt01-p/Loki`",from:"mgmt01-p/forwarders",to:"mgmt01-p/Loki",ifacePort:":3100 (push API)",protocol:"HTTP",protocols:["HTTP"],ports:["3100"],direction:"→",action:"Pusht gelabelde streams naar Loki; container-per-bron-ontwerp zodat een kapotte feed de anderen niet blokkeert",state:"gepusht",wikiRef:"components/telemetry-stack.md §Containers, §How it works; runbooks/16-telemetry.md §Step 4"},{n:"4",raw:"`mgmt01-p/forwarders` (Wazuh)",from:"mgmt01-p/Loki",to:"mgmt01-p/forwarders",ifacePort:"← Wazuh OpenSearch localhost:9200; → Loki :3100",protocol:"HTTP",protocols:["HTTP"],ports:["9200","3100"],direction:"→",action:"mon-wazuh-loki-forwarder pollt level >= 5-alerts elke 15s → Loki category=wazuh",state:"gepollt+gepusht",wikiRef:"components/telemetry-stack.md §Integration points (Wazuh :9200, level≥5); runbooks/16-telemetry.md §Step 4"},{n:"5",raw:"`mgmt01-p/forwarders` (NetBird)",from:"mgmt01-p/forwarders",to:"mgmt01-p/forwarders",ifacePort:"← NetBird REST /api/peers,/api/events via Caddy HTTPS; → Loki :3100",protocol:"HTTPS",protocols:["HTTPS"],ports:["3100"],direction:"→",action:"mon-netbird-api-poller pollt elke 60s via Caddy (tls internal, CA ingebakken in image) → Loki category=netbird_api; containerlogs alleen zijn te summier",state:"gepollt+gepusht",wikiRef:"components/telemetry-stack.md §Log pipeline (NetBird API poller), §Integration points; runbooks/16-telemetry.md §Step 5"},{n:"6",raw:"`mgmt01-p/forwarders` (Zeek pub)",from:"mgmt01-p/forwarders",to:"mgmt01-p/forwarders",ifacePort:"tails /opt/zeek/spool/manager/*.log; → NATS logs.mgmt01.zeek.{type}",protocol:"NATS",protocols:["NATS"],ports:[],direction:"→",action:"mon-zeek-nats-publisher voedt de logs.>-boom (die hop 1 vervolgens in Loki consumeert) als zeek_conn/dns/...-categorieën",state:"gepubliceerd",wikiRef:"runbooks/16-telemetry.md §Step 4 (publishes logs.mgmt01.zeek.{type}); components/telemetry-stack.md §Containers"}],trustBoundaries:["Geen allow/deny-enforcement: alleen log-aggregatie. De telemetry-stack **leest van** Wazuh maar detecteert of handhaaft zelf niet (`components/telemetry-stack.md` §Relationship to Wazuh SIEM).","De NetBird-poller overschrijdt een TLS-grens: de NetBird-management-API bindt alleen `127.0.0.1:80`, zodat de poller hem **via Caddy over HTTPS** moet bereiken met de Caddy `tls internal`-root-CA ingebakken in het image (`runbooks/16-telemetry.md` §Step 5). Eventuele PAT/token geredacteerd."],variants:["`PS-11`: de **pull**-helft (Prometheus die metrics scraped); dit bestand is de push-helft.","`PS-14`: Grafana leest deze Loki-streams (OPNsense Log Stream / Security Logs-dashboard)."],gaps:[{category:"Gaps — not specified in the wiki",text:"**April poc-1a build is superseded.** The earlier (April) build used network devices → rsyslog → **Promtail (TCP 1514)** → Loki on host `poc-1a` (`10.158.10.67`, outside PoC scope). The current build on `mgmt01-p` (`192.168.122.20`) rides NATS instead — no Promtail, no port-514 receiver (514 is taken by Wazuh) (`components/telemetry-stack.md` §Architecture: two builds; the wiki marks the later mgmt01 verslag as current state). This flow documents only the current NATS-based build."},{category:"Gaps — not specified in the wiki",text:"**Exact Loki push API endpoint/version.** The forwarders push to `:3100`; the specific `/loki/api/v1/push` path and any tenant header are not stated in the source pages."},{category:"Gaps — not specified in the wiki",text:"**NetBird API version path quirk.** `runbooks/16-telemetry.md` §Step 5 notes v0.66.4 has **no** `/api/v1` prefix (use `/api/peers`, `/api/events`); confirm with `curl`. Not a hop detail but affects the poller path."},{category:"Gaps — not specified in the wiki",text:"**Double Zeek publication after reboot.** A teammate's `zeek-to-nats.py` cron and `mon-zeek-nats-publisher` share NATS credentials/subjects; both can run post-reboot and duplicate Zeek entries (`components/telemetry-stack.md` §Known issues; `runbooks/16-telemetry.md` §Step 4) — an operational caveat on hop 6, not a steady-state path."},{category:"Gaps — not specified in the wiki",text:"**Which forwarder carries which of the 17 categories exactly** is only partially mapped (NATS forwarder = OPNsense/Zeek/Caddy/NetBird/M365; Wazuh = `wazuh`; poller = `netbird_api`); the per-category source for e.g. `clamav`, `unbound`, `system` is implied (via `logs.>`) but not enumerated per device."},{category:"Gaps — not specified in the wiki",text:"**OPNsense syslog ingress (`5514` / `nats-syslog-bridge`) is not in the wiki.** Now stated in hop 1 (UDP `192.168.122.20:5514` → `nats-syslog-bridge` → NATS `logs.pop01.{firewall|system|unbound|dhcp|clamav}`) but **raw-grounded** only — neither the `5514` port nor `nats-syslog-bridge` appears on any wiki page, a genuine wiki gap. Source: `teamdocs/SASE_Monitoring_Definitief_Verslag.md` §9.1."}]},{id:"PS-13",name:"Prometheus-scrape van dc01 node_exporter, target DOWN (OPNsense blokkeert)",stack:"parallel",plane:"monitoring",outcome:"degraded",status:"poc-pending",cluster:"parallel-stack",sources:["components/telemetry-stack.md §Known issues / gotchas","components/telemetry-stack.md §Integration points","runbooks/16-telemetry.md §Step 6","runbooks/16-telemetry.md §Step 8"],related:["PS-11","PS-08"],nodesInvolved:["mgmt01-p/Prometheus","nodeexporter"],hops:[{n:"1", led out on the VyOS page beyond "via an Intune `/14` route".'},{category:"Gaps — not specified in the wiki",text:"**Teams media protocol/ports on the wire.** Source ports 50000-50059 and `ms-teams.exe` are grounded from the Intune QoS profile; the destination ports of the Optimize relays are not pinned by the wiki."},{category:"Gaps — not specified in the wiki",text:"**DSCP survival across NAT/eth0.** The wiki states `site01` sees the DSCP in cleartext on the split-tunnel path; it does not state whether eth0 NAT/masquerade preserves the DSCP byte end-to-end on the public internet (and notes end-to-end QoS depends on intermediate hops honouring DSCP — `decisions/zt-sdwan-branch.md`)."},{category:"Gaps — not in the wiki (raw-grounded / unmeasured)",text:"**`sitepc01` Optimize-route proof.** The route-vs-DSCP two-mechanism split is wiki-grounded (hops 2-4). The Optimize-route source on `sitepc01` is now Intune-confirmed (`2ITCSC1A-Route-Remediation` Without issues — Intune console, 2026-06-06; hop 2). The specific `Find-NetRoute 52.112.0.1 → 172.16.10.10 / NextHop 172.16.10.1` capture is raw-only. (raw: `Verslag43.md` §43.17 + §43.9.) Relates to hops 2-4."},{category:"Gaps — not in the wiki (raw-grounded / unmeasured)",text:'**DSCP survival end-to-end.** That `site01` sees DSCP in cleartext up to eth0 and the shaper classifies there is wiki-grounded (hop 3); end-to-end QoS depending on intermediate hops honouring DSCP is on `decisions/zt-sdwan-branch.md §Consequences`. The B4 "class 10 matched 300/300 EF packets after NAT" measurement is raw-only; honouring beyond eth0 is not captured. (raw: `Verslag43.md` §43.11.) Relates to hop 3.'},{category:"Gaps — not in the wiki (raw-grounded / unmeasured)",text:"**`sitepc01` Intune-CSP landing — now confirmed (out-of-band).** The earlier open verification (V44.15) is resolved: the Intune console (Arne, 2026-06-06) confirms `2ITCSC1A-SASE-QoS-Teams` **Succeeded** and `2ITCSC1A-Route-Remediation` **Without issues** on `2ITCSC1A-SI rity OK, only ceiling enforcement affected, benign for the demo) is wiki-grounded (`components/vyos.md §Configuration` build note; mapping-table note). The exact `tc` line `rate 2Mbit ceil 3Gbit` (and the expected ~6Mbit) is raw-only. (raw: `Verslag43.md` §43.15 + §43.11.) Relates to hop 2 (class 10 ceiling)."},{category:"Gaps — not in the wiki (raw-grounded / unmeasured)",text:"**`sitepc01` Intune-CSP landing — now confirmed (out-of-band).** Per the distinction note above, the earlier open verification (V44.15) is resolved: the Intune console (Arne, 2026-06-06) confirms `2ITCSC1A-SASE-QoS-Teams` **Succeeded** on `2ITCSC1A-SITE01`, so the marking source is the Intune CSP (GPO superseded). This is console evidence, not a wiki `log.md` entry; the GPO-then-Intune test sequence detail remains raw-only. (Intune console (Arne, 2026-06-06); raw: `Verslag43.md` §43.6.) Relates to hops 2-4 (DSCP input)."},{category:"Gaps — not in the wiki (raw-grounded / unmeasured)",text:'**Live-Teams TAC QoS toggle.** The synthetic-stream proof (300/300 EF packets into class 10, 0 drops) is wiki-grounded (hop 6; `components/vyos.md §Configuration` "Proven (V43)"). That a live-Teams demo additionally needs the Teams Admin Center QoS toggle (unconfirmed) — else Teams uses ephemeral ports and the `ms-teams.exe` port-match never fires — is raw-only. (raw: `Verslag43.md` §43.11 + §43.16.) Relates to hop 6.'}]},{id:"SD-04",name:"VyOS WAN health-check detecteert linkstoring en logt CRITICAL (alleen alert, geen automatische omschakeling)",stack:"sandbox",plane:"sdwan",outcome:"degraded",status:"operational",cluster:"sdwan",sources:["components/vyos.md §Configuration (WAN link monitoring)","decisions/zt-sdwan-branch.md §Evidence","decisions/zt-sdwan-branch.md §Consequences","decisions/sdwan-descoped.md §What was actually built"],related:["SD-01","SD-03"],nodesInvolved:["internet","pop01","site01"],hops:[{n:"1",raw:"`site01`",from:null,to:"site01",ifacePort:"task-scheduler → /config/scripts/wan-heal orts:[],direction:"—",action:"Bij storing logt het script per target een CRITICAL-regel (binnen 30s), formaat YYYY-MM-DD HH:MM:SS CRITICAL: <name> (<ip>) onbereikbaar (herstel … OK); **alleen lokale schrijfactie, niet doorgestuurd naar NATS/Wazuh**",state:"CRITICAL gelogd",wikiRef:"components/vyos.md §Configuration (WAN link monitoring); decisions/sdwan-descoped.md §What was actually built (Failover detection < 30s); log format + local-only — Verslag43 §43.13 + SASE_PoC_Addendum_I_ZTSDWAN_v1.1(1).md §I.10.1 (not in wiki; raw-grounded)"},{n:"7",raw:"`site01`",from:"site01",to:"site01",ifacePort:"(no action)",protocol:null,protocols:[],ports:[],direction:"—",action:"**Degraded:** detectie en alert alleen. Single-WAN lab → **geen automatische dual-WAN-omschakeling**, geen fail-closed enforcement",state:"Alleen alert; geen failover",wikiRef:"components/vyos.md §Configuration (honest single-WAN framing); decisions/zt-sdwan-branch.md §Consequences"}],trustBoundaries:["Geen: dit is een monitoring/alerting-pad, geen security allow/deny-grens. Het overschrijdt geen SWG/ICAP/RPZ-grens; een storing levert een logregel op, geen enforcement-actie (`decisions/zt-sdwan-branch.md §Consequences`: alleen detectie en alerting)."],variants:["`SD-01`: het branch-datapad waarvan de WAN-bereikbaarheid door deze health-check wordt bewaakt.","`SD-03`: de QoS-shaper op dezelfde `site01` eth0 WAN-egress."],gaps:[{category:"Gaps — not specified in the wiki",text:'**Probe count / threshold per cycle.** The wiki states a 30s interval and three ICMP targets but does not state how many failed pings (or which targets) trigger the `CRITICAL` line, or whether all three must fail. Hop 5-6 are grounded as "failure → CRITICAL within 30s" (the V43 Test #6 result) without the exact failure threshold.'},{category:"Gaps — not specified in the wiki",text:"**CRITICAL log format / fields.** The wiki names the log file (`/var/log/sdwan-health.log`) and the `CRITICAL` severity but does not give the log line form turn container, NAT traversal, or P2P-vs-relayed path. Source: `Verslag30.md §Bevinding 30.17` (container list) + `Verslag44.md §Bevinding 44.5` (P2P/relayed, control-plane vs data-plane). Relates to hop 4."},{category:"Gaps — not in the wiki (raw-grounded / unmeasured)",text:'**Two distinct CAs — Caddy Local Authority (management TLS) vs `SASE-PoC-CA` (Squid SSL Bump) (raw-grounded).** The NetBird management TLS (hop 1 → hops 2/3/5/6) is fronted by Caddy `tls internal` (Caddy Local Authority root); this is a **separate** CA from `SASE-PoC-CA` used by Squid SSL Bump on pop01. The wiki names **both** CAs separately — Caddy `tls internal` (`components/netbird.md`, `decisions/zitadel-idp-broker.md`) and `SASE-PoC-CA` for Squid SSL Bump (`overview/architecture.md §5.1`) — but never states they are two distinct CAs, so the explicit contrast is raw-only. Source: `Verslag44.md §Bevinding 44.2` ("twee aparte CA\'s") + `Doc6_NetBird_ZTNA.md §"Waarom Caddy tls internal"`. Relates to hop 1.'},{category:"Gaps — not in the wiki (raw-grounded / unmeasured)",text:'**Peer-approval gates management visibility, not the WireGuard handshake — unmeasured.** The wiki-confirmed half (new external-IdP users land "pending" and need manual admin approval — a deliberate Zitadel-quickstart security feature) is already in hop 3. The further claim that approval gates only management-plane visibility and is **not** a blocker on the WireGuard key exchange is **not in the wiki** and is not measured in the raw either (plan/design framing only — Addendum GroupSync\'s "second layer on top of Entra \'User assignment required\'"). Source: `Doc6_NetBird_ZTNA.md §"Stap 8 — User Approval Flow"` + `18_mei_SASE_PoC_Addendum_GroupSync.md §GS.3`. Relates to hop 3.'}]},{id:"ZT-02",name:"OIDC authenticatie geslaagd: Entra ID → Zitadel → NetBird, groepen gesynchroniseerd",stack:"sandbox",plane:"control",outcome:"allow",status:"operational",cluster:"ztna-identity",sources:["overview/architecture.md §5.4","componen ess-policy.md` §Step 3 "OPTIONAL — NOT DEPLOYED").'],gaps:[{category:"Gaps — not specified in the wiki",text:"**Microsoft control-plane bypass dependency (data-plane detail).** The splice dependency is in hop 3 (`*.microsoftonline.com`, `enterpriseregistration.windows.net`, `.microsoftazuread-sso.com`, `.live.com` must be no-bump/spliced or registration and the compliant-device check break — `decisions/ca-posture-hybrid.md` §Consequences; `runbooks/07` §Step 2). The exact data-plane flow of those bypassed connections is a data-plane (DP/EP) concern, not captured here."},{category:"Gaps — not specified in the wiki",text:'**8h re-evaluation cadence specifics.** `overview/architecture.md §10` says "continuous (8h cycle)" and **no CAE** (no continuous per-session revocation — `runbooks/07` §"Honest limitations"); the precise trigger/interval and how a mid-session change propagates to a live tunnel is not pinned (see raw-grounded note below).'},{category:"Gaps — not specified in the wiki",text:"**Scope: only `mobile01` verified compliant.** `sitepc01` is enrolled but **not** verified compliant (Defender disabled on its Tiny11 image — `decisions/managed-devices-scope.md` §Consequences). This flow is grounded only for `mobile01`."},{category:"Gaps — not specified in the wiki",text:"**MDM session staleness edge case.** A stale MDM session blocks evaluation and a reboot does not fix it — a fresh user sign-in is required (`runbooks/07` §Step 2 gotcha, confirmed B40.20). Effect on the tunnel flow timing is not modelled here."},{category:"Gaps — not in the wiki (raw-grounded / unmeasured)",text:'**Splice-set: missing entries + SYSTEM-DIRECT enrollment (raw-grounded).** Beyond the wiki-confirmed splice list (hop 3), the raw adds that the live no-bump list originally **missed** `device.login.microsoftonline.com` and `enterpriseregistration.windows.net` and the join succeeded only after adding them (`DeviceAuthStatus: SUCCESS`), and that **SYSTEM/WinHTTP enrollment goes DIRECT** (bypasses Squid; only the user-context PAC leg traverses Squid) — **not in the wiki**. Source: `Verslag40.md §Bevinding 40.9/40.10/40.15/40.17` + `Verslag44.md §"splice-set-uitbreiding"`. Relates to hops 3, 4.'},{category:"Gaps — not in the wiki (raw-grounded / unmeasured)",text:'**"Up to 24h for a status change" + mid-session propagation — unmeasured.** The 8h cycle and no-CAE are wiki-confirmed (above). The "up to 24h for a status change" figure and any finer trigger/interval or live-tunnel propagation timing are **not in the wiki** and not measured (plan only). Source: `18_mei_SASE_PoC_Addendum_E_CA.md §E.2.7`/§E.6 (plan). Relates to hops 1, 2.'}]},{id:"ZT-05",name:"Identity Bridge cache opbouw: poll NetBird API, overlay IP → persona mappen",stack:"sandbox",plane:"control",outcome:"allow",status:"operational",cluster:"ztna-identity",sources:["components/identity-bridge.md","concepts/identity-flow.md","decisions/netbird-service-pat.md","runbooks/09-identity-bridge.md"],related:["ZT-02","ZT-06","ZT-07"],nodesInvolved:["mgmt01/IdentityBridge","mgmt01/NetBirdMgmt"],hops:[{n:"1",raw:"`mgmt01/IdentityBridge`",from:null,to:"mgmt01/IdentityBridge",ifacePort:"→ management:80 (NETBIRD_API_URL=http://management:80/api)",protocol:"HTTP, gRPC",protocols:["HTTP","gRPC"],ports:["80"],direction:"→",action:"GET /api/peers met service-PAT auth header Authorization: Token nbp_… (waarde niet weergegeven). Timer wordt elke POLL_INTERVAL=30s geactiveerd",state:"new (Docker net)",wikiRef:'components/identity-bridge.md §"How it works"/"Integration points"; runbooks/09-identity-bridge.md §"Step 1"; Verslag31.md §Bevinding 31.5/31.1 (not in wiki; raw-grounded — literal URL, HTTP/1.1, header form)'},{n:"2",raw:"`mgmt01/IdentityBridge`",from:"mgmt01/IdentityBridge",to:"mgmt01/IdentityBridge",ifacePort:"→ management:80",protocol:"HTTP",protocols:["HTTP"],ports:["80"],direction:"→",action:"GET /api/users met service-PAT auth (resolvet gebruikers-e-mail en persona-groepen)",state:"new (Docker net)",wikiRef:'components/identity-bridge.md §"How it works"; concepts/identity-flow.md (GET /api/peers + GET /api/users)'},{n:"3",raw:"`mgmt01/NetBirdMgmt`",from:"mgmt01/IdentityBridge",to:"mgmt01/NetBirdMgmt",ifacePort:"management:80",protocol:"HTTP",protocols:["HTTP"],ports:["80"],direction:"←",action:"Geeft peers terug (ip met een /32-suffix die de bridge verwijdert, user_id, connected, groups[].name, os) en users (id, email, auto_groups[]). **auto_groups zijn groeps-IDs, geen namen**, dus de bridge leest groepsnamen uit peer.groups[]. Service user heeft geen peers/auto-groups → issue #3127 strip activeerd op lege set",state:"response",wikiRef:"decisions/netbird-service-pat.md; components/identity-bridge.md §Configuration; Verslag31.md §Bevinding 31.3 (not in wiki; raw-grounded — full payload shape, /32 strip, auto_groups-as-IDs)"},{n:"4",raw:"`mgmt01/IdentityBridge`",from:"mgmt01/NetBirdMgmt",to:"mgmt01/IdentityBridge",ifacePort:"(in-process)",protocol:"cache build",protocols:["cache build"],ports:[],direction:"—",action:"Bouwt/ververst de in-memory map op basis van het **ontdubbelde overlay IP** {ip → {user, name, groups[], os}}, volledig herbouwd bij elke geslaagde poll (**cache-replace-on-success**: een mislukte poll behoudt de oude cache → fail-open; **geen max-staleness eviction**). Eerste verversing loopt **synchroon bij opstart** via een lifespan-context. **Alleen verbonden peers worden gecached** (live /health cache_size=3); verbroken peers vallen fail-open terug op GUI-gegenereerde Squid-regels",state:"cache updated",wikiRef:'components/identity-bridge.md §"How it works"/§Configuration; concepts/identity-flow.md; 18_mei_SASE_PoC_Addendum_H_Identity_Bridge_v1.md §H.3.2 + Verslag31.md §Bevinding 31.4 (not in wiki; raw-grounded — IP-keyed impl, replace-on-success, lifespan; note wiki *recommends* peer-ID keying given overlay-IP instability)'},{n:"5",raw:"`mgmt01/IdentityBridge`",from:"mgmt01/IdentityBridge",to:"mgmt01/IdentityBridge",ifacePort:"→ mgmt01/NATS:4222",protocol:"NATS",protocols:["NATS"],ports:["4222"],direction:"→",action:"Publiceert identity.peer.connected / .peer.disconnected / .multi_persona bij een wijziging in de peerstatus (neveneffect van de poll). .multi_persona wordt geactiveerd wanneer een peer in meer dan één persona-groep zit; het is een **vlag/event, geen cache-mutatie** (de gecachede waarde bevat nog steeds de volledige groepset; Squid's cumulatieve per-persona denies handlen meerdere rollen)",state:"publish",wikiRef:'components/identity-bridge.md §"Integration points"; components/netbird.md §"NATS integration"'}],trustBoundaries:['**NetBird ACL policies (read side)**: de bridge leest de peer-groepsstatus uit het management plane waarop de ACL-boundary is gebaseerd (`overview/architecture.md §8`, "NetBird ACL policies").','**SWG identity layer (cache population)**: deze poll vult de cache die de "SWG identity layer"-boundary ondersteunt die Squid verbruikt (`overview/architecture.md §8`); de per-request enforcement is ZT-06.'],variants:["`ZT-02`: stelt de persona-groep in op de peer die deze poll vervolgens ontdekt (≤30s later).","`ZT-06`: Squid queryet de cache die deze flow opbouwt, per request.","`ZT-07`: fail-secure gedrag van het lookup-endpoint dat deze cache bedient.","**Regular-user PAT (afgewezen ontwerp)**: het gebruik van een admin-gebruikers-PAT in plaats van de service user activeert issue #3127 en verwijdert JWT auto-groups van de peers van die gebruiker bij elke poll (`decisions/netbird-service-pat.md`)."],gaps:[{category:"Gaps — not specified in the wiki",text:"**Cache eviction / max-staleness.** The live impl is now in hop 4 (IP-keyed, cache-replace-on-success, **no max-staleness eviction** — an open point). The wiki documents only the peer-ID-keying *recommendation* (`components/identity-bridge.md §Known issues`; `findings/overlay-ip-instability.md`), a known divergence from the shipped IP-keyed code — not a current-state error."},{category:"Gaps — not in the wiki (raw-grounded / unmeasured)",text:'**Service-PAT 365-day lifetime + user-role-blindness (raw-grounded).** Beyond the wiki-confirmed service-user/ admin-role/#3127 facts (hops 1–3), the raw adds the **365-day** PAT lifetime (an unrotated "time bomb") and that a `user`-role token sees **zero peers** → silent empty cache — neither is in the wiki. PAT value is a `<secret>` — not reproduced. Source: `Verslag31.md §Bevinding 31.1/31.2`. Relates to hops 1, 2, 3.'}]},{id:"ZT-06",name:"Persona lookup per request: Squid external_acl → Identity Bridge",stack:"sandbox",plane:"control",outcome:"allow",status:"operational",cluster:"ztna-identity",sources:["components/identity-bridge.md","concepts/identity-flow.md","runbooks/09-identity-bridge.md","overview/architecture.md §5.1","overview/architecture.md §8"],related:["ZT-05","ZT-07"],nodesInvolved:["mgmt01/IdentityBridge","pop01/Squid"],hops:[{n:"1",raw:"`pop01/Squid`",from:null,to:"pop01/Squid",ifacePort:"(in-process)",protocol:"external_acl_type",protocols:["external_acl_type"],ports:[],direction:"—",action:"Per request gebruikt Squid een langlevende Python stdlib-helper (/usr/local/etc/squid/identity_helper.py, stdlib urllib, geen pip op FreeBSD) via stdin/stdout; geeft het overlay IP van de client door als %SRC (Squid stuurt <IP> <group>). Directive gedefinieerd in een **pre-auth** include (pre-auth/netbird-identity.conf): external_acl_type identitybridge ttl=30 negative_ttl=10 concurrency=0 %SRC …, **niet** post-auth (de post-auth include wordt na http_access deny all geladen, waardoor post-auth-regels dood zijn). %SRC = WireGuard **overlay IP**, behouden omdat het verkeer lokaal op Squid termineert (geen SNAT) en cryptografisch wordt bevestigd door WireGuard cryptokey-routing",state:"per-request",wikiRef:'components/identity-bridge.md §"How it works"; runbooks/09-identity-bridge.md §"Step 3"; Verslag31.md §Bevinding 31.8/31.10/31.11 (not in wiki; raw-grounded — helper path/stdlib/flush, pre-auth placement, no-NAT/attestation reasoning)'},{n:"2",raw:"`pop01/Squid` (helper)",from:"pop01/Squid",to:"pop01/Squid",ifacePort:"→ 192.168.122.23:8088",protocol:"HTTP",protocols:["HTTP"],ports:["8088"],direction:"→",action:"GET /lookup?ip=<overlay_ip> met header X-Bridge-Secret: <secret>. Helper aangeroepen met twee argumenten (bridge basis-URL en pad naar secret-bestand: http://192.168.122.23:8088 /usr/local/etc/squid/identity_bridge.secret), verplichte per-regel flush",state:"new (HTTP)",wikiRef:'components/identity-bridge.md §"How it works"/§Configuration; runbooks/09-identity-bridge.md §"Step 2"/"Step 3"; Verslag31.md §Bevinding 31.10/31.11 (not in wiki; raw-grounded — helper args/flush)'},{n:"3",raw:"`mgmt01/IdentityBridge`",from:"pop01/Squid",to:"mgmt01/IdentityBridge",ifacePort:"192.168.122.23:8088",protocol:"HTTP",protocols:["HTTP"],ports:["8088"],direction:"—",action:"Valideert X-Bridge-Secret; zoekt <overlay_ip> op in cache (alleen verbonden peers)",state:"cache read",wikiRef:"components/identity-bridge.md §Configuration"},{n:"4",raw:"`mgmt01/IdentityBridge`",from:"mgmt01/IdentityBridge",to:"mgmt01/IdentityBridge",ifacePort:"→ pop01/Squid (helper)",protocol:"HTTP",protocols:["HTTP"],ports:[],direction:"←",action:"Geeft het volledige groepslidmaatschap van de peer terug (status/user/groups/os). De bridge kiest **geen** persona, dat doet Squid",state:"response",wikiRef:'components/identity-bridge.md §"How it works"'},{n:"5",raw:"`pop01/Squid` (helper)",from:"mgmt01/IdentityBridge",to:"pop01/Squid",ifacePort:"(in-process)",protocol:"external_acl result",protocols:["external_acl result"],ports:[],direction:"—",action:"Helper antwoordt met OK user=<email> als de gevraagde groep overeenkomt, anders kaal ERR (dus: **geen extra key-value paren**) (bijv. OK user=arne.vda.2itcsc1a@aplab.be); de user=-waarde verschijnt in het Squid access log op de overeenkomende regel. Resultaat gecached: ttl=30 negative_ttl=10 concurrency=0",state:"cached (30s / 10s neg)",wikiRef:'components/identity-bridge.md §"How it works"/§Configuration; Verslag31.md §Bevinding 31.10/31.13'},{n:"6",raw:"`pop01/Squid`",from:"pop01/Squid",to:"pop01/Squid",ifacePort:"(in-process)",protocol:"http_access` eval",protocols:["http_access` eval"],ports:[],direction:"—",action:"Persona-ACL wordt geactiveerd in de volgorde van http_access (V31): persona-resolutie vindt hier plaats, niet in de bridge. Vorm per-persona-ACL: acl persona_studenten external identitybridge Studenten; deny is geordend **domain-ACL eerst** (http_access deny ai_chat persona_studenten), zodat de helper **alleen op overeenkomend (AI-chat) verkeer** wordt aangeroepen, niet bij elk request (reden waarom concurrency=0 acceptabel is). Een peer met meerdere personas valt onder **alle** per-persona-denies cumulatief (unie van verboden = least-privilege). Let op: de UT1-categorie-blacklist (http_access deny remoteblacklist_UT1, circa regel 124) activeerd voor de persona-regel, waardoor een persona-*allow* op UT1-domeinen wordt gemaskeerd (differentiatie alleen zichtbaar op een niet-UT1-domein, bijv. deepai.org). Bij ERR/geen overeenkomst → fall-through naar non-identity URL filtering",state:"allow / fall-through",wikiRef:'components/identity-bridge.md §"How it works"; concepts/identity-flow.md §"Fail-open design"; runbooks/09-identity-bridge.md §"Step 5"; Verslag31.md §Bevinding 31.9/31.11 + Verslag34.md §Bevinding 34.12 (not in wiki; raw-grounded — short-circuit ordering, cumulative-deny model, ACL line form)'}],trustBoundaries:['**SWG identity layer**: Squid queryet de Identity Bridge voor de persona-groep en past identity-gebaseerd filteren per gebruiker toe (Studenten/Docenten/Admins), `pop01 Squid → mgmt01 Identity Bridge` (`overview/architecture.md §8`, "SWG identity layer").'],variants:["`ZT-05`: bouwt de cache op en ververst deze die deze lookup leest (30s poll).","`ZT-07`: het block/fail-secure geval: onbekend overlay IP of ontbrekende/onjuiste `X-Bridge-Secret`.",'Deze lookup is hop "Identity Bridge lookup" in het hoofddata-plane HTTPS-pad (`overview/architecture.md §5.1`); de omliggende SSL-bump/URL-filter/ICAP-hops zijn data-plane (DP-*) flows.'],gaps:[{category:"Gaps — not specified in the wiki",text:"**Full literal `http_access` persona ordering.** Hop 6 carries the ACL line form (`acl persona_studenten external identitybridge Studenten`) and the studenten/AI-chat deny example; `runbooks/09` defines `studenten_acl` / `docenten_acl` / `admins_acl` and notes resolution is by `http_access` order (V31), but the complete 3-line ordering/precedence is still not reproduced beyond that example."},{category:"Gaps — not in the wiki (raw-grounded / unmeasured)",text:"**Helper / secret file ownership (deploy gotcha, raw-grounded).** Helper must be `root:squid` `chmod 750` (Squid spawns helpers as the `squid` user, not root, so `root:wheel` → silent spawn failure); the secret file is `640 root:squid`. The wiki does not document helper/secret file ownership or this spawn-failure gotcha. Source: `Verslag31.md §Bevinding 31.12`. Relates to hops 1, 2."}]},{id:"ZT-07",name:"Identity Bridge fail-secure: onjuist/ontbrekend secret geweigerd; onbekend IP valt door",stack:"sandbox",plane:"control",outcome:"block",status:"operational",cluster:"ztna-identity",sources:["components/identity-bridge.md","concepts/identity-flow.md","runbooks/09-identity-bridge.md"],related:["ZT-05","ZT-06"],nodesInvolved:["mgmt01/IdentityBridge","pop01/Squid"],hops:[{n:"1",raw:"`pop01/Squid` (helper)",from:null,to:"pop01/Squid",ifacePort:"→ 192.168.122.23:8088",protocol:"HTTP",protocols:["HTTP"],ports:["8088"],direction:"→",action:"GET /lookup?ip=<overlay_ip>; header X-Bridge-Secret **ontbreekt of is onjuist** (of bridge LOOKUP_SECRET is leeg)",state:"new (HTTP)",wikiRef:'components/identity-bridge.md §Configuration; runbooks/09-identity-bridge.md §"Step 2"'},{n:"2a",raw:"`mgmt01/IdentityBridge`",from:"pop01/Squid",to:"mgmt01/IdentityBridge",ifacePort:"192.168.122.23:8088",protocol:"HTTP",protocols:["HTTP"],ports:["8088"],direction:
