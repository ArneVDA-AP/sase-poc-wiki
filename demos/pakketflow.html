y.alert.dlp`, anders `→ security.alert.malware`), zijn enkel raw (`Verslag34.md §Bevinding 34.18`), mogelijke wiki-gap."},{category:"Gaps — not in the wiki (raw-grounded / unmeasured)",text:'**Exact malware-event JSON-schema (hop 7):** de meegedragen velden zijn wiki-bevestigd (nu in hop 7), maar de exacte vorm `{timestamp, ts_epoch, client_ip, signature, url, user, producer:"c-icap"}` en het live voorbeeld `100.70.247.142` (docent1) zijn enkel raw (`Verslag35.md §Bevinding 35.3`).'},{category:"Gaps — not in the wiki (raw-grounded / unmeasured)",text:"**`security.alert.malware` subject-historiek (hop 7):** het bestaan van het subject is wiki-bevestigd (nu in hop 7), maar het historische detail (aangemaakt in V34, vervangt `Addendum J §J.2` dat geen `.malware` subject had; het V32 RESPMOD-DLP plan routeerde aanvankelijk naar `.dlp`) en de message-count op de bus zijn enkel raw (`Verslag34.md §Bevinding 34.16/34.17`)."},{category:"Gaps — not in the wiki (raw-grounded / unmeasured)",text:"**YARA `CONFIDENTIAL`-download blokpagina-grootte (hop 6):** de EICAR-pagina `8245` B is wiki-bevestigd (in hop 6), maar de YARA `CONFIDENTIAL`-download pagina gemeten op `7940` B op de curl/HTTP-laag (`Doc2 §Stap 5`, §T-A1) is enkel raw; per-detectie byte-groottes zijn verder niet opgesomd."}]},{id:"DP-07",name:"Upload (POST/PUT/PATCH), Python DLP REQMOD schoon, doorgestuurd",stack:"sandbox",plane:"data",outcome:"allow",status:"operational",cluster:"data-plane",sources:["concepts/icap.md §Where it appears in the stack","concepts/icap.md §Key distinctions","components/python-dlp.md §How it works in this stack","components/python-dlp.md §Squid integration (pre-auth include)","overview/architecture.md §6 The Four-Layer Inspection Pipeline","runbooks/04-malware-dlp.md §Step 6"],related:["DP-01","DP-08","DP-09"],nodesInvolved:["internet","mgmt01/PythonDLP","mobile01","pop01/Squid"],hops:[{n:"1",raw:"`mobile01` → `pop01/Squid`",from:"mobile01",to:"pop01/Squid",ifacePort:"wt0 → 100.70.154.7 ion; overview/architecture.md §9"}],trustBoundaries:["**De ICAP-pipeline / content-grens is NIET deze flow.** Suricata is Layer 4, parallel aan de proxy- pipeline (`overview/architecture.md` §6). Het zit zelf niet op een §8 allow/deny-grens: het observeert en alarmeert. Het packet dat het tapt heeft het Squid/SSL-bump-pad al gepasseerd (DP-01-familie).","De geobserveerde verbinding heeft upstream **WireGuard-tunnelopzet** gepasseerd (client→Squid) en verlaat via WAN; de tap van Suricata voegt detectie toe, geen enforcement (`overview/architecture.md` §8)."],variants:["`DP-14`: dezelfde engine op `vtnet1` (DC-LAN) waar het **plaintext** ziet, geen re-encrypted TLS.","`DP-15`: het negatieve pad: geen rule matcht, dus geen `eve.json`-alert en geen NATS-bericht."],gaps:[{category:"Gaps — not specified in the wiki",text:"**Welke specifieke signature afgaat is enkel een voorbeeld.** De wiki vermeldt gevalideerde SIDs (2100498, 2027863, 2008983 op vtnet0); een echte match kan elk van de 79.620+ rules zijn. Hop 4 noemt deze als voorbeelden. (Bevestigd in raw als voorbeelden: `Doc3_Suricata_IDS.md` §4 validatie-tabel somt exact deze SIDs op als de vier gevalideerde detectiecategorieën - het zijn tests, niet de enige mogelijke matches.)"},{category:"Gaps — not specified in the wiki",text:'**JA4-ondersteuning.** De componentpagina schrijft "JA3/JA4"; de wiki bevestigt niet dat JA4 is ingeschakeld in de uitgerolde ruleset/config naast de JA3 SSL Fingerprint Blacklist. Behandeld als metadata die Suricata *kan* extraheren, volgens de pagina. (Raw gecontroleerd - niet gevonden: `Doc3_Suricata_IDS.md` §3 Step 3 schakelt enkel de Abuse.ch **JA3** SSL Fingerprint Blacklist in; JA4 komt voor als capability-frase ("JA3/JA4") maar geen JA4-ruleset/config is vastgelegd.)'},{category:"Gaps — not in the wiki (raw-grounded / unmeasured)",text:"**Producer-auth + bron-IP.** De producer-auth-user `pop01-pub` staat niet in de wiki, en pop01's bron-IP `192.168.122.13` op het management-segment w verbinding (`overview/architecture.md` §8).","**Niet gepasseerd:** de ICAP-content-pipeline en de Squid identity/URL-laag; dc01-verkeer komt er nooit in (`overview/architecture.md` §10 DC-LAN inspection gap)."],variants:["`DP-10` / `DP-11`: dc01's DNS-resolutie-leg (allow / RPZ-block) op ditzelfde pad.","`DP-14`: de Suricata vtnet1-tap die deze egress observeert; als een rule matcht, alarmeert het.","Contrast met het geproxyde client-pad (DP-01-familie): mobile01-webverkeer *passeert wel* Squid + ICAP."],gaps:[{category:"Gaps — not specified in the wiki",text:'**NAT-details / SNAT-eigenaar.** §10/§8 zeggen dat dc01-egress "routed by OPNsense" is; de wiki vermeldt niet expliciet source-NAT/masquerade-instellingen of de outbound NAT-rule voor `10.0.0.0/24` op WAN. Het DC-LAN-segment en pop01 WAN zijn wiki-bevestigd (`overview/architecture.md` §3: DC-LAN `10.0.0.0/24` gw `10.0.0.1` op `vtnet1`; pop01 WAN `192.168.122.13` op `192.168.122.0/24`, GNS3 libvirt NAT), maar of de masquerade een OPNsense outbound-NAT-rule op pop01 is of de upstream libvirt-NAT is ongedocumenteerd. Hop 5 markeert NAT als het standaard OPNsense-gedrag voor een private LAN die WAN bereikt, maar de precieze rule en eigenaar zijn niet gedocumenteerd. (Raw gecontroleerd - niet gevonden: de enige genoteerde NAT/masquerade-rules zijn VyOS Site-LAN `172.16.10.0/24 → masquerade` (`SASE_PoC_Addendum_I_ZTSDWAN_v1.1(1).md`, `Verslag43.md`) en de NetBird exit-node-masquerade op de overlay (`SASE_PoC_SDWAN_Nulmeting_v1.0(4).md`). Geen bron beschrijft een OPNsense outbound source-NAT-rule voor de DC-LAN `10.0.0.0/24` op pop01\'s WAN.)'},{category:"Gaps — not specified in the wiki",text:'**dc01 DNS-server-configuratie.** §10 stelt dat dc01-DNS "goes through Unbound RPZ"; de wiki vermeldt niet of dc01 is geconfigureerd om expliciet naar `10.0.0.1` te wijzen of via DHCP. Hop 1 gebruikt de DC-LAN gateway `10.0.0.1` (gevalideerd als drill-doel in `runbooks/06-dns-threat-intel.md` §Test point 3) als het Unbound-adres. (Raw gecontroleerd - niet gevonden: `Doc4_DNS_Threat_Intelligence.md` §4 Testpunt 3 en `SASE_PoC_Testrapport.md` T-A6 roepen beide `drill @10.0.0.1 …` aan met een **expliciet** server-argument, wat valideert dat `10.0.0.1` antwoordt met RPZ-enforcement maar niet bevestigt dat dc01\'s default resolver (`/etc/resolv.conf` of DHCP) `10.0.0.1` is.)'},{category:"Gaps — not specified in the wiki",text:'**Egress firewall-policy voor dc01.** Of pf willekeurig outbound vanaf DC-LAN toelaat dan wel poorten beperkt is niet gedetailleerd; enkel "stateful firewall (baseline)" is gedocumenteerd (`overview/architecture.md` §8). (Raw gecontroleerd - niet gevonden: geen bron somt dc01\'s outbound pf-rule-set of poortbeperkingen op.)'},{category:"Gaps — not specified in the wiki",text:"**DC-LAN-isolatie vs egress.** `findings/dc-lan-isolation-route-acl.md` documenteert inbound-isolatie (NetBird route-ACL die SSH naar DC-LAN-hosts sluit) terwijl \"internet access (0.0.0.0/0 exit node) remains open\" - dat betreft overlay-peer→DC-LAN-bereikbaarheid, een andere richting dan dc01's eigen egress die hier beschreven wordt. De wiki koppelt dc01's outbound-egress niet aan die exit-node-stelling; niet gesteld. (Raw gecontroleerd - niet gevonden: bevestigd dat dit een aparte richting is; raw verbindt dc01's eigen egress niet met de exit-node-stelling.)"}]},{id:"DP-17",name:"Squid SNI/dstdomain ACL blokkeert DNS-over-HTTPS-providers op het transparent-proxy-pad",stack:"parallel",plane:"data",outcome:"block",status:"poc-pending",cluster:"data-plane",sources:["components/transparent-proxy.md §Proxy bypass mitigations","components/transparent-proxy.md §Problem statement","components/transparent-proxy.md §Chosen architecture: Option D (TPROXY on linuxpop01)","concepts/ssl-bump.md §Key distinctions"],related:["EP-03","DP-11","DP-02"],nodesInvolved:["linuxpop01/Squid","mobile01-p"],hops:[{n:"1",raw:"`mobile01-p` → `linuxpop01/Squid`",from:"mobile01-p",to:"linuxpop01/Squid",ifacePort:"wt0 (overlay 100.86.x) → TPROXY :3130",protocol:"HTTP CONNECT, WireGuard, HTTP, TCP, DoH",protocols:["HTTP CONNECT","WireGuard","HTTP","TCP","DoH"],ports:["3130"],direction:"→",action:"Een browser/stub probeert DoH (HTTPS naar een publieke resolver); TPROXY stuurt de onderschepte sessie naar de lokale Squid",state:"Nieuwe TCP-conn naar transparent listener; tunnel pending",wikiRef:"components/transparent-proxy.md §Chosen architecture (TPROXY :3130, sees original src+dst)"},{n:"2",raw:"`linuxpop01/Squid`",from:"linuxpop01/Squid",to:"linuxpop01/Squid",ifacePort:"(local)",protocol:"ssl::server_name` / `dstdomain` match against `doh_providers",protocols:["ssl::server_name` / `dstdomain` match against `doh_providers"],ports:[],direction:"—",action:"Squid evalueert de bestemmingsnaam tegen de bekende DoH-provider-lijst (SNI / dstdomain) vóór bump",state:"ACL match = DoH provider",wikiRef:'components/transparent-proxy.md §Proxy bypass mitigations (Gap 3 — "a Squid ACL blocks known resolvers on SNI"); concepts/ssl-bump.md §Key distinctions (server_name/SNI matching)'},{n:"3",raw:"`linuxpop01/Squid` → `mobile01-p`",from:"linuxpop01/Squid",to:"mobile01-p",ifacePort:"TPROXY :3130",protocol:"http_access deny doh_providers` (verdict)",protocols:["http_access deny doh_providers` (verdict)"],ports:["3130"],direction:"←",action:"De DoH CONNECT wordt **geweigerd**; er wordt geen tunnel naar de resolver geopend",state:"Geweigerd bij Squid ACL",wikiRef:"components/transparent-proxy.md §Proxy bypass mitigations (Gap 3)"},{n:"4",raw:"`mobile01-p`",from:"mobile01-p",to:"mobile01-p",ifacePort:"—",protocol:"DNS",protocols:["DNS"],ports:["53"],direction:"—",action:"Met DoH geweigerd valt DNS-resolutie terug op het plain :53-pad, geforceerd naar de gefilterde resolver (RPZ is van toepassing, zie DP-11)",state:"DoH-vector gesloten; :53-pad is bepalend",wikiRef:"components/transparent-proxy.md §Problem statement (DoH/DoT bypass Unbound RPZ); concepts/ssl-bump.md §Key distinctions"}],trustBoundaries:["**Squid ACL (transparent / linuxpop01)**: de DoH `CONNECT` wordt geweigerd op de domein/SNI-ACL van de proxy, dezelfde boundary-klasse als een URL-category deny (DP-02), hier sluit dit de DoH-bypass van de DNS-RPZ-laag. `overview/architecture.md §8` (Squid ACL); `components/transparent-proxy.md §Proxy bypass mitigations`.","**(Beschermt) Unbound RPZ**: door DoH te weigeren houdt de flow DNS op het geïnspecteerde `:53`-pad zodat RPZ van toepassing blijft (DP-11). Hier niet overschreden; behouden door de block."],variants:["`EP-03`: de endpoint-side DoT-block (TCP/853) op de sandbox; de DoH-caveat (DoH op 443 niet poort-blokkeerbaar) is precies wat deze Squid-ACL mitigeert op het parallelle pad.","`DP-11`: het DNS-RPZ-block-pad dat DoH zou bypassen en dat deze flow behoudt.","`DP-02`: verwant Squid deny-verdict (URL/persona category block) op de data-plane."],gaps:[{category:"Gaps — not specified in the wiki",text:'**De inhoud van de `block-doh.conf` ACL.** De wiki documenteert het mechanisme ("a Squid ACL blocks known resolvers on SNI", `components/transparent-proxy.md §Proxy bypass mitigations`) maar vermeldt het bestandspad of de provider-domeinen **niet**. Uit raw is de uitgerolde ACL `/usr/local/etc/squid/pre-auth/block-doh.conf` met `acl doh_providers dstdomain dns.google cloudflare-dns.com dns.quad9.net doh.opendns.com mozilla.cloudflare-dns.com` + `http_access deny doh_providers`. Bron: `teamdocs/TransProxy_Verslag01.md` §Bevinding 01.12 - _team-stack verslag-bevestigd; niet op een wiki-pagina._'},{category:"Gaps — not specified in the wiki",text:"**Het block-bewijs / log-code.** De wiki geeft de access-log-code voor een geblokkeerde DoH `CONNECT` niet. Uit raw is het `TCP_DENIED/000 CONNECT 8.8.4.4:443` (dns.google), vermeld als `DoH geblokkeerd ✅` in de validatie-tabellen. Bron: `teamdocs/TransProxy_Verslag01.md` §01.12 + `teamdocs/TransProxy_Verslag03.md` / `TransProxy_Verslag04.md` (validatie-tabel: `DoH geblokkeerd ✅ TCP_DENIED/000 voor dns.google`) - _team-stack verslag-bevestigd._"},{category:"Gaps — not specified in the wiki",text:"**Stack-binding (sandbox vs parallel).** Dit is bewezen op de `.11/.17` team/transparent-proxy-omgeving (OPNsense `.11` / linuxpop01 `.17`), die de SD-WAN-nulmeting markeert als **NIET-LIVE op de sandbox**; de sandbox dekt enkel DoT (EP-03), met DoH als expliciete open caveat. Hier gemodelleerd als `stack: parallel`, `status: poc-pending`. Bron: `SASE_PoC_SDWAN_Nulmeting_v1.0(4).md` §1.2 + `components/transparent-proxy.md` §Status / §Proxy bypass mitigations (op de sandbox enkel gedekt door de Intune firewall CSP voor QUIC/DoT, niet DoH)."},{category:"Gaps — not specified in the wiki",text:"**Exacte transparent listener voor de DoH CONNECT.** Hop 1 gebruikt de HTTPS-TPROXY-listener `:3130` per `components/transparent-proxy.md §Chosen architecture`; op de OPNsense `.11`-validatie draaide dezelfde ACL onder de explicit/intercept Squid (de team-omgeving mengde pf rdr → `:3130` en explicit `:3128`). De precieze listener die de bewezen `TCP_DENIED` serveerde is niet vastgelegd door de wiki; de deny is ACL-gedreven en listener-onafhankelijk."},{category:"Gaps — not specified in the wiki",text:"**Of DoT via hetzelfde pad mee-geblokkeerd wordt.** De team-validatie-tabellen tonen DoT (TCP/853) geblokkeerd naast DoH op deze stack (`DoT geblokkeerd ✅`), maar via een apart poort-mechanisme (deny-all / explicit rule), niet de `doh_providers` dstdomain-ACL - buiten deze flow gehouden (DoT is EP-03 op de sandbox). Bron: `teamdocs/TransProxy_Verslag04.md` (validatie-tabel) - _team-stack only._"},{category:"Gaps — not specified in the wiki",text:"**Node-ids `mobile01-p` en `linuxpop01/Squid` zijn rule-derived, niet vooraf gelijst.** De conventions-catalogus lijst `linuxpop01` als parallelle node maar somt geen `mobile01-p`-client of `linuxpop01/Squid`-proces-id op. Beide zijn afgeleid uit de gedocumenteerde naming rules (`-p`-suffix om de gedeelde `mobile01`-host te onderscheiden; `host/Process` voor het Squid-proces). Orchestrator dient deze ids te bevestigen/registreren als DP-17 wordt overgenomen."}]},{id:"EN-01",name:"Detection silo → NATS event-publish patroon",stack:"sandbox",plane:"enforcement",outcome:"allow",status:"operational",cluster:"enforcement",sources:["overview/architecture.md §9","components/nats-jetstream.md","runbooks/10-nats-jetstream.md"],related:["EN-02","EN-04","EN-06"],nodesInvolved:["mgmt01/IdentityBridge","mgmt01/NATS","mgmt01/O365producer","mgmt01/PythonDLP","pop01/producers"],hops:[{n:"1",raw:"`pop01/producers`",from:null,to:"pop01/producers",ifacePort:"pop01 192.168.122.13 → mgmt01/NATS:4222 (mgmt LAN / underlay, TCP; auth user pop01-pub)",protocol:"NATS",protocols:["NATS"],ports:["4222"],direction:"→",action:'Suricata-producer tailt eve.json en publiceert security.alert.ids (timestamp, src/dest IP+port, proto, alert.{signature_id,signature,category,severity}, flow_id, in_iface vtnet0=WAN/vtnet1=LAN, producer:"suricata")',state:"event gepubliceerd",wikiRef:"runbooks/10-nats-jetstream.md §Step 4 (Suricata producer); overview/architecture.md §9; src IP + payload schema: Verslag42.md §42.10 / Verslag34.md §34.7 / Verslag33.md §33.4 (not in wiki; raw-grounded)"},{n:"2",raw:"`pop01/producers`",from:"pop01/producers",to:"pop01/producers",ifacePort:"pop01 192.168.122.13 → mgmt01/NATS:4222 (mgmt LAN / underlay, TCP; auth user pop01-pub)",protocol:"NATS",protocols:["NATS"],ports:["4222"],direction:"→",action:'Squid-producer tailt access.log en publiceert security.alert.proxy (timestamp, ts_epoch, client_ip overlay, result_code, method, url, user UPN-or-null, producer:"squid")',state:"event gepubliceerd",wikiRef:"runbooks/10-nats-jetstream.md §Step 4 (Squid producer); components/nats-jetstream.md §Subject hierarchy; src IP + payload schema: Verslag42.md §42.10 / Verslag34.md §34.7 / Verslag33.md §33.9 (not in wiki; raw-grounded)"},{n:"3",raw:"`pop01/producers`",from:"pop01/producers",to:"pop01/producers",ifacePort:"pop01 192.168.122.13 → mgmt01/NATS:4222 (mgmt LAN / underlay, TCP; auth user pop01-pub)",protocol:"NATS",protocols:["NATS"],ports:["4222"],direction:"→",action:'c-icap/ClamAV-producer tailt het c-icap-log en publiceert security.alert.malware (timestamp, ts_epoch, client_ip overlay, signature, url, user, producer:"c-icap"); YARA.DLP*-signatures worden als veiligheidsmaatregel doorgestuurd naar security.alert.dlp',state:"event gepubliceerd",wikiRef:"runbooks/10-nats-jetstream.md §Step 4 (ClamAV producer); components/nats-jetstream.md §Subject hierarchy; src IP + payload schema: Verslag42.md §42.10 / Verslag34.md §34.7 / Verslag34.md §34.16 (not in wiki; raw-grounded)"},{n:"4",raw:"`pop01/producers`",from:"pop01/producers",to:"pop01/producers",ifacePort:"pop01 192.168.122.13 → mgmt01/NATS:4222 (mgmt LAN / underlay, TCP; auth user pop01-pub)",protocol:"NATS",protocols:["NATS"],ports:["4222"],direction:"→",action:'DNS-RPZ-producer tailt het resolver-log (/var/log/resolver/latest.log) op rpz: applied en publiceert security.alert.dns (timestamp, ts_epoch, client_ip overlay, query, action:"rpz-nxdomain", rpz_zone:"ioc2rpz-threat-intel", qtype, producer:"unbound")',state:"event gepubliceerd",wikiRef:"runbooks/10-nats-jetstream.md §Step 4 (DNS RPZ producer); src IP + payload schema: Verslag42.md §42.10 / Verslag34.md §34.7 / Verslag38.md §38.8 (not in wiki; raw-grounded)"},{n:"5",raw:"`mgmt01/PythonDLP`",from:"pop01/producers",to:"mgmt01/PythonDLP",ifacePort:":1345 (in-process) → nats://nats:4222 (Docker sase-internal; auth user mgmt01-pub)",protocol:"NATS",protocols:["NATS"],ports:["1345","4222"],direction:"→",action:'Bij een REQMOD DLP-patroonmatch publiceert de producer security.alert.dlp (timestamp, client_ip overlay uit ICAP x-client-ip, violations:[{severity, detail}] vooraf gemaskeerd bijv. "Creditcard: 4532****0366", producer:"dlp") zonder ruwe persoonsgegevens in de payload',state:"event gepubliceerd",wikiRef:"runbooks/10-nats-jetstream.md §Step 5 (Python DLP producer); components/nats-jetstream.md §Subject hierarchy; endpoint + auth user + payload schema: Verslag33.md §33.13 / Verslag33.md §33.12 (not in wiki; raw-grounded)"},{n:"6",raw:"`mgmt01/O365producer`",from:"mgmt01/PythonDLP",to:"mgmt01/O365producer",ifacePort:"→ nats://nats:4222 (Docker sase-internal; auth user casb-pub)",protocol:"NATS",protocols:["NATS"],ports:["4222"],direction:"→",action:"Pollt de O365 Management Activity API (contentType=Audit.SharePoint), normaliseert elke audit-blob en publiceert security.alert.casb (NATS role casb-pub)",state:"event gepubliceerd",wikiRef:"runbooks/11-wazuh.md §Step 5; components/nats-jetstream.md §Subject hierarchy; auth user casb-pub: Verslag39.md §39.1 (not in wiki; raw-grounded)"},{n:"7",raw:"`mgmt01/IdentityBridge`",from:"mgmt01/O365producer",to:"mgmt01/IdentityBridge",ifacePort:"→ nats://nats:4222 (Docker sase-internal)",protocol:"NATS",protocols:["NATS"],ports:["4222"],direction:"→",action:'Bij peer-connect/disconnect/multi-persona publiceert de bridge identity.peer.connected / .disconnected (timestamp, event_type, producer:"identity-bridge", ip, user UPN-or-"unknown", name, groups[], os) of identity.multi_persona (event_type, producer, ip, user, personas[])',state:"event gepubliceerd",wikiRef:"runbooks/10-nats-jetstream.md §Step 5 (Identity Bridge); components/nats-jetstream.md §Subject hierarchy; endpoint + payload schema: Verslag38.md §38.1 / Verslag33.md §33.14 (not in wiki; raw-grounded)"},{n:"8",raw:"`mgmt01/NATS`",from:"mgmt01/IdentityBridge",to:"mgmt01/NATS",ifacePort:":4222",protocol:"NATS, JetStream",protocols:["NATS","JetStream"],ports:["4222"],direction:"→",action:"Accepteert elke publish; slaat security.alert.* op in stream SECURITY_ALERTS (file, 7d, 1 GiB) en identity.> in IDENTITY_EVENTS (file, 7d, 256 MiB)",state:"opgeslagen",wikiRef:"components/nats-jetstream.md §JetStream streams"},{n:"9",raw:"`mgmt01/NATS`",from:"mgmt01/NATS",to:"mgmt01/NATS",ifacePort:":4222 → consumers",protocol:"NATS, JetStream",protocols:["NATS","JetStream"],ports:["4222"],direction:"←",action:"Levert aan twee onafhankelijke consumers: Control Daemon (EN-02) en Wazuh forwarder (EN-04). .dns en .casb gaan alleen naar de Wazuh forwarder; identity.multi_persona is alleen voor de Control Daemon (zero-trust anomaliesignaal, SIEM-regel is enkel gepland en wordt niet doorgestuurd naar Wazuh)",state:"afgeleverd",wikiRef:"components/nats-jetstream.md §Subject hierarchy; §Integration points"}],trustBoundaries:["Deze flow bevindt zich niet op een §8 allow/deny-grens; het is de eventing fan-in achter de enforcement-laag (`overview/architecture.md` §9). De detectie-events die de flow vervoert zijn gegenereerd *aan* §8-grenzen (Squid ACL, ICAP pipeline, Unbound RPZ en de Suricata Layer-4 tap).","pop01-producers steken de management LAN / underlay over (pop01-kant `192.168.122.13`) naar `nats://192.168.122.23:4222` via het management LAN `192.168.122.0/24`, NIET het `100.70.x` overlay-netwerk (`Verslag42.md §42.10` / `Verslag34.md §34.7`, not in wiki; raw-grounded). mgmt01-producers blijven op het Docker `sase-internal`-netwerk en bereiken NATS via de container-DNS-naam `nats://nats:4222` (`components/nats-jetstream.md` §Configuration, §Integration points)."],variants:["`EN-02`: de Control Daemon-consumentzijde: verrijken + scoren (inclusief welke subjects wel of niet scoren).","`EN-04`: de Wazuh forwarder-consumentzijde: NDJSON localfile → manager rules → indexer.","`EN-06`: het volledige CASB-producerpad (`security.alert.casb`) tot en met Active Response.","`DP-13` / `DP-14`: de upstream Suricata-tap die `security.alert.ids` genereert."],gaps:[{category:"Gaps — not specified in the wiki",text:"**Exact JSON schema per subject** beyond the field lists in `runbooks/10-nats-jetstream.md` §Step 4–5 is not documented in the wiki (the validated payload shapes have been folded into the per-producer hop rows 1–7 from the verslagen — see those rows for the field maps and raw citations)."},{category:"Gaps — not in the wiki (raw-grounded / unmeasured)",text:"**Daily symlink / inode log rotation handled by the producers.** The c-icap producer tails `/var/log/cicap/latest.log` (a symlink to `cicap_YYYYMMDD.log`) and the DNS-RPZ producer tails `/var/log/resolver/latest.log` (symlink to `resolver_YYYYMMDD.log`); the rotation-aware `nats_tail.tail_file` follows the daily inode change so tailing survives rotation. The wiki names the log paths but not the rotation mechanism. Source: `Verslag34.md §34.14` / `Verslag42.md §42.10` (c-icap) + `Verslag38.md §38.8` / `Verslag42.md §42.10` (resolver) — verslag-confirmed; not in wiki."},{category:"Gaps — not in the wiki (raw-grounded / unmeasured)",text:"**Per-producer NATS passwords** (`NATS_PASS` for `pop01-pub`, env for `mgmt01-pub`/`casb-pub`, in `/opt/nats-jetstream/.env` and the producer containers) are secrets and are not reproduced here. Source: `Verslag42.md §42.7` / `Verslag33.md §33.13` / `Verslag39.md §39.1` — verslag-confirmed; not in wiki."}]},{id:"EN-02",name:"Control Daemon threat scoring (verrijken → scoren → geen actie onder drempelwaarde)",stack:"sandbox",plane:"enforcement",outcome:"allow",status:"operational",cluster:"enforcement",sources:["overview/architecture.md §9","components/control-daemon.md","components/nats-jetstream.md","decisions/control-daemon-scope.md","decisions/casb-three-layers.md","runbooks/10-nats-jetstream.md"],related:["EN-01","EN-03"],nodesInvolved:["mgmt01/ControlDaemon","mgmt01/NATS","mgmt01/Redis"],hops:[{n:"1",raw:"`mgmt01/NATS`",from:null,to:"mgmt01/NATS",ifacePort:":4222 → ControlDaemon",protocol:"NATS, JetStream",protocols:["NATS","JetStream"],ports:["4222"],direction:"←",action:"Levert identity.peer.connected/.disconnected/.multi_persona via een ephemeral DeliverPolicy.ALL-consumer (herbouwt de in-memory identity map bij elke start)",state:"afgeleverd",wikiRef:"components/control-daemon.md §Integration points; components/nats-jetstream.md §Integration points"},{n:"2",raw:"`mgmt01/ControlDaemon`",from:"mgmt01/NATS",to:"mgmt01 P REQMOD, ICAP",protocols:["ICAP REQMOD","ICAP"],ports:["1345"],direction:"→",action:"Ontcijferd upload-body verstuurd voor DLP-inspectie (POST/PUT/PATCH). **Geconfigureerd, niet end-to-end gevalideerd (OP-7).**",state:"ICAP REQMOD-transactie",wikiRef:"teamdocs/TransProxy_Verslag02 §Bevinding 02.9 (ICAP ClamAV pop01:1344 RESPMOD, Python DLP mgmt01:1345 REQMOD reachable from a linuxpop01/pop01 Squid); teamdocs/TransProxy_Verslag04 §OP-7 (ICAP not yet tested)"},{n:"10",raw:"`mgmt01/PythonDLP` → `pop01-p/Squid`",from:"mgmt01/PythonDLP",to:"pop01-p/Squid",ifacePort:":1345",protocol:"ICAP",protocols:["ICAP"],ports:["1345"],direction:"←",action:"DLP-validators slagen → ongewijzigd doorgestuurd (geconfigureerd pad, OP-7)",state:"REQMOD-verdict = pass",wikiRef:"teamdocs/TransProxy_Verslag04 §OP-7"},{n:"11",raw:"`pop01-p/Squid` → `pop01/ClamAV`",from:"pop01-p/Squid",to:"pop01/ClamAV",ifacePort:"→ :1344",protocol:"ICAP RESPMOD, ICAP",protocols:["ICAP RESPMOD","ICAP"],ports:["1344"],direction:"→",action:"Ontcijferd response-body verstuurd naar c-icap voor ClamAV-scan. **Geconfigureerd, niet end-to-end gevalideerd (OP-7).** V01 zag de Via: ICAP/1.0 OPNsense_c-icap-header op HTTP, maar er werd geen EICAR-test uitgevoerd",state:"ICAP RESPMOD-transactie",wikiRef:"teamdocs/TransProxy_Verslag01 §Validatieresultaten (Via: ICAP/1.0 OPNsense_c-icap header on HTTP); teamdocs/TransProxy_Verslag04 §OP-7"},{n:"12",raw:"`pop01/ClamAV` → `pop01-p/Squid`",from:"pop01/ClamAV",to:"pop01-p/Squid",ifacePort:":1344",protocol:"ICAP",protocols:["ICAP"],ports:["1344"],direction:"←",action:"Geen malware gevonden → body ongewijzigd (geconfigureerd pad, OP-7)",state:"RESPMOD-verdict = clean",wikiRef:"teamdocs/TransProxy_Verslag04 §OP-7"},{n:"13",raw:"`internet` → `pop01-p/Squid` → `mobile01`",from:"internet",to:"mobile01",ifacePort:"origin:443 → vtnet0; re-encrypt → 127.0.0.1:3130",protocol:"HTTPS",protocols:["HTTPS"],ports:["443","3130"],direction:"←",action:"Origin stuurt de response terug; Squid versleutelt het schone body opnieuw richting de client",state:"Response gebufferd en afgeleverd",wikiRef:"teamdocs/TransProxy_Verslag04 §Bevinding 02.4 (HTTPS responses logged TCP_MISS/200)"},{n:"14",raw:"`pop01-p/Squid` → `mobile01` (return path)",from:"pop01-p/Squid",to:"mobile01",ifacePort:"192.168.122.11:3130 → 192.168.122.17 → wt0",protocol:"TCP",protocols:["TCP"],ports:["3130"],direction:"←",action:"Squid antwoordt naar 192.168.122.17. Omdat dat **het eigen IP van linuxpop01** is, wordt het antwoord **lokaal** afgeleverd op linuxpop01 (geen FORWARD-pad); linuxpop01's masquerade conntrack de-NAT't het terug in de tunnel naar de client. **Dit is het verschil met PS-02:** het bronadres blijkt lokaal te zijn, waardoor het retourpad symmetrisch is",state:"Lokale aflevering op linuxpop01 → de-NAT → tunnel; **symmetrisch**",wikiRef:"components/transparent-proxy.md §Why masquerade ON masked it; teamdocs/TransProxy_Verslag02 §Bevinding 02.8 (masquerade ON ⇒ reply to a local IP ⇒ local delivery, de-NAT back to client)"}],trustBoundaries:["**OPNsense pf (rdr) boundary:** de `pf rdr`-redirect op `vtnet0` matcht het doorgestuurde, gemaskeerde verkeer en stuurt het naar Squid. `overview/architecture.md §8` (OPNsense pf); teamdocs/TransProxy_Verslag04 §Bevinding 01.8 / §Bevinding 02.5.","**Squid ACL / SWG:** netwerktoegang toestaan/weigeren op het gebumpte request; URL-blacklist toegepast (`deny blackList`). Identiteit is **niet** per gebruiker op deze flow (enkelvoudig src `192.168.122.17`). `overview/architecture.md §8` (Squid ACL); teamdocs/TransProxy_Verslag04 §Bevinding 03.2.","**SSL-bump boundary:** TLS-ontcijfering met `SASE-PoC-CA`; interne hosts worden gespliced. `concepts/ssl-bump.md`; teamdocs/TransProxy_Verslag04 §Bevinding 02.4 / §Bevinding 04.3.","**ICAP-pipeline (geconfigureerd, niet uitgevoerd):** inhoud toestaan/weigeren per transactie (REQMOD op mgmt01, RESPMOD op pop01). Boundary is bekabeld maar **niet end-to-end gevalideerd** (OP-7). `overview/architecture.md §8` (ICAP pipeline); teamdocs/TransProxy_Verslag04 §OP-7."],variants:["`PS-02`: de **poging tot behoud van het bronadres** (masquerade OFF) op dezelfde Option-C-topologie. Dit is de diagnose die de tekortkoming van PS-01 (het verloren overlay-bronadres) *identificeerde* en aantoonde dat het bewaren van het bronadres achter een tweede stateful router het retourpad breekt (`SYN_RCVD`). PS-01 is de werkende masquerade-ON-toestand waarnaar het team is teruggekeerd; PS-02 legt uit waarom het bronadres niet behouden kan worden met deze topologie.","`DP-01`: het sandbox explicit-proxy equivalent (WPAD/PAC, `pop01/Squid` `:3128`): dezelfde bump-pipeline, ander interceptiemechanisme (door de client geconfigureerd, niet transparant) en ander knooppunt."],gaps:[{category:"Gaps — not specified in the wiki",text:"**ICAP end-to-end never validated (OP-7).** Hops 9-12 describe the *configured* ICAP pipeline. V01 saw the `Via: ICAP/1.0 OPNsense_c-icap` header on HTTP, but no EICAR malware/DLP test was run from mobile01 on this stack. `teamdocs/TransProxy_Verslag04 §OP-7` — _teamdoc-confirmed as not-tested_."},{category:"Gaps — not specified in the wiki",text:'**Parallel-stack ICAP endpoint IPs.** The verslagen name the ICAP targets as `ClamAV pop01:1344` and `Python DLP mgmt01:1345` reachable over the network, but do not pin the *parallel-stack* host IPs. Canonical ids `pop01/ClamAV` / `mgmt01/PythonDLP` reused verbatim per convention; the `-p` disambiguation for these ICAP services is unconfirmed (the source says only "bereikbaar over het netwerk"). `teamdocs/TransProxy_Verslag02 §Bevinding 02.9`.'},{category:"Gaps — not specified in the wiki",text:"**Egress detail past pop01-p.** The verslagen confirm `tracert` reaches the internet via linuxpop01 → pop01-p → upstream, but the exact pop01-p WAN egress (NAT to `192.168.122.x`) is not pinned at packet granularity for the intercepted (post-Squid) leg."},{category:"Gaps — not specified in the wiki",text:"**Client overlay address is illustrative.** `100.86.37.17` (V01) / `100.86.233.213` (the V02 diagnostics) are literal capture values, not a fixed scheme. `mobile01` (Windows 11 VM) is the only named client. `teamdocs/TransProxy_Verslag01 §Bevinding 01.9`."},{category:"Gaps — not specified in the wiki",text:'**Non-standard-port enforcement is a known gap (OP-4).** Deny-all on non-standard ports cannot be done via OPNsense floating rules without breaking the pf rdr (finding 01.11); not a hop here but it bounds what "all traffic forced through the SWG" means on this stack. `teamdocs/TransProxy_Verslag04 §Bevinding 01.11 / §OP-4`.'},{category:"Gaps — not specified in the wiki",text:"**mid-auth include is GUI-fragile.** The `include … mid-auth/*.conf` line (which carries `allow netbird_transparent`) is stripped by every OPNsense Squid GUI save and must be re-inserted via `vi`/`python3` (FreeBSD `sed` does not work). Operational, not a packet hop. `teamdocs/TransProxy_Verslag04 §Bevinding 03.3 / §Bevinding 04.4 / §OP-8`."}]},{id:"PS-02",name:"Poging tot behoud van bronadres (Option C, masquerade OFF): SYN_RCVD retourpad-asymmetrie, tekortkoming vastgesteld",stack:"parallel",plane:"data",outcome:"rejected",status:"rejected-design",cluster:"parallel-stack",sources:["components/transparent-proxy.md §Option C: routing-only gateway + pf rdr on pop01","components/transparent-proxy.md §The diagnostics: why Option C fails","components/transparent-proxy.md §Why masquerade ON masked it","testing/transparent-proxy-tests.md §T-TP1 / §T-TP2 / §T-TP3 / §T-TP4","findings/wt0-pf-rdr-limitation.md §Root cause","teamdocs/TransProxy_Verslag02 §Bevinding 02.1 / §Bevinding 02.7 / §Bevinding 02.8"],related:["PS-01"],nodesInvolved:["linuxpop01","mobile01","pop01-p","pop01-p/Squid"],hops:[{n:"1",raw:"`mobile01` → `linuxpop01`",from:"mobile01",to:"linuxpop01",ifacePort:"overlay → wt0",protocol:"TCP",protocols:["TCP"],ports:["443"],direction:"→",action:"NetBird exit node opnieuw aangemaakt als een Network Route (0.0.0.0/0, **masquerade OFF**) zodat het overlay-bronadres 100.86.233.213 behouden blijft",state:"linuxpop01 conntrack opent een NIEUW entry: verwacht het antwoord terug van **origin:80/443**",wikiRef:"components/transparent-proxy.md §Step 1: trace the source-IP loss; testing/transparent-proxy-tests.md §T-TP1"},{n:"2",raw:"`linuxpop01` → `pop01-p`",from:"linuxpop01",to:"pop01-p",ifacePort:"ens3 → vtnet0",protocol:"TCP",protocols:["TCP"],ports:[],direction:"→",action:"Puur doorsturen; geen SNAT, het overlay-IP komt intact aan op pop01 vtnet0",state:"linuxpop01 CT = doorgestuurd; pop01 ziet het originele overlay-bronadres",wikiRef:"components/transparent-proxy.md §Step 2: masquerade OFF, pf rdr matches"},{n:"3",raw:"`pop01-p`",from:"pop01-p",to:"pop01-p",ifacePort:"vtnet0, pf rdr rule",protocol:"HTTPS, HTTP",protocols:["HTTPS","HTTP"],ports:["3130"],direction:"—",action:"pf rdr **matcht** en stuurt de SYN door naar de lokale Squid listeners (536 state-aanmaken waargenomen; 10275 pakketten). Het rdr-doel is het **WAN-IP 192.168.122.11**, niet loopback, omdat een doorgestuurd pakket dat naar 127.0.0.1 wordt omgeleid de FreeBSD-fout NAT lookup failed to locate original IPs … local=127.0.0.1:3130 remote=127.0.0.1:18754 veroorzaakt; de listener is daarom naar het WAN-IP verplaatst (Squid gebouwd met --enable-pf-transparent, --with-nat-devpf)",state:"pf NAT-state aangemaakt (rdr)",wikiRef:"components/transparent-proxy.md §Step 2 (rdr rule + Packets: 10275 State Creations: 536); testing/transparent-proxy-tests.md §T-TP2; teamdocs/TransProxy_Verslag02 §Bevinding 02.5 / §Bevinding 02.9 (FreeBSD rdr to 127.0.0.1 failure forcing the WAN-IP target; not in wiki at packet level; raw-grounded)"},{n:"4",raw:"`pop01-p` → `pop01-p/Squid`",from:"pop01-p",to:"pop01-p/Squid",ifacePort:"192.168.122.11:3129 (HTTP) **and** 192.168.122.11:3130 (HTTPS)",protocol:"TCP",protocols:["TCP"],ports:["3129","3130"],direction:"→",action:"Squid ontvangt de SYN; de kernel stuurt een SYN-ACK. De diagnostische netstat -an toont **beide** poorten tegelijk half-open: tcp4 192.168.122.11.3129 100.86.233.213.57989 SYN_RCVD (HTTP) **en** tcp4 192.168.122.11.3130 100.86.233.213.57985 SYN_RCVD (HTTPS); de capture testte HTTP (:3129) en HTTPS (:3130) tegelijk; het oorzakelijke model is voor beide identiek",state:"192.168.122.11:3129 **en** :3130 → SYN_RCVD",wikiRef:"components/transparent-proxy.md §Step 3: Squid receives the SYN, but the client gets nothing back; teamdocs/TransProxy_Verslag02 §Bevinding 02.7 / §Bevinding 02.4 (both ports SYN_RCVD simultaneously; not in wiki; raw-grounded)"},{n:"5",raw:"`pop01-p/Squid` → (return)",from:"pop01-p/Squid",to:"pop01-p/Squid",ifacePort:"src 192.168.122.11:3129 → dst 100.86.233.213",protocol:"TCP",protocols:["TCP"],ports:["3129"],direction:"←",action:"**pf voert geen reverse-vertaling uit** op de SYN-ACK omdat de verbinding **lokaal is afgesloten** door Squid (geen doorgestuurde/rdr-flow op de terugweg); het pakket vertrekt met src = 192.168.122.11:3129, **onvertaald**, en wordt via de statische route 100.64.0.0/10 → 192.168.122.17 naar linuxpop01 gerouteerd",state:"SYN-ACK onvertaald; via de statische route naar linuxpop01 gerouteerd",wikiRef:"components/transparent-proxy.md §Step 4: the causal model (lines 1-4); teamdocs/TransProxy_Verslag02 §Bevinding 02.7 (two simultaneous tcpdumps confirm the untranslated SYN-ACK)"},{n:"6",raw:"`pop01-p` → `linuxpop01`",from:"pop01-p",to:"linuxpop01",ifacePort:"vtnet0 → ens3",protocol:"TCP",protocols:["TCP"],ports:["3129"],direction:"←",action:"Twee gelijktijdige tcpdumps bevestigden: de SYN-ACK **komt onvertaald aan op ens3** (src 192.168.122.11)",state:"Aankomst op ens3; staat op het punt linuxpop01 conntrack te bereiken",wikiRef:"components/transparent-proxy.md §Step 3 (two tcpdumps: arrives on ens3, never on wt0); testing/transparent-proxy-tests.md §T-TP3"},{n:"7",raw:"`linuxpop01`",from:"linuxpop01",to:"linuxpop01",ifacePort:"conntrack lookup on ens3 ingress",protocol:"netfilter conntrack match",protocols:["netfilter conntrack match"],ports:[],direction:"—",action:"CT-entry van hop 1 verwacht een antwoord **van origin:80**, maar het pakket is **van 192.168.122.11:3129** → geen overeenkomst → gemarkeerd als **INVALID**",state:"conntrack-state = **INVALID**",wikiRef:'components/transparent-proxy.md §Step 4 (causal model: "conntrack expects a reply from origin:80, gets 192.168.122.11:3129 → INVALID")'},{n:"8",raw:"`linuxpop01`",from:"linuxpop01",to:"linuxpop01",ifacePort:"FORWARD chain",protocol:"FORWARD RELATED,ESTABLISHED` accept rule",protocols:["FORWARD RELATED,ESTABLISHED` accept rule"],ports:[],direction:"—",action:"De FORWARD-regels zijn iptables -A FORWARD -i wt0 -o ens3 -j ACCEPT en iptables -A FORWARD -i ens3 -o wt0 -m state --state RELATED,ESTABLISHED -j ACCEPT (persistent opgeslagen via netfilter-persistent save); de INVALID SYN-ACK matcht **geen van beide** → **DROP**; de SYN-ACK **verschijnt nooit op wt0**",state:"Pakket **GEDROPT**; niets doorgestuurd naar de client",wikiRef:'components/transparent-proxy.md §Step 4 (causal model: "INVALID → FORWARD RELATED,ESTABLISHED → DROP"); §Step 3 (never appears on wt0); teamdocs/TransProxy_Verslag04 §Bevinding 01.6 (exact FORWARD rule text; not in wiki; raw-grounded — ordering vs any libvirt REJECT unspecified)'},{n:"9",raw:"`mobile01`",from:"linuxpop01",to:"mobile01",ifacePort:"(client)",protocol:null,protocols:[],ports:[],direction:"←",action:"Client ontvangt de SYN-ACK nooit; de half-geopende verbinding blijft onbeantwoord",state:"**SYN_RCVD hang op pop01 → time-out aan clientzijde**",wikiRef:'components/transparent-proxy.md §Step 4 ("Client gets nothing → SYN_RCVD hang → timeout"); testing/transparent-proxy-tests.md §T-TP3'}],trustBoundaries:["**Squid ACL / SWG (bedoeld):** de omgeleide verbinding was bedoeld om de Squid ACL + bump-pipeline te raken, maar de TCP-handshake wordt nooit voltooid, waardoor er feitelijk geen inspectie-boundary wordt gepasseerd. `overview/architecture.md §8` (Squid ACL, bedoeld maar niet bereikt).","**OPNsense pf (rdr) boundary:** de `pf rdr`-redirect op vtnet0 *matcht* wel (hop 3), maar het asymmetrische retourpad maakt het ongedaan. `overview/architecture.md §8` (OPNsense pf).","**netfilter conntrack op linuxpop01:** de *de facto* boundary die de flow afbreekt: de tweede stateful router dropt de onvertaalde SYN-ACK als INVALID. `components/transparent-proxy.md §Step 4`."],variants:["`PS-01`: de **werkende Option-C-flow** waarbij deze diagnose hoort (masquerade ON, getest tot 3 juni 2026). PS-02 is de masquerade-**OFF**-variant van dezelfde topologie: het experiment dat de gedocumenteerde tekortkoming van PS-01 (het verloren overlay-bronadres) identificeerde en aantoonde dat het bewaren van het bronadres het retourpad breekt. Na deze diagnose is het team naar PS-01 teruggekeerd.",'**Kandidaatoplossing (analyse, geen flow):** TPROXY op linuxpop01 ("Option D") zou het pakket naar een lokale socket sturen **vóór** de routeringsbeslissing, zodat interceptie en afhandeling op hetzelfde knooppunt plaatsvinden en het retourpad symmetrisch is, de eigenschap die deze masquerade-OFF-poging mist. Het is uitgewerkt maar **niet geïmplementeerd**; zie `PS-01 §Proposed solution (analyzed, not implemented)`. Er is bewust geen apart dataflow/hop-table voor.',"Gerelateerde doodlopende wegen gedocumenteerd op de componentpagina maar **niet** als aparte flows vastgelegd: *Option A* (TPROXY + cache_peer dubbele Squid, incompatibel met SSL Bump), *mgmt01 als exit node* (vermenging van control/data-plane), *NetBird route zonder exit node* (zelfde retourpad-probleem als deze masquerade-OFF-poging)."],gaps:[{category:"Gaps — not specified in the wiki",text:"**Exact iptables FORWARD rule ordering vs the libvirt REJECT.** The full FORWARD rule text is now in hop 8 (raw-grounded from V04 §Bevinding 01.6); what the verslagen still do **not** detail is its ordering relative to the libvirt-injected `REJECT` (see `findings/iptables-forward-ordering.md`) for this flow."},{category:"Gaps — not specified in the wiki",text:"**Client port / overlay address are illustrative.** `100.86.233.213:57989`/`:57985` (and `:3129` / `:3130`) are the literal values from the diagnostic capture in the page, not a generalised addressing scheme. `teamdocs/TransProxy_Verslag02 §Bevinding 02.7`."},{category:"Gaps — not specified in the wiki",text:"**`pf` floating-rule / `quick` interaction (finding 01.11).** The page mentions a floating-rule `quick` interaction that broke the rdr on OPNsense and that iptables avoids; the wiki does not give the rule-evaluation detail at packet granularity, so it is not expanded as a hop."},{category:"Gaps — not in the wiki (raw-grounded / unmeasured)",text:'**Extra OPNsense pf prerequisites the wiki omits (preconditions, not hops).** Before the rdr could even match on the masquerade-OFF path, two pf items were needed: (a) a Hybrid outbound-NAT "Do not NAT" rule for `100.64.0.0/10` (pop01\'s own `wt0 = 100.86.28.110/16` overlaps the client `100.86.233.213/16`, and the auto outbound-NAT rule `from (wt0:network)` was claiming client traffic); (b) a floating pass rule for overlay→self on `:3129-3130` (the auto pass rule covered only the local `192.168.122.0/24` subnet, not the overlay range). These are setup preconditions, not packet hops in the captured connection. Source: `teamdocs/TransProxy_Verslag02 §Bevinding 02.3 / §Bevinding 02.6` (not in wiki; raw-grounded).'}]},{id:"PS-03",name:"Cosmos applicatietoegang, login + MFA (TOTP), Uptime Kuma bereikt",stack:"parallel",plane:"control",outcome:"allow",status:"poc-pending",cluster:"parallel-stack",sources:["components/cosmos.md §How it works in this stack","components/cosmos.md §Uptime Kuma behind the gate","components/cosmos.md §Integration points","components/cosmos.md §Configuration","concepts/application-gateway.md §How it applies here","decisions/cosmos-two-layer-ztna.md §Decision","runbooks/13-cosmos.md §Step 4: DNS configuration","runbooks/13-cosmos.md §Step 5: NetBird DNS integration","runbooks/13-cosmos.md §Step 8: MFA enrolment verification (demo gate)"],related:["PS-04","PS-05"],nodesInvolved:["10.0.0.1","cosmos","cosmos/kuma","mobile01"],hops:[{n:"1",raw:"`mobile01` → `10.0.0.1`",from:"mobile01",to:"10.0.0.1",ifacePort:"overlay → :53 (Unbound)",protocol:"DNS",protocols:["DNS"],ports:["53"],direction:"→",action:"NetBird nameserver-regel (10.0.0.1, match domein dc.local, groepen All) stuurt de query naar Unbound; een OPNsense wt0 firewall-regel staat poort 53 toe vanuit de overlay",state:"Statusloze DNS-lookup",wikiRef:"runbooks/13-cosmos.md §Step 5 (NetBird nameserver rule + wt0 firewall rule for 53); components/cosmos.md §Integration points (NetBird DNS)"},{n:"2",raw:"`10.0.0.1` → `mobile01`",from:"10.0.0.1",to:"mobile01",ifacePort:":53 → overlay",protocol:"DNS",protocols:["DNS"],ports:["53"],direction:"←",action:"Unbound host override kuma.dc.local → 10.0.0.100 beantwoordt de query",state:"Lookup voltooid",wikiRef:"runbooks/13-cosmos.md §Step 4 (Unbound host overrides table); components/cosmos.md §Integration points (Unbound host overrides)"},{n:"3",raw:"`mobile01` → `cosmos`",from:"mobile01",to:"cosmos",ifacePort:"overlay → 10.0.0.100:443",protocol:"TLS, TCP",protocols:["TLS","TCP"],ports:["443"],direction:"→",action:"Verbinding bereikt de Cosmos reverse proxy op :443 (HTTPS Mode SELFSIGNED); bereikbaar **alleen** omdat de client op de NetBird overlay zit (Gate 1 al gepasseerd)",state:"Nieuwe TLS-sessie naar de gateway",wikiRef:"components/cosmos.md §How it works in this stack; §Configuration (HTTPS Mode SELFSIGNED); runbooks/13-cosmos.md §Step 7 (Cosmos self-signed cosmos-ca.crt); concepts/application-gateway.md §How it applies here"},{n:"4",raw:"`cosmos`",from:"cosmos",to:"cosmos",ifacePort:":443, route kuma.dc.local",protocol:"SmartShield evaluation",protocols:["SmartShield evaluation"],ports:["443"],direction:"—",action:"Per-route SmartShield: rate-limit (ThrottlePerMinute 12000 voor Kuma), BlockCommonBots, IP-throttle. Gezien bronadres = NetBird **overlay**-adres (niet internet)",state:"Request toegelaten door de rate-limiter; passeert",wikiRef:"components/cosmos.md §How it works (SmartShield, 12,000 req/min); §Configuration (route security JSON: ThrottlePerMinute 12000, BlockCommonBots)"},{n:"5",raw:"`cosmos` → `mobile01`",from:"cosmos",to:"mobile01",ifacePort:":443",protocol:"HTTP",protocols:["HTTP"],ports:["443"],direction:"←",action:"Beveiligde route (AuthEnabled: true) onderschept het request en toont eerst de Cosmos-login",state:"Wacht op inloggegevens",wikiRef:'components/cosmos.md §Uptime Kuma behind the gate (demo flow: "Cosmos login (not Kuma)"); runbooks/13-cosmos.md §Step 8'},{n:"6",raw:"`mobile01` → `cosmos`",from:"mobile01",to:"cosmos",ifacePort:":443",protocol:"HTTPS",protocols:["HTTPS"],ports:["443"],direction:"→",action:"Gebruiker stuurt de Cosmos-inloggegevens in; waarde geredigeerd",state:"Inloggegevens geverifieerd",wikiRef:"runbooks/13-cosmos.md §Step 8 (admin / <admin-password>); components/cosmos.md §How it works (identity gate)"},{n:"7",raw:"`cosmos` → `mobile01`",from:"cosmos",to:"mobile01",ifacePort:":443",protocol:"HTTP",protocols:["HTTP"],ports:["443"],direction:"←",action:'"Force Multi-Factor Authentication" staat ON (globaal); Cosmos toont de TOTP-uitdaging vóór elke backend-toegang',state:"Sessie wacht op MFA",wikiRef:"components/cosmos.md §Configuration (Force MFA On, global); §How it works (MFA via TOTP)"},{n:"8",raw:"`mobile01` → `cosmos`",from:"mobile01",to:"cosmos",ifacePort:":443",protocol:"HTTPS",protocols:["HTTPS"],ports:["443"],direction:"→",action:"Cosmos verifieert de TOTP-code; bij succes wordt de **tijdsgebonden 48u-sessie** opgezet",state:"Cosmos-sessie GEACTIVEERD (48u TTL)",wikiRef:"components/cosmos.md §How it works (login + TOTP, 48h session); decisions/cosmos-two-layer-ztna.md §Decision (Gate 2 login + MFA via TOTP)"},{n:"9",raw:"`cosmos` → `cosmos/kuma`",from:"cosmos",to:"cosmos/kuma",ifacePort:"host → backend 3001/tcp (isolated Docker net cosmos-Uptime-Kuma-default)",protocol:"HTTP",protocols:["HTTP"],ports:["3001"],direction:"→",action:"Pas **nu** stuurt Cosmos door naar de Kuma-backend; de backend-poort is niet extern gebonden, dus dit is het enige ingangspad",state:"Request als proxy doorgestuurd naar de geïsoleerde backend",wikiRef:'components/cosmos.md §How it works (reverse proxy with container isolation; "only then forwards to the backend container"); concepts/application-gateway.md §How it applies here'},{n:"10",raw:"`cosmos/kuma` → `mobile01`",from:"cosmos/kuma",to:"mobile01",ifacePort:"via cosmos:443",protocol:"HTTP",protocols:["HTTP"],ports:["443"],direction:"←",action:"Kuma toont zijn eigen login (native auth) voordat het dashboard laadt; response wordt via Cosmos over de bestaande TLS-sessie teruggestuurd",state:"Dashboard afgeleverd",wikiRef:`components/cosmos.md §Uptime Kuma behind the gate (demo flow: "Cosmos login → credentials → MFA → dashboard"; Kuma's own login is the third layer); runbooks/13-cosmos.md §Step 8`}],trustBoundaries:["**NetBird netwerktoegang (Gate 1):** `10.0.0.100` en `*.dc.local` zijn **alleen** bereikbaar via de overlay; deze flow veronderstelt dat Gate 1 al gepasseerd is. `decisions/cosmos-two-layer-ztna.md §Decision` (Gate 1 = apparaatniveau); `overview/architecture.md §8` (NetBird ACL policies).",'**Cosmos applicatietoegang (Gate 2):** per-applicatie login + TOTP MFA + sessiegeldigheid; de gebruikersniveau-gate. `concepts/application-gateway.md §How it applies here`; `decisions/cosmos-two-layer-ztna.md §Decision`. (Geen benoemde rij in `overview/architecture.md §8`; het is de parallel-stack "application-admission"-haak in `overview/architecture.md §9`, zie Gaps.)',"**SmartShield (per route):** rate-limit / bot / anti-DDoS boundary, geëvalueerd vóór de auth-uitkomst. `components/cosmos.md §How it works`.","**Container-isolatie:** elke backend in zijn eigen Docker-netwerk; de backend-poort is niet extern gebonden, zodat Cosmos de enige toegangsweg is. `components/cosmos.md §How it works`; `concepts/application-gateway.md §How it applies here`."],variants:["`PS-04`: hetzelfde pad, **geblokkeerd**: MFA mislukt of de 48u-sessie is verlopen → opnieuw authenticeren vereist, de Kuma-backend (hop 9) wordt nooit bereikt.","`PS-05`: zusterroute `gitea.dc.local` waarbij de Cosmos MFA-gate **bewust uit** staat (Gitea heeft zijn eigen volwaardige auth); vergelijk de ontbrekende MFA-hops."],gaps:[{category:"Gaps — not specified in the wiki",text:'**`cosmos/kuma` backend IP.** The conventions catalog lists `172.18.0.2:3001` (with a "confirm" note), but neither `components/cosmos.md` nor `runbooks/13-cosmos.md` states the backend\'s container IP — they say only that `3001/tcp` is **not externally bound** and the network is `cosmos-Uptime-Kuma-default`. The Docker daemon is pinned to the `192.168.200.0/20` pool (`runbooks/13-cosmos.md §Step 1`), which makes a `172.18.x` address inconsistent with the documented pool. The `172.18.0.2` value is therefore **unconfirmed by the wiki** and flagged, not asserted.'},{category:"Gaps — not specified in the wiki",text:"**Per-hop login/MFA HTTP details.** The wiki describes the *flow* (Cosmos login → MFA → Kuma login → dashboard) but not the HTTP method/redirect/cookie specifics of each step; hops 5-10 are reconstructed from the demo-flow narrative, not from a captured request trace."},{category:"Gaps — not specified in the wiki",text:'**`dc01-p` node id.** `cosmos` runs on dc01 (`10.0.0.100`); the conventions describe it as "on dc01-p" but the dc01-p host itself is not separately catalogued. The canonical `cosmos` id is used; the underlying host on the parallel stack is referenced only via the `10.0.0.100` IP.'},{category:"Gaps — not specified in the wiki",text:"**OAuth/OIDC is *not* in this flow.** Cosmos auth here is its own login + TOTP. Cross-domain OAuth/SSO is **disabled** on the parallel stack (`AuthEnabled` greyed on `*.dc.local` due to the hostname-on-IP limitation, `findings/cosmos-hostname-oauth.md`); no Zitadel/Entra hop is involved for the Cosmos gate itself."},{category:"Gaps — not specified in the wiki",text:"**DNS caching.** The wiki does not state whether the client caches the `kuma.dc.local → 10.0.0.100` answer, so hops 1-2 may not recur on every visit."},{category:"Gaps — not specified in the wiki",text:"**dc01 `/etc/hosts` dependency is internal.** Cosmos' own resolution of `kuma.dc.local` relies on dc01 `/etc/hosts` (Docker's `127.0.0.11` resolver does not know `dc.local`) — relevant to whether hop 9 succeeds, but it is a host-internal config step, not a packet hop."}]},{id:"PS-04",name:"Cosmos applicatietoegang, mislukte MFA / verlopen 48u-sessie, geblokkeerd",stack:"parallel",plane:"control",outcome:"block",status:"poc-pending",cluster:"parallel-stack",sources:["components/cosmos.md §How it works in this stack","components/cosmos.md §Configuration","components/cosmos.md §Uptime Kuma behind the gate","concepts/application-gateway.md §How it applies here","concepts/application-gateway.md §Key distinctions","decisions/cosmos-two-layer-ztna.md §Decision","decisions/cosmos-two-layer-ztna.md §Consequences","runbooks/13-cosmos.md §Step 8: MFA enrolment verification (demo gate)"],related:["PS-03","PS-05"],nodesInvolved:["cosmos","cosmos/kuma","mobile01"],hops:[{n:"1",raw:"`mobile01` → `cosmos`",from:"mobile01",to:"cosmos",ifacePort:"overlay → 10.0.0.100:443",protocol:"TLS, TCP",protocols:["TLS","TCP"],ports:["443"],direction:"→",action:"Request bereikt de Cosmos reverse proxy (DNS voor kuma.dc.local → 10.0.0.100 zoals in PS-03 hops 1-2); apparaat zit op de overlay, Gate 1 is gepasseerd",state:"Nieuwe TLS-sessie; **geen geldige Cosmos-sessie aangeboden** (verlopen / andere browser / incognito)",wikiRef:"components/cosmos.md §How it works; runbooks/13-cosmos.md §Step 8 (incognito proves the gate; an active 48h session would skip MFA)"},{n:"2",raw:"`cosmos`",from:"cosmos",to:"cosmos",ifacePort:":443, route kuma.dc.local",protocol:"Sessio t:"manager → /opt/zeek/spool/manager/ (symlinked from /opt/zeek/logs/current)",protocol:"structured log write",protocols:["structured log write"],ports:[],direction:"(internal)",action:"Manager aggregeert worker-uitvoer tot conn/dns/ssl/http/ntp-logregels; current-symlink moet naar de cluster manager spool wijzen",state:"gelogd",wikiRef:"components/zeek.md §Known issues (cluster log path); runbooks/14-zeek-rita.md §Step 6 (symlink gotcha)"}],trustBoundaries:["Deze flow passeert **geen** allow/deny enforcement boundary; Zeek is een passieve monitoringsensor die geen verdict uitspreekt en niets blokkeert (`components/zeek.md` §How it works in this stack). De sensor observeert verkeer dat het core-segment al heeft gepasseerd.","De scheiding van planes is bewust: de sensor draait op het managementknooppunt `mgmt01-p`, los van de workload-hosts, zodat een gecompromitteerde workload de monitoring niet meesleurt (`components/zeek.md` §How it works in this stack: separation of planes).","De monitor NIC `ens4` is een stille listener zonder netwerkidentiteit; hij neemt nooit deel aan of beantwoordt verkeer (`components/zeek.md` §Two NICs on mgmt01)."],variants:["`PS-07`: dezelfde Zeek-sensor, Site1-segment aangeleverd via VyOS kernel GRE mirror in plaats van Hub flood.","`PS-08`: DC-segment, GRE-tunnel actief maar geen interne mirror (FreeBSD-beperking): `degraded` capture.","`PS-09`: downstream: deze `conn/dns/ssl/http`-logs voeden de beacon-pipeline van RITA."],gaps:[{category:"Gaps — not specified in the wiki",text:"**Per-node-id (`-p` canonical) Hub port map.** The full GNS3-build-name port table is now in hop 1 (grounded from `runbooks/14-zeek-rita.md` §Step 1), but the wiki uses those build names (NAT1, Windows11-1, VyOS-1, OPNsense-1, mgmt01) rather than the canonical `-p` node ids, and the mapping to `_conventions.md` `-p` ids is pinned in neither the wiki nor any raw source."},{category:"Gaps — not specified in the wiki",text:"**`ens4` link MTU is observed, not required.** The `mtu 9216` now shown in hop 3 is the verify-output value (`runbooks/14-zeek-rita.md` §Step 2); the wiki does not state it is the enforced/required MTU."},{category:"Gaps — not specified in the wiki",text:"**Production refinement (OVS / ERSPAN) is not part of this live flow.** `decisions/hub-vs-switch-visibility.md` §Consequences documents OVS as the production-grade swap but it was not implemented; this flow captures the implemented Hub path only."},{category:"Gaps — not specified in the wiki",text:"**Canonical id `nat0`/NAT and `Windows11-1` endpoints** appear in the runbook port table but have no node id in `_conventions.md`; left out of this flow as they are not capture participants."}]},{id:"PS-07",name:"Zeek Site1-segment capture via VyOS GRE kernel mirror",stack:"parallel",plane:"monitoring",outcome:"allow",status:"poc-pending",cluster:"parallel-stack",sources:["components/zeek.md §How it works in this stack","components/zeek.md §Configuration","findings/vyos-gre-two-step-commit.md §Resolution / workaround","runbooks/14-zeek-rita.md §Step 3","runbooks/14-zeek-rita.md §Step 5"],related:["PS-06","PS-08","PS-09"],nodesInvolved:["mgmt01-p/Zeek","site01-p"],hops:[{n:"1",raw:"`site01-p`",from:null,to:"site01-p",ifacePort:"eth1 (Site1 LAN, gw side)",protocol:"Ethernet (mirror tap)",protocols:["Ethernet (mirror tap)"],ports:[],direction:"(passive)",action:"VyOS kernel mirror kopieert elk ingress **en** egress frame op eth1; het originele frame wordt normaal doorgestuurd; de mirror is niet-intrusief",state:"gespiegelde kopie",wikiRef:"components/zeek.md §Capturing three segments (VyOS mirror); runbooks/14-zeek-rita.md §Step 3"},{n:"2",raw:"`site01-p`",from:"site01-p",to:"site01-p",ifacePort:"tun0 GRE, src 192.168.122.31 → dst 192.168.122.20",protocol:"GRE",protocols:["GRE"],ports:[],direction:"→",action:"Gespiegelde frames worden GRE-ingekapseld en naar mgmt01-p verstuurd. Tunnelconfiguratie: set interfaces tunnel tun0 encapsulation 'gre' / source-address '1
